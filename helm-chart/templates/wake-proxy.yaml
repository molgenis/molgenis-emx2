{{- if .Values.wakeProxy.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "emx2.fullname" . }}-wake-proxy
  labels:
    {{- include "emx2.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "emx2.fullname" . }}-wake-proxy-role
  labels:
    {{- include "emx2.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "emx2.fullname" . }}-wake-proxy-binding
  labels:
    {{- include "emx2.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "emx2.fullname" . }}-wake-proxy-role
subjects:
- kind: ServiceAccount
  name: {{ include "emx2.fullname" . }}-wake-proxy
  namespace: {{ .Release.Namespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "emx2.fullname" . }}-wake-proxy
  labels:
    {{- include "emx2.labels" . | nindent 4 }}
    app.kubernetes.io/component: wake-proxy
spec:
  replicas: 1  # Always keep 1 replica running
  selector:
    matchLabels:
      {{- include "emx2.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: wake-proxy
  template:
    metadata:
      labels:
        {{- include "emx2.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: wake-proxy
    spec:
      serviceAccountName: {{ include "emx2.fullname" . }}-wake-proxy
      containers:
      - name: proxy
        image: {{ .Values.wakeProxy.image.repository }}:{{ .Values.wakeProxy.image.tag }}
        imagePullPolicy: {{ .Values.wakeProxy.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TARGET_DEPLOYMENT
          value: {{ include "emx2.fullname" . | quote }}
        - name: TARGET_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: TARGET_SERVICE
          value: {{ include "emx2.fullname" . | quote }}
        - name: TARGET_PORT
          value: "8080"
        - name: PREVIEW_NAME
          value: {{ .Values.wakeProxy.previewName | default (printf "EMX2 Preview - %s" .Release.Name) | quote }}
        resources:
          {{- toYaml .Values.wakeProxy.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "emx2.fullname" . }}-wake-proxy
  labels:
    {{- include "emx2.labels" . | nindent 4 }}
    app.kubernetes.io/component: wake-proxy
spec:
  selector:
    {{- include "emx2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: wake-proxy
  ports:
  - port: 8080
    targetPort: 8080
    name: http
{{- end }}
