table: Experiments
description: "Wet-lab and dry-lab experiments"

variants:
  - name: WGS
    description: "Whole genome sequencing"
    extends: [sampling, sequencing]
    profiles: [wgs]
  - name: RNA_seq
    description: "Transcriptome sequencing"
    extends: [sampling, sequencing]
    profiles: [rna]
  - name: Imaging
    description: "Medical imaging"
    profiles: [imaging]
  - name: sampling
    internal: true
  - name: sequencing
    internal: true

columns:
  - name: experiment id
    type: string
    key: 1
  - name: date
    type: date
  - name: experiment type
    type: variant
    required: true
    profiles: [-core]
    defaultValue: WGS
  - name: sample
    type: ref
    refTable: Samples
  - section: Sample collection
    variant: sampling
    columns:
      - name: sample type
        type: ontology
        refTable: Sample types
        semantics: http://purl.obolibrary.org/obo/OBI_0000747
      - name: tissue type
        type: ontology
        refTable: Tissue types
  - section: Sequencing
    variant: sequencing
    columns:
      - name: library strategy
        type: ontology
        refTable: Library strategies
      - name: read length
        type: int
      - name: platform
        type: ontology
        refTable: Platforms
  - section: Imaging details
    variant: Imaging
    columns:
      - name: modality
        type: ontology
        refTable: Imaging modalities
      - name: body part examined
