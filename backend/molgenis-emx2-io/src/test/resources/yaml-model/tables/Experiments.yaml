table: Experiments
description: "Wet-lab and dry-lab experiments"

variants:
  WGS:
    description: "Whole genome sequencing"
    inherits: [sampling, sequencing]
    subsets: [wgs]
  RNA_seq:
    description: "Transcriptome sequencing"
    inherits: [sampling, sequencing]
    subsets: [rna]
  Imaging:
    description: "Medical imaging"
    subsets: [imaging]
  sampling:
    internal: true
  sequencing:
    internal: true

columns:
  experiment id:
    type: string
    key: 1
  date:
    type: date
  experiment type:
    type: variant
    required: true
    subsets: [-core]
    defaultValue: WGS
  sample:
    type: ref
    refTable: Samples
  Sample collection:
    variant: sampling
    columns:
      sample type:
        type: ontology
        refTable: Sample types
        semantics: http://purl.obolibrary.org/obo/OBI_0000747
      tissue type:
        type: ontology
        refTable: Tissue types
  Sequencing:
    variant: sequencing
    columns:
      library strategy:
        type: ontology
        refTable: Library strategies
      read length:
        type: int
      platform:
        type: ontology
        refTable: Platforms
  Imaging details:
    variant: Imaging
    columns:
      modality:
        type: ontology
        refTable: Imaging modalities
      body part examined: {}
