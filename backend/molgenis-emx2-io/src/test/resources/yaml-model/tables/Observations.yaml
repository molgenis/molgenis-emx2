table: Observations
description: "Clinical observations with additive extensions"

variants:
  Dermatology:
    description: "Skin examination findings"
    profiles: [cranio]
  Neurology:
    description: "Neurological assessment"
    profiles: [neuro]
  Questionnaire:
    description: "Validated instruments and scores"

columns:
  - name: observation id
    type: string
    key: 1
  - name: date
    type: date
  - name: individual
    type: ref
    refTable: Individuals
  - name: observation types
    type: variant_array
    description: "Select one or more clinical domains"
  - section: Dermatology
    variant: Dermatology
    columns:
      - name: BSA percentage
        type: decimal
        description: "Body surface area affected (%)"
      - name: lesion type
  - section: Neurology
    variant: Neurology
    columns:
      - name: motor score
        type: int
      - name: cognitive score
        type: int
  - section: Questionnaire
    variant: Questionnaire
    columns:
      - name: instrument name
      - name: total score
        type: decimal
