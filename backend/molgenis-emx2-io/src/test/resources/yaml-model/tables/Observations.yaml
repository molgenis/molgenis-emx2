table: Observations
description: "Clinical observations with additive extensions"

subtypes:
  Dermatology:
    description: "Skin examination findings"
    subsets: [cranio]
  Neurology:
    description: "Neurological assessment"
    subsets: [neuro]
  Questionnaire:
    description: "Validated instruments and scores"

columns:
  observation id:
    type: string
    key: 1
  date:
    type: date
  individual:
    type: ref
    refTable: Individuals
  observation types:
    type: subtype_array
    description: "Select one or more clinical domains"
  Dermatology:
    subtype: Dermatology
    columns:
      BSA percentage:
        type: decimal
        description: "Body surface area affected (%)"
      lesion type: {}
  Neurology:
    subtype: Neurology
    columns:
      motor score:
        type: int
      cognitive score:
        type: int
  Questionnaire:
    subtype: Questionnaire
    columns:
      instrument name: {}
      total score:
        type: decimal
