table: Observations
description: "Clinical observations with additive extensions"

variants:
  Dermatology:
    description: "Skin examination findings"
    profiles: [cranio]
  Neurology:
    description: "Neurological assessment"
    profiles: [neuro]
  Questionnaire:
    description: "Validated instruments and scores"

columns:
  observation id:
    type: string
    key: 1
  date:
    type: date
  individual:
    type: ref
    refTable: Individuals
  observation types:
    type: variant_array
    description: "Select one or more clinical domains"
  Dermatology:
    variant: Dermatology
    columns:
      BSA percentage:
        type: decimal
        description: "Body surface area affected (%)"
      lesion type: {}
  Neurology:
    variant: Neurology
    columns:
      motor score:
        type: int
      cognitive score:
        type: int
  Questionnaire:
    variant: Questionnaire
    columns:
      instrument name: {}
      total score:
        type: decimal
