table: Persons
description: "Information of the contact persons of a biobank, collection of network, like name, address and e-mail address."
semantics:
- "vcard:Kind,vcard:Individual"
columns:
- name: id
  key: 1
  required: true
  description: "Unique ID of the person, prefixed with bbmri-eric:contactID:"
  readonly: true
  label: ID
- name: title_before_name
  description: "Title before name, values like \"prof. mr.\""
  label: Title before Name
- name: first_name
  description: First name according to MIABIS 2.0 - MIABIS-2.0-07-A.
  semantics:
  - vcard:hasGivenName
  label: First Name
- name: last_name
  description: Last name according to MIABIS 2.0 - MIABIS-2.0-07-B.
  semantics:
  - vcard:hasFamilyName
  label: Last Name
- name: title_after_name
  description: "Title after name, values like \"Bsc.\""
  label: Title after Name
- name: full_name
  type: text
  description: The full name of the person
  semantics:
  - vcard:fn
  computed: "[title_before_name, first_name, last_name, title_after_name].join(\" \")"
  label: Full Name
- name: email
  type: email
  required: true
  description: Email address according to MIABIS 2.0 - MIABIS-2.0-07-D.
  semantics:
  - "vcard:email,vcard:hasEmail"
  label: Email address
- name: phone
  description: Phone number according to MIABIS 2.0 including international prefix (+99999999999 form with no spaces) compliant also to E.123 norm - MIABIS-2.0-07-C.
  semantics:
  - vcard:hasTelephone
  label: Phone Number
- name: address
  type: text
  description: Address according to MIABIS 2.0 - MIABIS-2.0-07-E.
  label: Address
- name: zip
  description: ZIP or postal code according to MIABIS 2.0 - MIABIS-2.0-07-F.
  label: Zip code
- name: city
  description: City according to MIABIS 2.0 - MIABIS-2.0-07-G.
  label: City
- name: country
  type: ontology
  required: true
  refTable: Countries
  refLabel: "${label}"
  description: Country according to MIABIS 2.0 - MIABIS-2.0-07-H.
  label: Country
- name: role
  type: text
  description: Official role of the person.
  label: Role of the Person
- name: biobanks
  type: refback
  refTable: Biobanks
  refBack: contact
  refLabel: "${name}"
  description: Biobanks the person is connected to.
  readonly: true
  label: Biobanks
- name: collections
  type: refback
  refTable: Collections
  refBack: contact
  refLabel: "${name}"
  description: Collections the person is connected to.
  readonly: true
  label: Collections
- name: networks
  type: refback
  refTable: Networks
  refBack: contact
  refLabel: "${name}"
  description: Networks the person is connected to.
  readonly: true
  label: Networks
- name: national_node
  type: ref
  required: true
  refTable: NationalNodes
  refLabel: "${description}"
  description: The person originates from this national node.
  label: National Node
