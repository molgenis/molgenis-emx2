table: QualityInfoServices
description: Service Quality Information
columns:
- name: id
  type: auto_id
  key: 1
  required: true
  defaultValue: "QIS-${mg_autoid}"
  readonly: true
  label: ID
- name: service
  type: ref
  required: true
  refTable: Services
  refLabel: "${name}"
  label: Service
- name: qualityStandard
  type: ontology
  required: true
  refTable: QualityStandards
  refLabel: "${label}"
  label: Quality Standard
- name: assessmentLevel
  type: ontology
  required: true
  refTable: AssessmentLevels
  refLabel: "${label}"
  label: Assessment Level
- name: certificationNumber
  label: Certification Number
- name: certificationReport
  type: hyperlink
  label: Certification Report
- name: certificationImageLink
  type: hyperlink
  label: Certification Image
