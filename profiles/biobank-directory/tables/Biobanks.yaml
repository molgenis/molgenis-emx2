table: Biobanks
description: "Description of the biobank organisation, like name, location, network, contact person, collaboration opportunities and quality assessments."
semantics: "obo:OBIB_0000623,foaf:Organization"
columns:
  id:
    label: ID
    key: 1
    required: true
    readonly: true
    description: "Unique biobank ID within BBMRI-ERIC based on MIABIS 2.0 standard (ISO 3166-1 alpha-2 + underscore + biobank national ID or name), prefixed with bbmri-eric:ID: string - MIABIS-2.0-01."
    semantics: dcterms:identifier
  pid:
    label: PID
    key: 2
    required: true
    readonly: true
    description: Persistent Identifier.
  name:
    label: Name
    required: true
    description: Biobank name according to MIABIS 2.0 - MIABIS-2.0-03.
    semantics: foaf:name
  acronym:
    label: Acronym
    description: Biobank acronym - MIABIS-2.0-02.
  description:
    label: Description
    type: text
    required: true
    description: Biobank description - MIABIS-2.0-08.
    semantics: dcterms:description
  url:
    label: URL
    type: hyperlink
    description: Biobank URL - MIABIS-2.0-04.
    semantics: dcat:landingPage
  location:
    label: Location
    description: The city where the biobank is located.
    semantics: dcterms:location
  country:
    label: Country
    type: ontology
    required: true
    refSchema: DirectoryOntologies
    refTable: Countries
    refLabel: ${label}
    description: Country hosting the biobank according to MIABIS 2.0 - MIABIS-2.0-06.
  latitude:
    label: Latitude
    description: "Latitude of the biobank in the WGS84 system (the one used by GPS), positive is northern hemisphere."
  longitude:
    label: Longitude
    description: "Longitude of the biobank in the WGS84 system (the one used by GPS), positive is to the East of Greenwich."
  head:
    label: Head of the Biobank
    type: ref
    refSchema: ""
    refTable: Persons
    refLabel: ${email}
    description: Person in charge of the biobank.
  contact:
    label: Contact Person
    type: ref
    required: true
    refSchema: ""
    refTable: Persons
    refLabel: ${email}
    description: Contact person of the biobank.
    semantics: dcat:contactPoint
  juridical_person:
    label: Juridical Person
    required: true
    description: Juristic person of a biobank according to MIABIS 2.0 - MIABIS-2.0-05.
    semantics: obo:OMRSE_00000038
  network:
    label: Networks
    type: ref_array
    refSchema: ""
    refTable: Networks
    refLabel: ${name}
    description: "Reference to a biobank network ID, to which the biobank belongs."
  also_known:
    label: Also Known In
    type: ref_array
    refSchema: ""
    refTable: AlsoKnownIn
    refLabel: ${name_system}
    description: "The biobank also exists in \u2026"
  collections:
    label: Collections
    type: refback
    refSchema: ""
    refTable: Collections
    refBack: biobank
    refLabel: ${name}
    description: Collections belonging to the biobank.
  services:
    label: Services
    type: refback
    refSchema: ""
    refTable: Services
    refBack: biobank
    refLabel: ${name}
    description: Capabilities and services that the biobank organisation can offer to a researcher.
  quality:
    label: Quality Standards
    type: refback
    readonly: true
    refSchema: ""
    refTable: QualityInfoBiobanks
    refBack: biobank
    refLabel: ${quality_standard.label}
    description: The biobank is marked with this/these quality standard(s).
  collaboration_commercial:
    label: Commercial Collaboration
    type: bool
    description: The biobank can be used for collaboration with commercial partners.
  collaboration_non_for_profit:
    label: Non-for-profit Collaboration
    type: bool
    description: The biobank can be used for collaboration with non-for-profit partners.
  national_node:
    label: National Node
    type: ref
    required: true
    refSchema: ""
    refTable: NationalNodes
    refLabel: ${description}
    description: The biobank originates from this national node.
  withdrawn:
    label: Withdrawn
    type: bool
    required: true
    defaultValue: "false"
    description: This biobank is withdrawn from the Directory.
