table: Collections
description: "Description of the data and samples collected within a biobank, collections may be divided in sub-collections."
semantics:
- ejp:Biobank
columns:
- heading: descriptives
  description: Collection Descriptives
  columns:
  - name: id
    key: 1
    required: true
    description: "Unique collection ID within BBMRI-ERIC based on MIABIS 2.0 standard, constructed from biobankID prefix + :collection: + local collection ID string - MIABIS-2.0-01."
    semantics:
    - dcterms:identifier
    readonly: true
    label: ID
  - name: name
    required: true
    description: Collection name according to MIABIS 2.0 - MIABIS-2.0-03.
    semantics:
    - dcterms:title
    label: Name
  - name: acronym
    description: Collection acronym according to MIABIS 2.0 - MIABIS-2.0-02.
    label: Acronym
  - name: description
    type: text
    required: true
    description: Collection description according to MIABIS 2.0 - MIABIS-2.0-08.
    semantics:
    - dcterms:description
    label: Description
  - name: url
    type: hyperlink
    description: Collection URL - MIABIS-2.0-04.
    semantics:
    - dcat:landingPage
    label: URL
  - name: location
    description: The city where the collection is located.
    label: Location
  - name: country
    type: ontology
    required: true
    refTable: Countries
    refLabel: "${label}"
    description: Country according to MIABIS 2.0 - MIABIS-2.0-07-H.
    semantics:
    - dcterms:spatial
    label: Country
  - name: latitude
    description: "Latitude of the collection in the WGS84 system (the one used by GPS), positive is northern hemisphere."
    label: Latitude
  - name: longitude
    description: "Longitude of the collection in the WGS84 system (the one used by GPS), positive is to the East of Greenwich."
    label: Longitude
  - name: head
    type: ref
    refTable: Persons
    refLabel: "${email}"
    description: Person in charge of the collection.
    label: Head of the Collection
  - name: contact
    type: ref
    required: true
    refTable: Persons
    refLabel: "${email}"
    description: Contact person of the collection.
    semantics:
    - dcat:contactPoint
    label: Contact Person
  - name: national_node
    type: ref
    required: true
    refTable: NationalNodes
    refLabel: "${description}"
    description: The collection originates from this national node.
    label: National Node
  - name: withdrawn
    type: bool
    required: true
    defaultValue: "false"
    description: This collection is withdrawn from the Directory.
    label: Withdrawn
- heading: belongs_to
  description: The collection belongs to ...
  columns:
  - name: parent_collection
    type: ref
    refTable: Collections
    refLabel: "${name}"
    description: "Reference to a collection ID, refers to the superior collection."
    label: Parent Collection
  - name: sub_collections
    type: refback
    refTable: Collections
    refBack: parent_collection
    refLabel: "${name}"
    description: "Reference to a collection ID, refers to one or more sub-collections."
    label: Sub Collections
  - name: biobank
    type: ref
    required: true
    refTable: Biobanks
    refLabel: "${name}"
    description: "Reference to a biobank ID, to which the collection belongs."
    semantics:
    - obo:OBIB_0000735
    label: Biobank
  - name: biobank_label
    required: true
    description: "Name of the biobank, to which the collection belongs."
    label: Biobank Label
  - name: network
    type: ref_array
    refTable: Networks
    refLabel: "${name}"
    description: "Reference to a network ID, to which the collection belongs."
    label: Network
  - name: also_known
    type: ref_array
    refTable: AlsoKnownIn
    refLabel: "${name_system}"
    description: The collection also exists in …
    label: Also Known In
  - name: studies
    type: ref_array
    refTable: Studies
    refLabel: "${title}"
    description: A link to studies during which the collection was generated
    label: Studies
- heading: characteristics
  description: Collection Characteristics
  columns:
  - name: type
    type: ontology_array
    required: true
    refTable: CollectionTypes
    refLabel: "${label}"
    description: Type(s) of the collection - MIABIS-2.0-19.
    label: Collection Types
  - name: data_categories
    type: ontology_array
    required: true
    refTable: DataCategories
    refLabel: "${label}"
    description: Denotes which types of data are available (MIABIS-2.0-13).
    label: Data Categories
  - name: order_of_magnitude
    type: ontology
    required: true
    refTable: SampleSizes
    refLabel: "${label}"
    description: Size of the collection measured as 10n samples.
    label: Order of Magnitude
  - name: size
    type: int
    description: Exact size of the collection at the given date.
    label: Size
  - name: categories
    type: ontology_array
    refTable: Categories
    refLabel: "${label}"
    description: Collection categories.
    label: Collection Categories
  - name: timestamp
    type: datetime
    description: "Date to which the size of the collection was valid, format: yyyy-mm-ddThh:mm:ss+nnnn, e.g. 2016-11-15T09:53:13+0100."
    label: Timestamp
  - name: quality
    type: refback
    refTable: QualityInfoCollections
    refBack: collection
    refLabel: "${quality_standard.label}"
    description: The collection is marked with this/these quality standard(s).
    readonly: true
    label: Quality Standards
  - name: combined_quality
    type: ontology_array
    refTable: AssessmentLevels
    refLabel: "${label}"
    description: "The direct or indirect collection's assessment level(s) (i.e., either the collection is explicitly marked with this assessment level or its biobank is)."
    label: Combined Qualities
- heading: donor_data
  description: Donor Data Characteristics
  columns:
  - name: number_of_donors
    type: int
    description: Number of donors from who sample(s) were taken.
    label: Number of Donors
  - name: order_of_magnitude_donors
    type: ontology
    refTable: SampleSizes
    refLabel: "${label}"
    description: Size of the collection donors measured as 10n samples.
    label: Order of Magnitude Donors
  - name: sex
    type: ontology_array
    refTable: SexTypes
    refLabel: "${label}"
    description: The sex type(s) of the individuals in the sample collection. - MIABIS-2.0-09.
    label: Sex Types
  - name: diagnosis_available
    type: ref_array
    refTable: DiseaseTypes
    refLabel: "${label}"
    description: "Available diagnosi(e)s in the collection, with the ontology prefix, possibly using * and ? wildcards, and prefix notation to denote diagnosis nomenclature - so far urn:miriam:icd: prefix for ICD-10, and urn:miriam:snomedct: prefix for SNOMED CT (examples being urn:miriam:icd:C*, urn:miriam:snomedct:25*) - MIABIS-2.0-17, adapted."
    label: Available Diagnoses
  - name: age_low
    type: int
    description: Age of youngest sample donor at time of sample donation - MIABIS-2.0-10.
    label: Age Low
  - name: age_high
    type: int
    description: Age of oldest sample donor at time of sample donation - MIABIS-2.0-11.
    label: Age High
  - name: age_unit
    type: ontology
    refTable: AgeUnits
    refLabel: "${label}"
    description: "Unit defining Age Low and Age High. Can be one of the following values: YEAR, MONTH, WEEK, DAY - MIABIS-2.0-08."
    label: Age Unit
  - name: facts
    type: refback
    refTable: CollectionFacts
    refBack: collection
    description: Collection facts.
    label: Facts
- heading: sample_data
  description: Sample Data Characteristics
  columns:
  - name: materials
    type: ontology_array
    refTable: MaterialTypes
    refLabel: "${label}"
    description: Collection contains material(s) of this/these type(s) (MIABIS-2.0-14).
    label: Materials
  - name: storage_temperatures
    type: ontology_array
    refTable: StorageTemperatureTypes
    refLabel: "${label}"
    description: Sample storage temperature(s) - SPREC 2.0 (MIABIS-2.0-15).
    label: Storage Temperatures
- heading: imaging_data
  description: Imaging Data Characteristics
  columns:
  - name: body_part_examined
    type: ontology_array
    refTable: BodyParts
    refLabel: "${label}"
    description: The examined body part(s).
    label: Body Parts Examined
  - name: imaging_modality
    type: ontology_array
    refTable: ImagingModalities
    refLabel: "${label}"
    description: Imaging modality/modalities.
    label: Imaging Modalities
  - name: image_dataset_type
    type: ontology_array
    refTable: ImageDatasetTypes
    refLabel: "${label}"
    description: Type(s) of the imaging dataset.
    label: Image Dataset Types
- heading: policies
  description: Policies belonging to the collection.
  columns:
  - name: collaboration_commercial
    type: bool
    description: The collection can be used for collaboration with commercial partners.
    label: Commercial Collaboration
  - name: collaboration_non_for_profit
    type: bool
    description: The collection can be used for collaboration with non-for-profit partners.
    label: Non-for-profit Collaboration
  - name: data_use
    type: ontology_array
    refTable: DataUseOntologies
    refLabel: "${label}"
    description: Data Use Ontologies (DUO)
    label: Data Use Ontologies
  - name: duc_profile
    type: hyperlink
    description: Link to the Digital Use Conditions (DUC) profile
    label: DUC profile
  - name: commercial_use
    type: bool
    description: Can commercial users request access to samples and/or data?
    label: Available for Commercial Use
  - name: access_fee
    type: ontology_array
    refTable: AccessTypes
    refLabel: "${label}"
    description: "Denotes whether access to samples, data or images may be obtained on fee-based basis."
    label: Fee-based access to
  - name: access_joint_project
    type: ontology_array
    refTable: AccessTypes
    refLabel: "${label}"
    description: "Denotes whether access to samples, data or images may be obtained on joint project basis."
    label: Access via Join Projects to
  - name: access_description
    type: text
    description: Short description of the access rules.
    label: Access Description
  - name: access_uri
    type: hyperlink
    description: URI describing the access policy.
    semantics:
    - dcterms:accessRights
    label: Access URI
  - name: sop
    type: ontology_array
    refTable: SOPs
    refLabel: "${label}"
    description: Availability of Process Descriptions (PDs) and/or Standard Operating Procedures (SOPs).
    label: PD/SOPs
- heading: rdf_helpers
  description: Helper attributes to make RDF output compliant with various standards.
  columns:
  - name: catalog
    type: ref_array
    refTable: Catalogs
    description: The FDP catalog(s) to which this collection belongs.
    semantics:
    - ldp:membershipResource
  - name: license
    type: hyperlink
    description: A legal document under which this catalogue record is made available.
    semantics:
    - dcterms:license
  - name: publisher
    type: ref
    refTable: Publishers
    description: An entity responsible for making the resource available.
    semantics:
    - dcterms:publisher
  - name: language
    type: ontology_array
    refTable: Languages
    description: The language(s) of the resource.
    semantics:
    - dcterms:language
  - name: keywords
    type: string_array
    description: Keyword(s) describing the resource.
    semantics:
    - dcat:keyword
  - name: EJP_RD_personalData
    description: "Set to true if the resource onboarded to the EJP-RD Virtual Platform contains personal data, personal data meaning data related to identified or identifiable persons (as per GDPR definition), otherwise false. Must be String as workaround for current FDP reference implementation limitations."
    semantics:
    - ejp:personalData
  - name: EJP_RD_vpConnection
    type: hyperlink
    description: This property must be attached to every entity that you wish the EJP-RD Virtual Platform to explore.
    semantics:
    - ejp:vpConnection
  - name: issued
    type: datetime
    required: true
    description: When this resource was first published
    semantics:
    - "dcterms:issued,fdp-o:metadataIssued"
    computed: mg_insertedOn
  - name: modified
    type: datetime
    required: true
    description: When this resource was last modified
    semantics:
    - "dcterms:modified,fdp-o:metadataModified"
    computed: mg_updatedOn
