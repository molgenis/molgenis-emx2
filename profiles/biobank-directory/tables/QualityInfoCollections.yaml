table: QualityInfoCollections
description: Collection Quality Information
columns:
- name: id
  type: auto_id
  key: 1
  required: true
  defaultValue: "QIC-${mg_autoid}"
  readonly: true
  label: ID
- name: collection
  type: ref
  required: true
  refTable: Collections
  refLabel: "${name}"
  label: Collection
- name: quality_standard
  type: ontology
  required: true
  refTable: QualityStandards
  refLabel: "${label}"
  label: Quality Standard
- name: assess_level_col
  type: ontology
  required: true
  refTable: AssessmentLevels
  refLabel: "${label}"
  label: Assessment Level
- name: certification_number
  label: Certification Number
- name: certification_report
  type: hyperlink
  label: Certification Report
- name: certification_image_link
  type: hyperlink
  label: Certification Image
