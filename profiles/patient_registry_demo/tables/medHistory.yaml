table: medHistory
description: Medical history
columns:
  label:
    required: 'false'
    label: Label
  belongsToSubject:
    type: ref
    required: 'false'
    refTable: subject
    label: Medical history belongs to Patient
  condition:
    type: text
  startDate:
    type: date
  stopDate:
    type: date
  ongoingBool:
    type: bool
  relatedXP:
    type: bool
  medicationBool:
    type: bool
  id:
    type: auto_id
    key: 1
    required: 'true'
    computed: ${mg_autoid}
    label: Auto-identifier
