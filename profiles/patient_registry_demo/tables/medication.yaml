table: medication
description: Medication
columns:
  label:
    required: 'false'
    label: Label
  belongsToSubject:
    type: ref
    required: 'false'
    refTable: subject
    label: Medication belongs to Patient
  medHistory:
    type: text
  medicationName:
  doseUnit:
  freq:
  routs:
  startDate:
    type: date
  stopDate:
    type: date
  ongoingBool:
    type: bool
  id:
    type: auto_id
    key: 1
    required: 'true'
    computed: ${mg_autoid}
    label: Auto-identifier
