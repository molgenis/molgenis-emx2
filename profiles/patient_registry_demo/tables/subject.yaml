table: subject
description: ""
columns:
- section: skinGroup
  columns:
  - name: diseaseGroup
    type: ontology
    required: false
    refTable: diseaseGroup
    refLabel: "${label}"
    description: Belonging to which type of SKIN disease groups
    label: Type of disease group
  - name: subgroups01
    type: ontology
    required: true
    refTable: subgroupsDNA
    refLabel: "${label}"
    visible: diseaseGroup?.name==="dna"
    label: Subgroups of DNA
  - name: subgroups02
    type: ontology
    required: false
    refTable: subgroupGenodermatosis
    refLabel: "${label}"
    visible: diseaseGroup?.name==="other"
    label: Subgroups of other genodermatosis
  - heading: EU1
    columns:
    - name: ID_SPIDER
      key: 1
      required: true
      description: "Patient's European patient identifier, using SPIDER technology."
      label: 1.1 SPIDER ID (Individual ID)
    - name: ID_Patient
      required: false
      description: Local patient pseudonym
      label: 1.2 Alternative ID
  - heading: EU2
    columns:
    - name: dateBirth
      type: date
      required: true
      visible: diseaseGroup?.name!=="dna"
      label: 2.1 Date of Birth
    - name: foetus
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 2.1.1 Is Foetus?
    - name: expecteddob
      type: date
      required: false
      visible: foetus?.name==="yes"
      label: 2.1.2 Expected date of birth
    - name: biologicalSex
      type: ontology
      required: true
      refTable: genderAtBirth
      refLabel: "${label}"
      description: Patient's sex at birth
      visible: diseaseGroup?.name!=="dna"
      label: 2.2 Sex at birth
    - name: gender
      type: ontology
      required: false
      refTable: genderIdentity
      refLabel: "${label}"
      description: For adolescents/adults who identify themselves as different compared to their biological sex.
      visible: diseaseGroup?.name==="mendel"
      label: 2.2.1 Gender identity
    - name: country
      type: ontology
      required: false
      refTable: countries
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="dna"
      label: 2.3 Country of Birth
    - name: residence
      type: ontology
      required: false
      refTable: countryEU
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 2.4 Country of residence
  - heading: EU3
    columns:
    - name: patientStatus
      type: ontology
      required: true
      refTable: InclusionStatus
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="dna"
      label: 3.1 Patient Status
    - name: ageAtDeath
      type: date
      required: true
      validation: if(!(ageAtDeath>=dateBirth))'Date at death cannot be less than birth date'
      visible: patientStatus?.name==="dead"
      label: 3.2 Date of death
  - heading: EU4
    columns:
    - name: dateFirstContact
      type: date
      required: true
      description: Date first contact with specialised center/Date of data entry
      visible: diseaseGroup?.name!=="dna"
      label: 4.1 First contact with specialised center
    - name: centre
      type: ref
      required: true
      refTable: dataproviders
      refLabel: "${organisation.name}"
      visible: diseaseGroup?.name!=="dna"
      label: 4.2 Healthcare Provider
    - name: centreContact
      type: text
      required: false
      visible: diseaseGroup?.name!=="dna"
      label: 4.3 Physician?s name
  - heading: EU5
    columns:
    - name: ageOfOnset
      type: ontology
      required: true
      refTable: onsetType
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="dna"
      label: 5.1 Age at onset
    - name: onsetDate
      type: date
      required: false
      validation: if(!(onsetDate>=dateBirth))'Date at onset cannot be less than birth date'
      visible: ageOfOnset?.name==="date"
      label: Date of onset
    - name: diagnoseDate
      type: date
      required: false
      validation: if(!(diagnoseDate>=dateBirth))'Date of diagnosis cannot be less than birth date'
      visible: ageOfDiagnose?.name==="date"
      label: Date of diagnosis
    - name: diseaseComments
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 5.3 Comments
- section: EU6
  columns:
  - heading: diagnose
    columns:
    - name: typeDiagnosis
      type: ontology
      required: false
      refTable: biologicalDiagnosis
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.1.1 Type of Diagnosis
  - heading: rare
    columns:
    - name: codesystemType_1
      type: ontology
      required: true
      refTable: codesystemType
      refLabel: "${label}"
      description: "Please select either ICD-10 or Orpha-codes. Overnight, your selection will automatically be mapped to the other coding system, if a mapping is available."
      visible: diseaseGroup?.name==="mendel"
      label: 6.2.1 Which coding system do you use for disease classification?
    - name: ordo1
      type: ontology_array
      required: true
      refTable: ordo
      refLabel: "${label}"
      visible: codesystemType_1?.name==="ordo" && diseaseGroup?.name==="mendel"
      label: 6.2.1 Rare disease classification (ORPHA)
    - name: icd10_1
      type: ontology_array
      required: true
      refTable: Icd10
      refLabel: "${label}"
      visible: codesystemType_1?.name==="icd10" && diseaseGroup?.name==="mendel"
      label: 6.2.2 Rare disease classification (ICD10)
    - name: mappedCodeBool_1
      type: bool
      required: true
      defaultValue: "FALSE"
      description: This field will be automatically updated by a nightly script. No need to fill in.
      visible: diseaseGroup?.name==="mendel"
      label: Disease Classification Mapping
    - name: mappedCodeOrdo_1
      type: ontology_array
      required: false
      refTable: ordo
      refLabel: "${label}"
      description: "This field contains the ORPHA code for the rare disease, mapped using the Orphacode tool. No manual input is required."
      visible: diseaseGroup?.name==="mendel" && codesystemType_1?.name==="icd10" && mappedCodeBool_1===true
      label: "Mapped: Rare Disease Classification (ORPHA)"
    - name: mappedCodeIcd10_1
      type: ontology_array
      required: false
      refTable: Icd10
      refLabel: "${label}"
      description: "This field contains the ICD10 code for the rare disease, mapped using the Orphacode tool. No manual input is required."
      visible: diseaseGroup?.name==="mendel" && codesystemType_1?.name==="ordo" && mappedCodeBool_1===true
      label: "Mapped : Rare Disease Classification (ICD10)"
  - heading: undiagnosed
    columns:
    - name: undiagnosedBool2
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.3.1 Undiagnosed Case?
  - heading: clinical
    columns:
    - name: hpo1
      type: ontology_array
      required: false
      refTable: hpo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.4.1 Clinical symptoms and physical findings in patient(HPO)
    - name: NotHpo1
      type: ontology_array
      required: false
      refTable: hpo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.4.2 Negative phenotype annotations
  - heading: genetic
    columns:
    - name: geneticTest1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.5.1 Genetic tests performed?
    - name: chromsomalTest1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.5.2 Chromosome Analysis Test performed?
    - name: chromDeviation
      type: text
      required: false
      visible: chromsomalTest1?.name==="yes"
      label: 6.5.2.1  chromosomal deviation
    - name: DNAanalysis1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.5.3 DNA sequencing performed?
    - name: hgnc1
      type: ontology_array
      required: true
      refTable: gene
      refLabel: "${label}"
      description: "HGNC (genes), OMIM"
      visible: diseaseGroup?.name==="mendel"
      label: 6.5.4 Gene
    - name: variant
      type: refback
      required: false
      refTable: variant
      refBack: belongsToSubject
      description: https://www.lovd.nl/
      visible: diseaseGroup?.name==="mendel"
      label: 6.5.5 Causal Variant(s)
    - name: DNAtechniques1
      type: ontology
      required: false
      refTable: SequencingMethods
      refLabel: "${label}"
      visible: dNAanalysis1?.name==="yes"
      label: 6.5.6.a DNA techniques
    - name: additionalTechniques1
      type: text
      required: false
      visible: dNAtechniques1?.name==="other"
      label: 6.5.6.b Additional techniques
  - heading: histologic
    columns:
    - name: standardHistology1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.6.1 Standard histology
    - name: antigen1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.6.2 Antigen mapping
    - name: resultAntigen1
      type: text
      required: false
      visible: antigen1?.name==="yes"
      label: 6.6.2.a Result Antigen mapping
    - name: electrochemicalMicroscopy1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.6.3 Electron microscopy
  - heading: immunology
    columns:
    - name: antibodyResult1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 6.7.1 Antibody results
    - name: bloodAnalysisbool1
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="mendel"
      label: 6.7.1.a Blood analysis performed?
    - name: antibodyDetails1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 6.7.2 Name Ab + name company
    - name: targetProtein1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 6.7.3 Target Protein
  - heading: etiology1
    columns:
    - name: drugs1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: "6.8.1 Drug etiology: which drug?"
    - name: infection1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: "6.8.2 Infectious etiology: which infection?"
    - name: other1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 6.8.3 other?
    - name: unknown1
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 6.8.4 Unknown Etiology?
  - heading: rareDisease
    columns:
    - name: codesystemType
      type: ontology
      required: true
      refTable: codesystemType
      refLabel: "${label}"
      description: "Please select either ICD-10 or Orpha-codes. Overnight, your selection will automatically be mapped to the other coding system, if a mapping is available."
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: Which coding system do you use for disease classification?
    - name: ordo
      type: ontology_array
      required: true
      refTable: ordo
      refLabel: "${label}"
      visible: codesystemType?.name==="ordo"
      label: Rare disease classification (ORPHA)
    - name: icd10
      type: ontology_array
      required: true
      refTable: Icd10
      refLabel: "${label}"
      visible: codesystemType?.name==="icd10"
      label: Rare disease classification (ICD10)
    - name: mappedCodeBool
      type: bool
      required: true
      defaultValue: "FALSE"
      description: This field will be automatically updated by a nightly script. No need to fill in.
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: Disease Classification Mapping
    - name: mappedCodeOrdo
      type: ontology_array
      required: false
      refTable: ordo
      refLabel: "${label}"
      description: "This field contains the ORPHA code for the rare disease, mapped using the Orphacode tool. No manual input is required."
      visible: codesystemType?.name==="icd10" && mappedCodeBool===true
      label: "Mapped: Rare Disease Classification (ORPHA)"
    - name: mappedCodeIcd10
      type: ontology_array
      required: false
      refTable: Icd10
      refLabel: "${label}"
      description: "This field contains the ICD10 code for the rare disease, mapped using the Orphacode tool. No manual input is required."
      visible: codesystemType?.name==="ordo" && mappedCodeBool===true
      label: "Mapped : Rare Disease Classification (ICD10)"
  - heading: clinicalDiagnosis
    columns:
    - name: hpo
      type: ontology_array
      required: true
      refTable: hpo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.2.1 Clinical symptoms and physical findings in patient(HPO)
  - heading: geneticDiagnosis
    columns:
    - name: hgnc
      type: ontology_array
      required: true
      refTable: gene
      refLabel: "${label}"
      description: "HGNC (genes), OMIM"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.3.1 Gene
    - name: chromsomalTest
      type: ontology
      required: false
      refTable: yesNo
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.3.2 Chromosome Analysis Test performed?
    - name: geneticTest
      type: ontology
      required: false
      refTable: yesNoUnknown
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.3.3 Genetic tests performed?
    - name: mutation
      required: false
      visible: geneticTest?.name==="yes"
      label: "Mutated Gene and mutation:"
    - name: DNAanalysis
      type: ontology
      required: false
      refTable: yesNo
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.3.4 DNA analysis performed?
    - name: DNAtechniques
      type: ontology
      required: false
      refTable: SequencingMethods
      refLabel: "${label}"
      visible: dNAanalysis?.name==="yes"
      label: 6.3.4.a DNA techniques
    - name: additionalTechniques
      type: text
      required: false
      visible: dNAtechniques?.name==="other"
      label: 6.3.4.b Additional techniques
  - heading: histologicDiagnosis
    columns:
    - name: standardHistology
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.4.1 Standard histology
    - name: antigen
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.4.2 Antigen mapping
    - name: resultAntigen
      type: text
      required: false
      visible: antigen?.name==="yes"
      label: 6.4.2.a Result Antigen mapping
    - name: electrochemicalMicroscopy
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.4.3 Electron microscopy
  - heading: immunologyDiagnosis
    columns:
    - name: antibodyResult
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.5.1 Antibody results
    - name: antibodyDetails
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.5.2 Name Ab + name company
    - name: targetProtein
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.5.3 Target Protein
  - heading: undiagnosedCase
    columns:
    - name: undiagnosedHpo
      type: ontology_array
      required: false
      refTable: hpo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: "6.6.1 Clinical symptoms and physical findings in patient (HPO: Human Phenotype Ontology)"
    - name: NotHpo3
      type: ontology_array
      required: false
      refTable: hpo
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: "6.6.2 Negative phenotype annotations (HPO: Human Phenotype Ontology)"
  - heading: etiology
    columns:
    - name: drugs
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: "6.7.1 Drug etiology: which drug?"
    - name: infection
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: "6.7.2 Infectious etiology: which infection?"
    - name: other
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.7.3 other?
    - name: unknown
      type: text
      required: false
      visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
      label: 6.7.4 Unknown Etiology?
  - heading: EU7
    columns:
    - name: consentRegistry
      type: ontology
      required: true
      refTable: yesNo
      visible: diseaseGroup?.name!=="dna"
      label: 7.1 Agreement to be contacted for research purposes or clinical trials
    - name: consentReuse
      type: ontology
      required: true
      refTable: yesNo
      visible: diseaseGroup?.name!=="dna"
      label: 7.2 Consent to the reuse of data
    - name: sampleBool
      type: ontology
      required: true
      refTable: yesNo
      visible: diseaseGroup?.name!=="dna"
      label: 7.3 Patient's biological sample available for research
    - name: biobankBool
      type: ontology
      required: true
      refTable: yesNo
      visible: diseaseGroup?.name!=="dna"
      label: 7.4 Biological sample stored in a biobank
    - name: biobank
      type: text
      required: false
      visible: biobankBool?.name==="yes"
      label: 7.5 Link to a Biobank
    - name: consentEducation
      type: ontology
      required: false
      refTable: yesNo
      visible: diseaseGroup?.name==="mendel"
      label: 7.6 Consent for educational purposes
  - heading: EU8
    columns:
    - name: ICF
      type: ontology_array
      required: true
      refTable: icf
      refLabel: "${label}"
      visible: diseaseGroup?.name!=="dna"
      label: 8.1 Classification of functioning/disability?(ICF)
    - name: addInfo
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 8.1.1 Additional info
    - name: disabilityScore
      type: text
      required: false
      visible: diseaseGroup?.name==="mendel"
      label: 8.1.2 Disability score
  - heading: imagesAvailable
    columns:
    - name: patientPhoto
      type: ontology
      required: false
      refTable: yesNo
      description: Photos are available and can be requested to be shared later.
      visible: diseaseGroup?.name!=="dna"
      label: 9.1 Clinical photographs available?
    - name: patientPhotoType
      type: ontology_array
      required: false
      refTable: medicalImage
      refLabel: "${label}"
      visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
      label: 9.1.1 Type of clinical image
    - name: patientPhotoRegion
      required: false
      visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
      label: 9.1.2 Region of interest
    - name: patientPhotoDate
      type: date
      required: false
      visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
      label: 9.1.3 Date latest clinical image
    - name: patientPhotoComments
      type: text
      required: false
      visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
      label: 9.1.4 Comments clinical image
    - name: medicalImages
      type: ontology
      required: false
      refTable: yesNo
      description: Images are available and can be requested to be shared later.
      visible: diseaseGroup?.name!=="dna"
      label: 9.2 Medical images available?
    - name: medicalImagestype
      type: ontology_array
      required: false
      refTable: medicalImage
      refLabel: "${label}"
      visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
      label: 9.2.1 Type of medical image
    - name: medicalImagesregion
      required: false
      visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
      label: 9.2.2 Region of interest
    - name: medicalImagesDate
      type: date
      required: false
      visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
      label: 9.2.3 Date latest medical image
    - name: medicalImagesComments
      type: text
      required: false
      visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
      label: 9.2.4 Comments medical image
    - name: histologyImages
      type: ontology
      required: false
      refTable: yesNo
      description: Images are available and can be requested to be shared later.
      visible: diseaseGroup?.name!=="dna"
      label: 9.3 Histology image available?
    - name: histologyimageDate
      type: date
      required: false
      visible: diseaseGroup?.name!=="dna"
      label: 9.3.1 Date Histology image
    - name: histologyimageComments
      type: text
      required: false
      visible: diseaseGroup?.name!=="dna"
      label: 9.3.2 Comments histology image
    - name: imagesComments
      type: text
      required: false
      visible: diseaseGroup?.name!=="dna"
      label: 9.4 Extra comments on images
  - heading: medicalHistory
    columns: []
  - heading: personalHistory
    columns:
    - name: acneHistory
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="allocate"
      label: CA1. History of severe acne
    - name: psoriasisHistory
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="allocate"
      label: CA2. History of psoriasis
    - name: IBDhistory
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="allocate"
      label: CA3. History of inflammatory bowel disease
    - name: typeIBD
      type: ontology
      required: false
      refTable: typeOfInflammatoryBowelDisease
      refLabel: "${label}"
      visible: iBDhistory?.name==="yes"
      label: What is the type of inflammatory bowel disease?
    - name: otherIBD
      type: text
      required: false
      visible: typeIBD?.name==="other"
      label: Specify other type of inflammatory bowel disease
    - name: arthritisHistory
      type: ontology
      required: false
      refTable: yesNo
      refLabel: "${label}"
      visible: diseaseGroup?.name==="allocate"
      label: CA6. History of arthritis/ Painful joints
    - name: typeArthritis
      type: ontology_array
      required: false
      refTable: arthritis
      refLabel: "${label}"
      visible: arthritisHistory?.name==="yes"
      label: Which kind of arthritis?
    - name: otherArthritis
      type: text
      required: false
      visible: typeArthritis?.some(arthritis=>arthritis.name === "other")
      label: Specify other kind of arthritis
    - name: morningStiffness
      type: ontology
      required: false
      refTable: yesNoUnknown
      refLabel: "${label}"
      visible: typeArthritis?.some(arthritis=>arthritis.name === "lumbago")
      label: Morning stiffness?
    - name: NSAID
      type: ontology
      required: false
      refTable: goodBadUnknown
      refLabel: "${label}"
      visible: typeArthritis?.some(arthritis=>arthritis.name === "lumbago")
      label: NSAID response?
    - name: locationArthritis
      type: text
      required: false
      visible: arthritisHistory?.name==="yes"
      label: "Which joint was the most affected (Location, specify)?"
    - name: sufferingConditions
      type: ontology_array
      required: false
      refTable: allocateSufferingConditions
      refLabel: "${label}"
      description: Select one or more conditions
      visible: diseaseGroup?.name==="allocate"
      label: CA11. Have you ever suffered from one of the following conditions?
    - name: HLA_B27
      type: ontology
      required: false
      refTable: positiveNegativeUnknown
      refLabel: "${label}"
      visible: diseaseGroup?.name==="allocate"
      label: CA12. Status HLA-B27
  - heading: famHistory
    columns:
    - name: familyMembers
      type: ontology
      required: false
      refTable: yesNoUnknown
      visible: diseaseGroup?.name==="allocate"
      label: CC1. Are there other members of your family who have HS?
    - name: famRelation
      type: ontology_array
      required: false
      refTable: familyMembers
      refLabel: "${label}"
      visible: familyMembers?.name==="yes"
      label: Specify family member
    - name: famRelationOther
      type: text
      required: false
