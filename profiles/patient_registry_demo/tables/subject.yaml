table: subject
columns:
  skinGroup:
    required: 'false'
    label: ERN-SKIN group
    columns:
      diseaseGroup:
        type: ontology
        required: 'false'
        refTable: diseaseGroup
        refLabel: ${label}
        description: Belonging to which type of SKIN disease groups
        label: Type of disease group
      subgroups01:
        type: ontology
        required: 'true'
        refTable: subgroupsDNA
        refLabel: ${label}
        visible: diseaseGroup?.name==="dna"
        label: Subgroups of DNA
      subgroups02:
        type: ontology
        required: 'false'
        refTable: subgroupGenodermatosis
        refLabel: ${label}
        visible: diseaseGroup?.name==="other"
        label: Subgroups of other genodermatosis
      EU1:
        required: 'false'
        label: 1. Pseudonym
        columns:
          ID_SPIDER:
            key: 1
            required: 'true'
            description: Patient's European patient identifier, using SPIDER technology.
            label: 1.1 SPIDER ID (Individual ID)
          ID_Patient:
            required: 'false'
            description: Local patient pseudonym
            label: 1.2 Alternative ID
      EU2:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 2. Personal information
        columns:
          dateBirth:
            type: date
            required: 'true'
            visible: diseaseGroup?.name!=="dna"
            label: 2.1 Date of Birth
          foetus:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 2.1.1 Is Foetus?
          expecteddob:
            type: date
            required: 'false'
            visible: foetus?.name==="yes"
            label: 2.1.2 Expected date of birth
          biologicalSex:
            type: ontology
            required: 'true'
            refTable: genderAtBirth
            refLabel: ${label}
            visible: diseaseGroup?.name!=="dna"
            description: Patient's sex at birth
            label: 2.2 Sex at birth
          gender:
            type: ontology
            required: 'false'
            refTable: genderIdentity
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            description: For adolescents/adults who identify themselves as different compared to their biological sex.
            label: 2.2.1 Gender identity
          country:
            type: ontology
            required: 'false'
            refTable: countries
            refLabel: ${label}
            visible: diseaseGroup?.name!=="dna"
            label: 2.3 Country of Birth
          residence:
            type: ontology
            required: 'false'
            refTable: countryEU
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 2.4 Country of residence
      EU3:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 3. Patient Status
        columns:
          patientStatus:
            type: ontology
            required: 'true'
            refTable: InclusionStatus
            refLabel: ${label}
            visible: diseaseGroup?.name!=="dna"
            label: 3.1 Patient Status
          ageAtDeath:
            type: date
            required: 'true'
            validation: if(!(ageAtDeath>=dateBirth))'Date at death cannot be less than birth date'
            visible: patientStatus?.name==="dead"
            label: 3.2 Date of death
      EU4:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 4. Care pathway
        columns:
          dateFirstContact:
            type: date
            required: 'true'
            visible: diseaseGroup?.name!=="dna"
            description: Date first contact with specialised center/Date of data entry
            label: 4.1 First contact with specialised center
          centre:
            type: ref
            required: 'true'
            refTable: dataproviders
            refLabel: ${organisation.name}
            visible: diseaseGroup?.name!=="dna"
            label: 4.2 Healthcare Provider
          centreContact:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="dna"
            label: 4.3 Physician?s name
      EU5:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 5. Disease history
        columns:
          ageOfOnset:
            type: ontology
            required: 'true'
            refTable: onsetType
            refLabel: ${label}
            visible: diseaseGroup?.name!=="dna"
            label: 5.1 Age at onset
          onsetDate:
            type: date
            required: 'false'
            validation: if(!(onsetDate>=dateBirth))'Date at onset cannot be less than birth date'
            visible: ageOfOnset?.name==="date"
            label: Date of onset
          diagnoseDate:
            type: date
            required: 'false'
            validation: if(!(diagnoseDate>=dateBirth))'Date of diagnosis cannot be less than birth date'
            visible: ageOfDiagnose?.name==="date"
            label: Date of diagnosis
          diseaseComments:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 5.3 Comments
  EU6:
    required: 'false'
    visible: diseaseGroup?.name!=="dna"
    label: 6. Diagnosis
    columns:
      diagnose:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.1 Diagnosed Case
        columns:
          typeDiagnosis:
            type: ontology
            required: 'false'
            refTable: biologicalDiagnosis
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.1.1 Type of Diagnosis
      rare:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.2 Diagnosis of the rare disease
        columns:
          codesystemType_1:
            type: ontology
            required: 'true'
            refTable: codesystemType
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            description: Please select either ICD-10 or Orpha-codes. Overnight, your selection will automatically be mapped
              to the other coding system, if a mapping is available.
            label: 6.2.1 Which coding system do you use for disease classification?
          ordo1:
            type: ontology_array
            required: 'true'
            refTable: ordo
            refLabel: ${label}
            visible: codesystemType_1?.name==="ordo" && diseaseGroup?.name==="mendel"
            label: 6.2.1 Rare disease classification (ORPHA)
          icd10_1:
            type: ontology_array
            required: 'true'
            refTable: Icd10
            refLabel: ${label}
            visible: codesystemType_1?.name==="icd10" && diseaseGroup?.name==="mendel"
            label: 6.2.2 Rare disease classification (ICD10)
          mappedCodeBool_1:
            type: bool
            required: 'true'
            defaultValue: 'FALSE'
            visible: diseaseGroup?.name==="mendel"
            description: This field will be automatically updated by a nightly script. No need to fill in.
            label: Disease Classification Mapping
          mappedCodeOrdo_1:
            type: ontology_array
            required: 'false'
            refTable: ordo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel" && codesystemType_1?.name==="icd10" && mappedCodeBool_1===true
            description: This field contains the ORPHA code for the rare disease, mapped using the Orphacode tool. No manual
              input is required.
            label: 'Mapped: Rare Disease Classification (ORPHA)'
          mappedCodeIcd10_1:
            type: ontology_array
            required: 'false'
            refTable: Icd10
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel" && codesystemType_1?.name==="ordo" && mappedCodeBool_1===true
            description: This field contains the ICD10 code for the rare disease, mapped using the Orphacode tool. No manual
              input is required.
            label: 'Mapped : Rare Disease Classification (ICD10)'
      undiagnosed:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.3 Undiagnosed Case
        columns:
          undiagnosedBool2:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.3.1 Undiagnosed Case?
      clinical:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.4 Immunohistology Diagnostic
        columns:
          hpo1:
            type: ontology_array
            required: 'false'
            refTable: hpo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.4.1 Clinical symptoms and physical findings in patient(HPO)
          NotHpo1:
            type: ontology_array
            required: 'false'
            refTable: hpo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.4.2 Negative phenotype annotations
      genetic:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.5 Genetic diagnosis
        columns:
          geneticTest1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.5.1 Genetic tests performed?
          chromsomalTest1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.5.2 Chromosome Analysis Test performed?
          chromDeviation:
            type: text
            required: 'false'
            visible: chromsomalTest1?.name==="yes"
            label: 6.5.2.1  chromosomal deviation
          DNAanalysis1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.5.3 DNA sequencing performed?
          hgnc1:
            type: ontology_array
            required: 'true'
            refTable: gene
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            description: HGNC (genes), OMIM
            label: 6.5.4 Gene
          variant:
            type: refback
            required: 'false'
            refTable: variant
            refBack: belongsToSubject
            visible: diseaseGroup?.name==="mendel"
            description: https://www.lovd.nl/
            label: 6.5.5 Causal Variant(s)
          DNAtechniques1:
            type: ontology
            required: 'false'
            refTable: SequencingMethods
            refLabel: ${label}
            visible: dNAanalysis1?.name==="yes"
            label: 6.5.6.a DNA techniques
          additionalTechniques1:
            type: text
            required: 'false'
            visible: dNAtechniques1?.name==="other"
            label: 6.5.6.b Additional techniques
      histologic:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.6 Histologic Diagnostic
        columns:
          standardHistology1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.6.1 Standard histology
          antigen1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.6.2 Antigen mapping
          resultAntigen1:
            type: text
            required: 'false'
            visible: antigen1?.name==="yes"
            label: 6.6.2.a Result Antigen mapping
          electrochemicalMicroscopy1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.6.3 Electron microscopy
      immunology:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.7 Immunology Diagnostic
        columns:
          antibodyResult1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 6.7.1 Antibody results
          bloodAnalysisbool1:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="mendel"
            label: 6.7.1.a Blood analysis performed?
          antibodyDetails1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 6.7.2 Name Ab + name company
          targetProtein1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 6.7.3 Target Protein
      etiology1:
        required: 'false'
        visible: diseaseGroup?.name==="mendel"
        label: 6.8 Etiology
        columns:
          drugs1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: '6.8.1 Drug etiology: which drug?'
          infection1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: '6.8.2 Infectious etiology: which infection?'
          other1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 6.8.3 other?
          unknown1:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 6.8.4 Unknown Etiology?
      rareDisease:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.1 Diagnosis of the rare disease
        columns:
          codesystemType:
            type: ontology
            required: 'true'
            refTable: codesystemType
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            description: Please select either ICD-10 or Orpha-codes. Overnight, your selection will automatically be mapped
              to the other coding system, if a mapping is available.
            label: Which coding system do you use for disease classification?
          ordo:
            type: ontology_array
            required: 'true'
            refTable: ordo
            refLabel: ${label}
            visible: codesystemType?.name==="ordo"
            label: Rare disease classification (ORPHA)
          icd10:
            type: ontology_array
            required: 'true'
            refTable: Icd10
            refLabel: ${label}
            visible: codesystemType?.name==="icd10"
            label: Rare disease classification (ICD10)
          mappedCodeBool:
            type: bool
            required: 'true'
            defaultValue: 'FALSE'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            description: This field will be automatically updated by a nightly script. No need to fill in.
            label: Disease Classification Mapping
          mappedCodeOrdo:
            type: ontology_array
            required: 'false'
            refTable: ordo
            refLabel: ${label}
            visible: codesystemType?.name==="icd10" && mappedCodeBool===true
            description: This field contains the ORPHA code for the rare disease, mapped using the Orphacode tool. No manual
              input is required.
            label: 'Mapped: Rare Disease Classification (ORPHA)'
          mappedCodeIcd10:
            type: ontology_array
            required: 'false'
            refTable: Icd10
            refLabel: ${label}
            visible: codesystemType?.name==="ordo" && mappedCodeBool===true
            description: This field contains the ICD10 code for the rare disease, mapped using the Orphacode tool. No manual
              input is required.
            label: 'Mapped : Rare Disease Classification (ICD10)'
      clinicalDiagnosis:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.2 Clinical Diagnostic
        columns:
          hpo:
            type: ontology_array
            required: 'true'
            refTable: hpo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.2.1 Clinical symptoms and physical findings in patient(HPO)
      geneticDiagnosis:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.3 Genetic diagnosis
        columns:
          hgnc:
            type: ontology_array
            required: 'true'
            refTable: gene
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            description: HGNC (genes), OMIM
            label: 6.3.1 Gene
          chromsomalTest:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.3.2 Chromosome Analysis Test performed?
          geneticTest:
            type: ontology
            required: 'false'
            refTable: yesNoUnknown
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.3.3 Genetic tests performed?
          mutation:
            required: 'false'
            visible: geneticTest?.name==="yes"
            label: 'Mutated Gene and mutation:'
          DNAanalysis:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.3.4 DNA analysis performed?
          DNAtechniques:
            type: ontology
            required: 'false'
            refTable: SequencingMethods
            refLabel: ${label}
            visible: dNAanalysis?.name==="yes"
            label: 6.3.4.a DNA techniques
          additionalTechniques:
            type: text
            required: 'false'
            visible: dNAtechniques?.name==="other"
            label: 6.3.4.b Additional techniques
      histologicDiagnosis:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.4 Histologic Diagnostic
        columns:
          standardHistology:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.4.1 Standard histology
          antigen:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.4.2 Antigen mapping
          resultAntigen:
            type: text
            required: 'false'
            visible: antigen?.name==="yes"
            label: 6.4.2.a Result Antigen mapping
          electrochemicalMicroscopy:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.4.3 Electron microscopy
      immunologyDiagnosis:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.5 Immunology Diagnostic
        columns:
          antibodyResult:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.5.1 Antibody results
          antibodyDetails:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.5.2 Name Ab + name company
          targetProtein:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.5.3 Target Protein
      undiagnosedCase:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.6  Undiagnosed case
        columns:
          undiagnosedHpo:
            type: ontology_array
            required: 'false'
            refTable: hpo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: '6.6.1 Clinical symptoms and physical findings in patient (HPO: Human Phenotype Ontology)'
          NotHpo3:
            type: ontology_array
            required: 'false'
            refTable: hpo
            refLabel: ${label}
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: '6.6.2 Negative phenotype annotations (HPO: Human Phenotype Ontology)'
      etiology:
        required: 'false'
        visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
        label: 6.7 Etiology
        columns:
          drugs:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: '6.7.1 Drug etiology: which drug?'
          infection:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: '6.7.2 Infectious etiology: which infection?'
          other:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.7.3 other?
          unknown:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="mendel" && diseaseGroup?.name!=="dna"
            label: 6.7.4 Unknown Etiology?
      EU7:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 7. Research/consent
        columns:
          consentRegistry:
            type: ontology
            required: 'true'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            label: 7.1 Agreement to be contacted for research purposes or clinical trials
          consentReuse:
            type: ontology
            required: 'true'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            label: 7.2 Consent to the reuse of data
          sampleBool:
            type: ontology
            required: 'true'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            label: 7.3 Patient's biological sample available for research
          biobankBool:
            type: ontology
            required: 'true'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            label: 7.4 Biological sample stored in a biobank
          biobank:
            type: text
            required: 'false'
            visible: biobankBool?.name==="yes"
            label: 7.5 Link to a Biobank
          consentEducation:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name==="mendel"
            label: 7.6 Consent for educational purposes
      EU8:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 8.Disability
        columns:
          ICF:
            type: ontology_array
            required: 'true'
            refTable: icf
            refLabel: ${label}
            visible: diseaseGroup?.name!=="dna"
            label: 8.1 Classification of functioning/disability?(ICF)
          addInfo:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 8.1.1 Additional info
          disabilityScore:
            type: text
            required: 'false'
            visible: diseaseGroup?.name==="mendel"
            label: 8.1.2 Disability score
      imagesAvailable:
        required: 'false'
        visible: diseaseGroup?.name!=="dna"
        label: 9. Images available
        columns:
          patientPhoto:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            description: Photos are available and can be requested to be shared later.
            label: 9.1 Clinical photographs available?
          patientPhotoType:
            type: ontology_array
            required: 'false'
            refTable: medicalImage
            refLabel: ${label}
            visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
            label: 9.1.1 Type of clinical image
          patientPhotoRegion:
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
            label: 9.1.2 Region of interest
          patientPhotoDate:
            type: date
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
            label: 9.1.3 Date latest clinical image
          patientPhotoComments:
            type: text
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && patientPhoto?.name==="yes"
            label: 9.1.4 Comments clinical image
          medicalImages:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            description: Images are available and can be requested to be shared later.
            label: 9.2 Medical images available?
          medicalImagestype:
            type: ontology_array
            required: 'false'
            refTable: medicalImage
            refLabel: ${label}
            visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
            label: 9.2.1 Type of medical image
          medicalImagesregion:
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
            label: 9.2.2 Region of interest
          medicalImagesDate:
            type: date
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
            label: 9.2.3 Date latest medical image
          medicalImagesComments:
            type: text
            required: 'false'
            visible: diseaseGroup?.name=== "mendel" && medicalImages?.name==="yes"
            label: 9.2.4 Comments medical image
          histologyImages:
            type: ontology
            required: 'false'
            refTable: yesNo
            visible: diseaseGroup?.name!=="dna"
            description: Images are available and can be requested to be shared later.
            label: 9.3 Histology image available?
          histologyimageDate:
            type: date
            required: 'false'
            visible: diseaseGroup?.name!=="dna"
            label: 9.3.1 Date Histology image
          histologyimageComments:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="dna"
            label: 9.3.2 Comments histology image
          imagesComments:
            type: text
            required: 'false'
            visible: diseaseGroup?.name!=="dna"
            label: 9.4 Extra comments on images
      medicalHistory:
        type: heading
        required: 'false'
        visible: diseaseGroup?.name==="allocate"
        label: C. Medical history
      personalHistory:
        required: 'false'
        visible: diseaseGroup?.name==="allocate"
        label: CA. Personal medical history
        columns:
          acneHistory:
            type: ontology
            required: 'false'
            refTable: yesNo
            refLabel: ${label}
            visible: diseaseGroup?.name==="allocate"
            label: CA1. History of severe acne
          psoriasisHistory:
