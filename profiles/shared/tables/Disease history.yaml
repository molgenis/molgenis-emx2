table: Disease history
description: History of diagnoses of an individual at a specific timepoints
semantics:
- http://purl.obolibrary.org/obo/NCIT_C15607
profiles:
- patient_registry
- fair_genomes
columns:
- name: part of clinical observation
  type: select
  key: 1
  required: true
  refTable: Clinical observations
  description: "A reference to a specific clinical observation (e.g., \"Ind001_Phen001\")"
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C87853
- name: disease
  type: ontology
  key: 1
  required: true
  refTable: Diseases
  description: "The diagnosis assigned for this particular observation (e.g., \"Spinocerebellar ataxia type 34\")"
  semantics:
  - http://semanticscience.org/resource/SIO_001331
- name: age group at onset
  type: ontology
  refTable: Age groups at onset
  description: "A categorical value that groups this individual's age of onset into groups (e.g., \"Adult\", \"18-24 years\", etc.)"
  semantics:
  - http://www.ebi.ac.uk/efo/EFO_0004847
  - http://purl.obolibrary.org/obo/NCIT_C20587
- name: age at onset
  type: period
  description: "The age at which manifestations of the disease first appeared (e.g., \"P32Y6M1D\")"
  semantics:
  - http://www.ebi.ac.uk/efo/EFO_0004847
- name: age group at diagnosis
  type: ontology
  refTable: Age groups
  description: "A categorical value that groups this individual's age at diagnosis into groups (e.g., \"Adult\", \"18-24 years\", etc.)"
  semantics:
  - http://www.ebi.ac.uk/efo/EFO_0004918
  - http://purl.obolibrary.org/obo/NCIT_C20587
- name: age at diagnosis
  type: period
  description: "The age at which the diagnosis was made (e.g., \"P32Y6M1D\")"
  semantics:
  - http://www.ebi.ac.uk/efo/EFO_0004918
- name: has family history
  type: bool
  description: An indication if the diagnosis is present in one or more family members or other relatives
  semantics:
  - http://purl.obolibrary.org/obo/HP_0032316
  profiles:
  - patient_registry
- name: disease severity
  type: ontology
  refTable: Severity
  description: "A value that describes the intensity of the disease (e.g., \"Profound\")"
  semantics:
  - http://purl.obolibrary.org/obo/HP_0012824
- name: disease stage
  type: ontology
  refTable: Disease stage
  description: "A part of an occurrence of a disease process which is associated with position in the normal progression of the disease (e.g., \"acute onset\")"
  semantics:
  - http://purl.obolibrary.org/obo/OBI_0000278
- name: disease status
  type: ontology
  refTable: Disease status
  description: "The state or status at the point during the visit the diagnosis was given (e.g., \"Suspected\")"
  semantics:
  - http://purl.obolibrary.org/obo/OPMI_0000533
  profiles:
  - patient_registry
