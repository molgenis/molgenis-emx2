table: Genomic variants
description: Beacon v2 GenomicVariation see also https://www.ga4gh.org/product/categorical-variation-catvar/
semantics:
- http://purl.obolibrary.org/obo/NCIT_C17248
profiles:
- patient_registry
columns:
- heading: Variant Definition
  columns:
  - name: id
    key: 1
    required: true
    description: A unique identifier maintained by an authoritative database that represents a genetic variation. E.g. 20:2447955..2447958c>g
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C164813
    - bc2:variantInternalId
  - name: alternative ids
    type: string_array
    description: A backup sequence of characters used to identify an entity
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C90353
  - name: variant type
    type: ontology
    refTable: Variant types
    description: The regular and simultaneous occurrence of alternative nucleotide sequences at equivalent locations of the genetic material among individuals of a single interbreeding population that are not maintained by recurrent mutation. Polymorphisms may range in size from single nucleotide to large nucleotide sequence variation visible at the chromosomal level. e.g. SNP
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C17004
  - name: variant effect type
    description: E.g. benign
    semantics:
    - http://purl.obolibrary.org/obo/SO_0001818
  - name: genomic HGVS id
    description: E.g. NC_000017.11:g.43057063G>A
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C172243
  - name: transcript HGVS ids
    type: string_array
    description: E.g. NC_000023.10(NM004006.2):c.357+1G
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C172244
  - name: protein HGVS ids
    type: string_array
    description: E.g. NP_009225.1:p.Glu1817Ter
    semantics:
    - http://ensembl.org/glossary/ENSGLOSSARY_0000274
  - name: genomic assembly id
    type: ontology
    refTable: Genome accessions
    description: "E.g. GRCh37. In Beacon, this is the assembly ID"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C164388
  - name: refseq assembly id
    type: string_array
    description: A centrally registered identifier symbol that specifies an individual sequence record in a public sequence repository and used as a basis for comparison against another sequence. E.g. 11
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0100606
  - name: gene id
    description: E.g. TTN
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C48664
  - name: chromosome
    type: ontology
    refTable: Chromosomes
    description: "A structure found in the nucleus of human cells that is comprised of a strand of linearized double-stranded DNA plus proteins that package the DNA in a condensed coil form and regulate chromosomal function. In beacon, this is the refSeqId / reference name"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C13203
  - name: chromosomal region
    description: "An extended part of a chromosome representing a term of convenience in order to hierarchically organize morphologically defined chromosome features: chromosome > arm > region > band > sub-band."
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000614
  - name: start position
    type: long
    description: The starting position of a sequence feature or interval. E.g. 2447955
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000894
  - name: stop position
    type: long
    description: The ending position of a sequence feature or interval. E.g. 2447955
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000895
  - name: reference allele
    description: An allele whose sequence matches what is consdiered to be the reference sequence at that location in the genome.
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000036
  - name: alternate allele
    description: Any allele of a variant which is not the in the reference genome currently being studied. The alternative allele is not necessarily the minor allele.
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000002
    - http://ensembl.org/glossary/ENSGLOSSARY_0000109
  - name: cDNA
    description: Single-stranded DNA that is complementary to messenger RNA or DNA that has been synthesized from messenger RNA by reverse transcriptase.
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C324
- heading: Consensus Classification
  columns:
  - name: used in interpretations
    type: refback
    refTable: Variant interpretations
    refBack: variants
    description: "A reference to one or more processes (i.e., variant interpretations) where a variant was used"
    semantics:
    - http://purl.obolibrary.org/obo/NGBO_6000125
