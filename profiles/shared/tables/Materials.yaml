table: Materials
description: "Materials (files, consent, etc.) relating to individual(s)"
semantics:
- http://semanticscience.org/resource/SIO_000015
profiles:
- patient_registry
- fair_genomes
variants:
- name: Individual consent
  description: "Consent given by a patient to a surgical or medical procedure or participation in a study, examination or analysis after achieving an understanding of the relevant medical facts and the risks involved."
  profiles:
  - patient_registry
  - fair_genomes
- name: Files
  description: "An electronic file is an information content entity which conforms to a specification or format and which is meant to hold data and information in digital form, accessible to software agents."
  profiles:
  - patient_registry
columns:
- heading: General Information
  columns:
  - name: id
    type: auto_id
    key: 1
    required: true
    description: "One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C25364
  - name: produced by process
    type: multiselect
    refTable: Processes
    description: "An event (an experiment, an observation, etc.) which produces a material"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C29862
  - name: individuals
    type: multiselect
    refTable: Individuals
    description: A reference to one or more individuals associated to the material
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C164337
  - name: alternate ids
    type: string_array
    description: Additional identifiers that identify a material
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C90353
  - name: affiliated organisations
    type: multiselect
    refTable: Organisations
    description: One or more associations between the record and an organisation.
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C25412
- heading: Additional Information
  columns:
  - name: included in resources
    type: multiselect
    refTable: Resources
    description: "A reference to one or more resources that organises materials for in a meaningful way (e.g., data releases, subpopulations, cohorts, etc.)"
    semantics:
    - http://purl.obolibrary.org/obo/HSO_0000370
    profiles:
    - patient_registry
  - name: data source
    type: select
    refTable: Resources
    description: "The source or origin of the record. For example, an organisation, database, system, etc."
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C16493
    profiles:
    - patient_registry
  - name: date created at source
    type: date
    description: The date the record was created at the source
    semantics:
    - dcterms:created
    - http://purl.obolibrary.org/obo/NCIT_C16493
  - name: created at source by
    type: select
    refTable: Contacts
    description: The person who created the record at the source
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C51820
    - http://purl.obolibrary.org/obo/NCIT_C16493
  - name: date updated at source
    type: date
    description: The date the record was updated at the source
    semantics:
    - dcterms:modified
    - http://purl.obolibrary.org/obo/NCIT_C16493
  - name: updated at source by
    type: select
    refTable: Contacts
    description: The person who updated the record at the source
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C51820
    - http://purl.obolibrary.org/obo/NCIT_C16493
  - name: comments
    type: text
    description: "A written explanation, observation or criticism added to textual material"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C25393
- variant: Individual consent
  columns:
  - heading: Individual Consent
    columns:
    - name: consent form used
      type: select
      refTable: Consent documents
      description: Reference to the informed consent form that was signed. Points to a particular instance of leaflet and consent form that usually exists as a record (i.e. a row) within the same database as this individual consent.
      semantics:
      - http://purl.obolibrary.org/obo/IAO_0000136
    - name: collected by
      type: select
      refTable: Organisations
      description: Indicates the institute who performed the collection act.
      semantics:
      - http://purl.obolibrary.org/obo/NCIT_C45262
    - name: signing date
      type: date
      description: A date specification that designates when this individual consent form was signed.
      semantics:
      - http://purl.obolibrary.org/obo/ICO_0000036
    - name: valid from
      type: date
      description: Starting date of the validity of this individual consent.
      semantics:
      - http://purl.org/dc/terms/valid
    - name: valid until
      type: date
      description: End date of the validity of this individual consent.
      semantics:
      - http://purl.org/dc/terms/valid
    - name: represented by
      type: ontology
      refTable: Consent representative
      description: An individual who is authorized under applicable State or local law to consent on behalf of a child or incapable person to general medical care including participation in clinical research.
      semantics:
      - http://purl.obolibrary.org/obo/NCIT_C142600
    - name: data use permissions
      type: ontology
      refTable: Data use permissions
      description: "A data item that is used to indicate consent permissions for datasets and/or materials, and relates to the purposes for which datasets and/or material might be used."
      semantics:
      - http://purl.obolibrary.org/obo/DUO_0000001
    - name: data use modifiers
      type: ontology_array
      refTable: Data use modifiers
      description: "Data use modifiers indicate additional conditions for use. For instance, a dataset is restricted to investigations into specific diseases or performed at specific geographical locations."
      semantics:
      - http://purl.obolibrary.org/obo/DUO_0000017
    - name: data use specification
      type: text
      description: "Further specification of applied data use permissions and modifiers. For example, a list of countries in case of geographic restrictions or a list of diseases when restricted to disease-specific research."
      semantics:
      - http://semanticscience.org/resource/SIO_000090
    - name: allow recontacting
      type: ontology_array
      refTable: Allow recontacting
      description: The procedure of recontacting the patient for specified reasons. This means the patient agrees to be re-identifiable under those circumstances.
      semantics:
      - http://purl.obolibrary.org/obo/NCIT_C25737
- variant: Files
  columns:
  - heading: Files
    profiles:
    - patient_registry
    columns:
    - name: produced by experiment
      type: select
      refTable: Experiments
      description: "The determination of complete (typically nucleotide) sequences, including those of genomes (full genome sequencing, de novo sequencing and resequencing), amplicons and transcriptomes. In FAIR Genomes: Sequencing. Ideally: SequencingRuns."
      semantics:
      - http://edamontology.org/topic_3168
    - name: file locations
      type: refback
      refTable: File locations
      refBack: file
      refLabel: "${storageLocation.name}:${path}"
    - name: checksum
      description: A fixed-size datum calculated (by using a hash function) for a file
      semantics:
      - http://purl.obolibrary.org/obo/NCIT_C43522
    - name: checksum type
      type: ontology
      refTable: Checksum type
      description: "The type of checksum (e.g., MD5, SHA256)"
      semantics:
      - http://purl.obolibrary.org/obo/MS_1000561
    - name: format
      type: ontology
      required: true
      refTable: File formats
      description: "A digital resource format (e.g. BAM, FastQ, gVCF, phenopacket, BED)"
      semantics:
      - http://purl.org/dc/terms/FileFormat
      - http://purl.obolibrary.org/obo/NCIT_C171252
