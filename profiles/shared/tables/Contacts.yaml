table: Contacts
description: Listing of contact persons per resource
semantics:
- vcard:Kind
- vcard:Individual
profiles:
- datacatalogueflat
columns:
- name: resource
  type: ref
  key: 1
  required: true
  refTable: Resources
  description: Resource the contact is affiliated with
- name: role
  type: ontology_array
  refTable: Contribution types
  description: Type(s) of contribution or role in the resource
  semantics:
  - vcard:hasRole
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: role description
  type: text
  description: Description of the role
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: first name
  key: 1
  required: true
  description: First name of the contact person
  semantics:
  - foaf:firstName
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: last name
  key: 1
  required: true
  description: Last name of the contact person
  semantics:
  - foaf:familyName
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: display name
  required: true
  description: Display name of the contact person
  semantics:
  - foaf:name
  - vcard:hasName
  - vcard:fn
  computed: firstName+' '+lastName
- name: statement of consent personal data
  type: bool
  required: true
  description: "Indicate whether this person consents to display the following personal data in the catalogue (which is openly accessible): title, name, email, photo, orcid ID, institute, department, expertise, discipline and role within the resource. These data-items may partly be extracted from the UMCG and/or RUG employee pages. The consent also includes future linkages with other national and international catalogues and platforms to increase visibility and findability (e.g. BBMRI-ERIC, NARCIS) of UMCG-resources. Contributors without a positive statement of consent will not be shown in the UMCG Research Data Catalogue"
  profiles:
  - umcgcohortsstaging
- name: prefix
  description: "Surname prefix, if applicable"
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: initials
  description: Initials of the contact person
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: title
  type: ontology
  refTable: Titles
  description: Title of the contact person
  semantics:
  - foaf:title
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: organisation
  type: ref
  refTable: Organisations
  description: Affiliated organisation of the contact person
  semantics:
  - foaf:Organization
  profiles:
  - fair_genomes
  - beacon_v2
- name: email
  type: email
  required: if(resource?.hricore === true) 'This field is mandatory for HRICore compatibility'
  description: Contact's email address
  semantics:
  - vcard:hasEmail
  - foaf:mbox
  profiles:
  - datacatalogueflat
  - fair_genomes
- name: orcid
  description: Orcid of the contact person
  semantics:
  - dcterms:identifier
- name: homepage
  type: hyperlink
  description: Link to contact's homepage
  semantics:
  - vcard:url
  - foaf:workplaceHomepage
  - vcard:hasURL
- name: photo
  type: file
  description: Contact's photograph
  semantics:
  - foaf:img
- name: expertise
  description: Description of contact's expertise
