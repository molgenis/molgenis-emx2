table: Contacts
description: Listing of contact persons per resource
profiles: [catalogue_core]
semantics: ['vcard:Kind', 'vcard:Individual']
columns:
  resource:
    type: ref
    key: 1
    required: true
    refTable: Resources
    profiles: [catalogue_core]
    description: Resource the contact is affiliated with
  role:
    type: ontology_array
    refTable: Contribution types
    semantics: ['vcard:hasRole']
    profiles: [catalogue_core, patient_core]
    description: Type(s) of contribution or role in the resource
  role description:
    type: text
    profiles: [catalogue_core, patient_core]
    description: Description of the role
  first name:
    key: 1
    required: true
    semantics: ['foaf:firstName']
    profiles: [catalogue_core, patient_core]
    description: First name of the contact person
  last name:
    key: 1
    required: true
    semantics: ['foaf:familyName']
    profiles: [catalogue_core, patient_core]
    description: Last name of the contact person
  display name:
    required: true
    semantics: ['foaf:name', 'vcard:hasName', 'vcard:fn']
    profiles: [catalogue_core]
    computed: firstName+' '+lastName
    description: Display name of the contact person
  statement of consent personal data:
    type: bool
    required: true
    profiles: [umcg_cohorts_staging]
    description: 'Indicate whether this person consents to display the following personal data in the
      catalogue (which is openly accessible): title, name, email, photo, orcid ID, institute, department,
      expertise, discipline and role within the resource. These data-items may partly be extracted from
      the UMCG and/or RUG employee pages. The consent also includes future linkages with other national
      and international catalogues and platforms to increase visibility and findability (e.g. BBMRI-ERIC,
      NARCIS) of UMCG-resources. Contributors without a positive statement of consent will not be shown
      in the UMCG Research Data Catalogue'
  prefix:
    profiles: [catalogue_core, patient_core]
    description: Surname prefix, if applicable
  initials:
    profiles: [catalogue_core, patient_core]
    description: Initials of the contact person
  title:
    type: ontology
    refTable: Titles
    semantics: ['foaf:title']
    profiles: [catalogue_core, patient_core]
    description: Title of the contact person
  organisation:
    type: ref
    refTable: Organisations
    semantics: ['foaf:Organization']
    profiles: [patient_core, beacon_v2]
    description: Affiliated organisation of the contact person
  email:
    type: email
    required: if(resource?.hricore === true) 'This field is mandatory for HRICore compatibility'
    semantics: ['vcard:hasEmail', 'foaf:mbox']
    profiles: [catalogue_core, patient_core]
    description: Contact's email address
  orcid:
    semantics: ['dcterms:identifier']
    profiles: [catalogue_core]
    description: Orcid of the contact person
  homepage:
    type: hyperlink
    semantics: ['vcard:url', 'foaf:workplaceHomepage', 'vcard:hasURL']
    profiles: [catalogue_core]
    description: Link to contact's homepage
  photo:
    type: file
    semantics: ['foaf:img']
    profiles: [cohorts_staging, rwe_staging, networks_staging, study_staging]
    description: Contact's photograph
  expertise:
    profiles: [catalogue_core]
    description: Description of contact's expertise
