table: Resources
description: Resource of data and/or samples. Use 'resource type' to specify
semantics:
- ldp:DirectContainer
profiles:
- datacatalogueflat
columns:
- name: rdf type
  type: hyperlink
  description: The DCAT type such as dcat:Catalog as computed field
  semantics:
  - rdf:type
  computed: "type.some(item => item.name === 'Catalogue') ? 'http://www.w3.org/ns/dcat#Catalog' : type.some(item => item.name === 'Network') ?  undefined : 'http://www.w3.org/ns/dcat#Dataset'"
- name: fdp endpoint
  type: ref
  defaultValue: "= {id: 'main_fdp'}"
  refTable: Endpoint
  description: FDP endpoint to associated with the catalogue
  semantics:
  - ldp:membershipResource
- name: ldp membership relation
  type: hyperlink
  defaultValue: https://w3id.org/fdp/fdp-o#metadataCatalog
  description: LDP membership relation
  semantics:
  - ldp:hasMemberRelation
- heading: overview
  description: General information
  columns:
  - name: hricore
    type: bool
    description: "Do you want your metadata to be compatible with HRICore v2.0.1, so that the metadata can be shared with the Dutch National Health Data Catalogue?"
  - name: id
    key: 1
    required: true
    description: Internal identifier
  - name: pid
    key: 2
    description: Persistent identifier
    semantics:
    - dcterms:identifier
  - name: name
    type: text
    key: 3
    required: true
    description: Name used in international projects
    semantics:
    - dcterms:title
  - name: local name
    description: "If different from above, name in the national language"
    semantics:
    - rdfs:label
  - name: acronym
    description: "Acronym, if applicable"
    semantics:
    - dcterms:alternative
  - name: type
    type: ontology_array
    required: true
    refTable: Resource types
    description: "Type of resource, e.g. registry, cohort, biobank"
  - name: catalogue type
    type: ontology
    refTable: CatalogueTypes
    description: Type of catalogue
    visible: type?.some(item => item.name === 'Catalogue')
  - name: main catalogue
    type: bool
    description: Is this the main catalogue of this catalogue server?
    visible: type?.some(item => item.name === 'Catalogue')
  - name: cohort type
    type: ontology_array
    refTable: Cohort study types
    description: Type of cohort
    visible: type?.some(item => item.name === 'Cohort study')
  - name: clinical study type
    type: ontology_array
    refTable: Clinical study types
    description: Type of clinical study
    visible: type?.some(item => item.name === 'Clinical trial')
  - name: registry or health record type
    type: ontology_array
    refTable: Datasource types
    description: Type of registry or health record
    visible: type?.some(item => item.name === 'Data source' | item.name === 'Databank' | item.name === 'Registry'  | item.name === 'Health records')
  - name: network type
    type: ontology_array
    refTable: Network types
    description: Type of network
    visible: type?.some(item => item.name === 'Network')
  - name: website
    type: hyperlink
    description: Link to the website or homepage
    semantics:
    - dcat:landingPage
    - foaf:homepage
  - name: description
    type: text
    required: if(hricore === true) 'This field is mandatory for HRICore compatibility'
    description: Short description
    semantics:
    - dcterms:description
  - name: keywords
    type: string_array
    required: if(hricore === true && type?.some(item => item.name !== 'Network' && item.name !== 'Catalogue')) 'This field is mandatory for HRICore compatibility'
    description: Keywords to increase findability of this resource. Try to use words that are not used in the description. Keywords are not displayed on the resource page
    semantics:
    - dcat:keyword
  - name: internal identifiers
    type: refback
    refTable: Internal identifiers
    refBack: resource
    description: Internal identifier(s) for this resource (e.g. UMCG register number)
  - name: external identifiers
    type: refback
    refTable: External identifiers
    refBack: resource
    description: External identifier(s) for this resource (e.g. EUPASS number or BBMRI persistent identifer)
  - name: start year
    type: int
    description: "The year when the resource started, e.g. when data or samples started to be collected or extracted, or when the resource was established"
    semantics:
    - dcat:startDate
  - name: end year
    type: int
    description: "The year the resource ceased, e.g. when data or sample collection was stopped"
    semantics:
    - dcat:endDate
  - name: time span description
    type: text
    description: Description of time span
  - name: contact email
    type: email
    description: Contact e-mail address
  - name: logo
    type: file
    description: "Logo of the resource, for use on homepages etc."
  - name: status
    type: ontology
    refTable: Study status
    description: Status of the study
  - name: conforms to
    type: hyperlink
    description: The specification of the catalog metadata schema
    semantics:
    - dcterms:conformsTo
  - name: has member relation
    type: hyperlink
    description: This relation points to the URI of the custom relation/predicate used to relate the FAIR Data Point with its member catalogs. The object of this property MUST be fdp-o:metadataCatalog.
    semantics:
    - ldp:hasMemberRelation
    - dcat:record
  - name: issued
    type: datetime
    description: When the data of the resource was first published
    semantics:
    - dcterms:issued
    - https://w3id.org/fdp/fdp-o#metadataIssued
  - name: modified
    type: datetime
    description: When the data of the resource was last modified
    semantics:
    - dcterms:modified
    - https://w3id.org/fdp/fdp-o#metadataModified
- heading: design and structure
  description: Structure of the resource
  columns:
  - name: design
    type: ontology
    refTable: Cohort designs
    description: "The study design of this cohort, i.e. cross-sectional or longitudinal"
  - name: design description
    type: text
    description: "Short description of the study design of this resource, if applicable"
    semantics:
    - dcterms:provenance
  - name: design schematic
    type: file
    description: A schematic depiction of the study design of this resource
  - name: data collection type
    type: ontology_array
    refTable: Cohort collection types
    description: Retrospective or prospective data collection
  - name: data collection description
    type: text
    description: Describe the process of collection and recording of data
    semantics:
    - dcterms:provenance
  - name: reason sustained
    type: text
    description: "Description of the reason why the data bank is sustained by the organisation (e.g. for surveillance, clinical purposes, financial or administrative purposes, research purposes)"
    semantics:
    - dcterms:provenance
  - name: record trigger
    type: text
    description: "What triggers the creation of a record in the data bank? e.g. planned collection events, hospital discharge, specialist encounter, dispensation of a medicinal product, recording of a congenital anomaly"
  - name: unit of observation
    type: text
    description: "Based on the record trigger or promt, what is the unit(s) of observation of a record (e.g. person, prescription)?"
  - name: subpopulations
    type: refback
    refTable: Subpopulations
    refBack: resource
    description: "List of cohorts or subpopulations defined in this resource, if applicable"
  - name: collection events
    type: refback
    refTable: Collection events
    refBack: resource
    description: "List of data/sample collection events defined for this collection, if applicable"
  - name: data resources
    type: ref_array
    refTable: Resources
    description: "List of other data collections included in this network, e.g. cohorts, biobanks or real world data sources. Do not list other networks or catalogues here"
    semantics:
    - dcat:dataset
    profiles:
    - networksstaging
  - name: part of networks
    type: refback
    refTable: Resources
    refBack: data resources
    description: List of other collections included in this resource
- heading: population
  description: Description of the population that is sampled in this resource
  columns:
  - name: number of participants
    type: non_negative_int
    description: Total number of individuals for which data is collected
    semantics:
    - healthdcatap:numberOfUniqueIndividuals
  - name: number of participants with samples
    type: non_negative_int
    description: Number of individuals for which samples are collected
  - name: underlying population
    type: text
    description: Provide a summary description of the underlying population from which participants are sampled
    semantics:
    - healthdcatap:populationCoverage
  - name: population description
    type: text
    description: A short description of the study population
    semantics:
    - healthdcatap:populationCoverage
    profiles:
    - ema
  - name: population of interest
    type: ontology_array
    refTable: Population of interest
    description: Select population of interest
  - name: population of interest other
    type: text
    description: "If population of interest is 'Other', please specify which other population has been studied"
  - name: countries
    type: ontology_array
    refTable: Countries
    description: Countries where data/samples from this resource largely originate from
    semantics:
    - dcterms:spatial
  - name: continents
    type: ontology_array
    refTable: Continents
    description: Continent(s) where data/samples from this resource originate from
    semantics:
    - dcterms:spatial
  - name: regions
    type: ontology_array
    refTable: Regions
    description: Geographical regions where data/samples from this resource largely originate from
    semantics:
    - dcterms:spatial
  - name: population age groups
    type: ontology_array
    refTable: Age groups
    description: Which population age groups are captured in this resource? Select all that are relevant
  - name: age min
    type: non_negative_int
    description: Minimum age of participants within this resource
    semantics:
    - healthdcatap:minimumTypicalAge
  - name: age max
    type: non_negative_int
    description: Maximum age of participants within this resource
    semantics:
    - healthdcatap:maximumTypicalAge
  - name: inclusion criteria
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    description: Inclusion criteria applied to the participants of this resource
  - name: other inclusion criteria
    type: text
    description: Other inclusion criteria applied to the participants of this resource
  - name: exclusion criteria
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    description: Exclusion criteria applied to the participants of this resource
  - name: other exclusion criteria
    type: text
    description: Other exclusion criteria applied to the participants of this resource
  - name: population entry
    type: ontology_array
    refTable: Population entry
    description: Select the possible causes / events that trigger the registration of a person in the data source
  - name: population entry other
    type: text
    description: "If other, specify the causes of entry to the underlying population"
  - name: population exit
    type: ontology_array
    refTable: Population exit
    description: Select the possible causes / events that trigger the de-registration of a person in the data source
  - name: population exit other
    type: text
    description: "If other, specify the causes of exit from the underlying population"
  - name: population disease
    type: ontology_array
    refTable: Diseases
    description: Is information on a specific disease subpopulation collected (e.g. as in a disease-specific registry or cohort)?
  - name: population oncology topology
    type: ontology_array
    refTable: ICDO topologies
    description: "Is information on specific cancer subtype(s) collected? If yes, select topology specifications"
  - name: population oncology morphology
    type: ontology_array
    refTable: ICDO morphologies
    description: "Is information on specific cancer subtype(s) collected? If yes, select morphology specifications"
  - name: population coverage
    type: text
    description: Estimated percentage of the population covered by the data source in the catchment area. Please describe the denominator
  - name: population not covered
    type: text
    description: "Description of the population covered by the data source in the catchment area whose data are not collected, where applicable (e.g. people who are registered only for private care)"
  - name: counts
    type: refback
    refTable: Resource counts
    refBack: resource
    description: Counts of e.g. samples defined for this resource
- heading: contributors
  description: List of relevant collaborations
  columns:
  - name: organisations involved
    type: refback
    refTable: Organisations
    refBack: resource
    description: Organisations involved in this resource and their role(s)
  - name: publisher
    type: ref
    required: if(hricore === true) 'This field is mandatory for HRICore compatibility'
    refTable: Organisations
    description: "From organisations involved, point out the organisation that published this resource"
    semantics:
    - dcterms:publisher
  - name: creator
    type: ref_array
    required: if(hricore === true && type?.some(item => item.name !== 'Network' && item.name !== 'Catalogue')) 'This field is mandatory for HRICore compatibility'
    refTable: Organisations
    description: "From organisations involved, point out the organisation(s) that created this resource"
    semantics:
    - dcterms:creator
  - name: people involved
    type: refback
    refTable: Contacts
    refBack: resource
    description: Persons that contributed to this resource
  - name: contact point
    type: ref
    required: if(hricore === true) 'This field is mandatory for HRICore compatibility'
    refTable: Contacts
    description: "From people involved, point out the primary contact point for this resource"
    semantics:
    - dcat:contactPoint
  - name: child networks
    type: ref_array
    refTable: Resources
    description: "List of networks, consortia or catalogues included in this network"
    semantics:
    - dcat:catalog
    profiles:
    - networksstaging
  - name: parent networks
    type: refback
    refTable: Resources
    refBack: child networks
    description: The consortia or networks that this resource is part of
  - name: networks other
    type: text
    description: List the names of any other networks that are not listed and this resource is involved in
    profiles:
    - ema
- heading: available data and samples
  description: Data model and contents
  columns:
  - name: datasets
    type: refback
    refTable: Datasets
    refBack: resource
    description: List of datasets contained in this resouce if applicable
  - name: samplesets
    type: refback
    refTable: Samplesets
    refBack: resource
    description: List of sample sets contained in this resource if applicable
  - name: areas of information
    type: ontology_array
    refTable: Areas of information cohorts
    description: Areas of information that were collected
  - name: areas of information rwd
    type: ontology_array
    refTable: Areas of information ds
    description: Areas of information that were collected
  - name: quality of life other
    type: text
    description: "If 'other', specify additional quality of life measures"
  - name: cause of death code other
    type: text
    description: "If 'other', what cause of death vocabulary is used?"
  - name: indication vocabulary other
    type: text
    description: "If 'other', what indication for use vocabulary is used?"
  - name: genetic data vocabulary other
    type: text
    description: "If 'other', what genetic data vocabulary is used?"
  - name: care setting other
    type: text
    description: "If 'other', description of the setting of care"
  - name: medicinal product vocabulary other
    type: text
    description: "If 'other', description of the medicinal product vocabulary"
  - name: prescriptions vocabulary other
    type: text
    description: "If 'other', what prescriptions vocabulary is used?"
  - name: dispensings vocabulary other
    type: text
    description: "If 'other', what dispensings vocabulary is used?"
  - name: procedures vocabulary other
    type: text
    description: "If 'other', what procedures vocabulary is used?"
  - name: biomarker data vocabulary other
    type: text
    description: "If 'other', what biomarker data vocabulary is used?"
  - name: diagnosis medical event vocabulary other
    type: text
    description: "If 'other', what diagnosis medical event vocabulary is used?"
  - name: data dictionary available
    type: bool
    description: Are a data dictionary and a data model available?
  - name: disease details
    type: ontology_array
    refTable: MedDRA
    description: "If data on a specific disease is collected, which diseases does the data source collect information on"
    profiles:
    - ema
  - name: disease details other
    type: text
    description: Specify disease details if not present in MedDRA
    profiles:
    - ema
  - name: biospecimen collected
    type: ontology_array
    refTable: Biospecimens
    description: "If the data bank contains biospecimens, what types of specimen"
  - name: languages
    type: ontology_array
    refTable: Languages
    description: Languages that the records are recorded in (ISO 639)
  - name: multiple entries
    type: bool
    description: Can there be multiple entries for a single person in the data bank?
- heading: linkage
  description: Data linkage
  columns:
  - name: has identifier
    type: bool
    description: Is there a unique identifier for a person in the data bank?
  - name: identifier description
    type: text
    description: "Describe the variable that is used as a unique identifier for a person in the data bank. If the unique identifier is not at level of a person (for example hospital encounter), describe how this is translated to an individual level"
  - name: prelinked
    type: bool
    description: Is the data from this data source linked to other data sources?
  - name: linkage options
    type: text
    description: Linkage options with additional data resources that are available for this resource
  - name: linkage description
    type: text
    description: Provide a high-level description of the linkages that are currently available for this data resource
    profiles:
    - ema
  - name: linkage possibility
    type: bool
    description: Can this data source be linked to other data sources?
  - name: linkage possibility description
    type: text
    description: Description of data sources that can be linked to this data source
    profiles:
    - ema
  - name: linked resources
    type: refback
    refTable: Linkages
    refBack: resource
    description: List of resources that are or can be linked to this main resource
- heading: access conditions
  description: Access and validation information
  columns:
  - name: informed consent type
    type: ontology
    refTable: Informed consent types
    description: What type of informed consent was given for data resource?
  - name: informed consent required
    type: ontology
    refTable: Informed consent required
    description: Is informed consent required for use of the data for research purposes?
  - name: informed consent other
    type: text
    description: "If 'other', describe the conditions when informed consent is required"
  - name: access rights
    type: ontology
    required: if(hricore === true && type?.some(item => item.name !== 'Network' && item.name !== 'Catalogue')) 'This field is mandatory for HRICore compatibility'
    defaultValue: "= {name: 'Non public'}"
    refTable: Access rights
    description: "Information that indicates whether the resource is publicly accessible, has access restrictions or is not public. A default is set for non-public access, because most health datasets contain sensitive information and rules and licenses apply to get access."
    semantics:
    - dcterms:accessRights
  - name: data access conditions
    type: ontology_array
    refTable: Data access conditions
    description: Codes defining data access terms and conditions
  - name: data use conditions
    type: ontology_array
    refTable: Data use conditions
    description: Codes defining data use terms and conditions
  - name: data access conditions description
    type: text
    description: Description of data access terms and use conditions
  - name: data access fee
    type: bool
    description: Does a fee apply to gain access to data of this resource?
  - name: access identifiable data
    type: text
    description: Can identifiable data be accessed in the data bank (including patient/practitioner name/practice name)?
  - name: access identifiable data route
    type: text
    description: "If yes above, what is the route to access or process this information? What permission is required?"
  - name: access subject details
    type: bool
    description: Can individual patients/practitioners/practices be contacted in the data bank?
  - name: access subject details route
    type: text
    description: "If yes to the above, what is the route to access or process this information? What permission is required?"
  - name: access third party
    type: bool
    description: Can (an extract of) the data bank be accessed with permission by a third party?
  - name: access third party conditions
    type: text
    description: "If above is 'yes', describe the conditions under which third-party access may be granted"
  - name: access non EU
    type: bool
    description: Can (an extract of) the data bank be accessed with permission by a non-EU/EEA institution?
  - name: access non EU conditions
    type: text
    description: "If yes to the above, describe the conditions under which non-EU/EEA access may be granted"
  - name: biospecimen access
    type: bool
    description: "If the data bank contains biospecimens (e.g. tissue samples), can these be retrieved?"
  - name: biospecimen access conditions
    type: text
    description: "If yes to the above, describe the conditions under which permission to retrieve biospecimens may be granted"
  - name: governance details
    type: text
    description: "If available, provide a link to documents or webpages that describe the overall governance of the data source bank (governing data access or utilisation for research purposes by existing DAPs)"
  - name: approval for publication
    type: bool
    description: Is an approval needed to publish the results of a study using the data
- heading: updates
  description: Information on the regularity of updates and time lags
  columns:
  - name: release type
    type: ontology
    refTable: Release types
    description: Select whether this resource is a closed dataset or whether new data is released continuously or at a termly basis
    semantics:
    - dcterms:accrualPeriodicity
  - name: release description
    type: text
    description: Description of the release cycle of this resource
  - name: number of records
    type: int
    description: Total number of unique records captured in the data bank (most recent count)
  - name: release frequency
    type: int
    description: Refreshing rate (in months)
  - name: refresh time
    type: int
    description: Average number of days between refresh of data bank with new records
  - name: lag time
    type: int
    description: How many days is the lag time after refresh before a record can be extracted? (e.g. a lag time may occur if the originator conducts quality checks)
  - name: refresh period
    type: ontology_array
    refTable: Refresh periods
    description: "If data are refreshed on fixed dates (e.g. every June and December), when are the refreshes scheduled? Select all that apply from the following:"
  - name: date last refresh
    type: date
    description: Date of last update/refresh
  - name: preservation
    type: bool
    description: Are records preserved in the data bank indefinitely?
  - name: preservation duration
    type: int
    description: "If 'no' to the above, for how long (in years) are records preserved in the data bank?"
- heading: quality
  description: List of relevant studies conducted using the data bank
  columns:
  - name: standard operating procedures
    type: bool
    description: Is there a standard operating procedure document that defines the processes and procedures for data capture and management?
  - name: qualification
    type: bool
    description: "Has the data source successfully undergone a formal qualification process (e.g. from the EMA, ISO or other certifications)?"
  - name: qualifications description
    type: text
    description: "Has the data source successfully undergone a qualification process (e.g. from the EMA)? If yes, describe the qualification(s) granted"
  - name: audit possible
    type: bool
    description: "Are external parties allowed to audit the data? For example, is it possible for an external party to audit the quality or validity of the data source?"
  - name: completeness
    type: text
    description: Describe the completeness of the data bank (e.g. variables with more or fewer missing values)
  - name: completeness over time
    type: text
    description: Describe any changes in completeness of the data bank (e.g. variables with more or fewer missing values) that have occurred  over time
  - name: completeness results
    type: text
    description: What methods or processes are applied to check completeness of the data bank?
  - name: quality description
    type: text
    description: Describe the quality of the data bank (e.g. variables with more or fewer missing values)
  - name: quality over time
    type: text
    description: Describe any changes in quality of the data bank that have occurred  over time
  - name: access for validation
    type: bool
    description: "Can validity of the data in the data bank be verified, e.g. by review of origin medical charts?"
  - name: quality validation frequency
    type: text
    description: How often are data quality checks and validation steps conducted on the data bank?
  - name: quality validation methods
    type: text
    description: What methods or processes are applied for data quality checks and validation steps conducted on the data bank?
  - name: correction methods
    type: text
    description: What methods or processes are applied to correct illogical values in the data bank?
  - name: quality validation results
    description: "If available, provide a link to a publication of the data quality check and validation results"
  - name: quality marks
    type: ontology_array
    refTable: Study quality marks
    description: "Quality marks, such as ENCePP seal"
    profiles:
    - ema
- heading: standards
  description: Use of standard data models and ontologies
  columns:
  - name: mappings to common data models
    type: refback
    refTable: Dataset mappings
    refBack: source
    description: Overview of dataset mappings available
  - name: common data models other
    type: text
    description: "If not in list above, give the name of cdm(s) used by this data source"
  - name: ETL standard vocabularies
    type: ontology_array
    refTable: Vocabularies
    description: "Are data mapped to standardised vocabularies during ETL to the CDM? If yes, what vocabularies are used for events, such as diagnoses?"
  - name: ETL standard vocabularies other
    type: text
    description: "If other, what other vocabularies are used?"
- heading: information
  description: Other information
  columns:
  - name: publications
    type: refback
    refTable: Publications
    refBack: resource
    description: Publication(s) about this resource
  - name: funding sources
    type: ontology_array
    refTable: Funding types
    description: Specify the main financial support sources for the data source in the last three years. Select all that apply
  - name: funding scheme
    type: ontology_array
    refTable: Study funding
    description: The source of funding for the study. Select all that apply
  - name: funding statement
    type: text
    description: Statement listing funding that was obtained for this resource
  - name: citation requirements
    type: text
    description: Citation regulation for this resource
  - name: acknowledgements
    type: text
    description: Acknowledgement statement and citation regulation for this resource
  - name: provenance statement
    type: text
    description: "A statement of any changes in ownership and custody of a resource since its creation that are significant for its authenticity, integrity, and interpretation"
    semantics:
    - dcterms:provenance
  - name: documentation
    type: refback
    refTable: Documentation
    refBack: resource
    description: "Descriptive document(s) available for this resource, e.g. informed consent"
  - name: supplementary information
    type: text
    description: Any other information that needs to be disclosed for this resource
  - name: theme
    type: ontology_array
    required: if(hricore === true && type?.some(item => item.name !== 'Network' && item.name !== 'Catalogue')) 'This field is mandatory for HRICore compatibility'
    defaultValue: "= [{name: 'Health'}]"
    refTable: Themes
    description: "A main category of the resource. A resource can have multiple themes, for health data theme must at least take the value 'Health', which is set as a default"
    semantics:
    - dcat:theme
  - name: applicable legislation
    type: ontology_array
    required: if(hricore === true) 'This field is mandatory for HRICore compatibility'
