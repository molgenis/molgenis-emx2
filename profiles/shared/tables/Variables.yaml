table: Variables
description: Definition of a variable
profiles:
- datacatalogueflat
columns:
- name: resource
  type: ref
  key: 1
  required: true
  refTable: Resources
  description: Resource that this variable is part of
- name: dataset
  type: ref
  key: 1
  required: true
  refTable: Datasets
  refLink: resource
  description: Dataset that this variable is part of
- name: name
  key: 1
  required: true
  description: "Name of the variable, unique within a dataset"
- name: useExternalDefinition
  type: ref
  refTable: Variables
  description: Refer to variable definition in other datasets
- name: label
  description: "Human readable name, if applicable"
- name: description
  type: text
  description: Description of the variable
- name: collection event
  type: ref_array
  refTable: Collection events
  refLink: resource
  description: In case of protocolised data collection this defines the moment(s) in time this variable is collected on
- name: format
  type: ontology
  refTable: Formats
  description: "Data type, e.g. string, integer, decimal, date, datetime, etc."
- name: unit
  type: ontology
  refTable: Units
  description: "In case of a continuous variable, the unit that the variable values are expressed in"
- name: since version
  description: When this variable was introduced
- name: until version
  description: "When this variable was removed, if applicable"
- name: reused in resources
  type: refback
  refTable: Reused variables
  refBack: variable
  description: Listing of variables from other resources that are reused by this resource
- name: repeat unit
  type: ontology
  refTable: Variable repeat units
  description: "The repeat unit, in case the variable was repeatedly collected over time, e.g. month or week"
- name: repeat min
  type: int
  description: The first repeat unit
- name: repeat max
  type: int
  description: The last repeat unit
- name: example values
  type: string_array
  description: Example values for this variable
- name: permitted values
  type: refback
  refTable: Variable values
  refBack: variable
  description: "Listing of variable values, filled out in Variable values table"
- name: keywords
  type: ontology_array
  refTable: Keywords
  description: Keywords that will make the variable easier to find
- name: generated_keywords
  type: ontology_array
  refTable: Keywords
  description: "LLM generated keywords, generated based on variable name, label and description"
- name: vocabularies
  type: ontology_array
  refTable: Vocabularies
  description: Vocabularies used to express the values of this variable
- name: notes
  type: text
  description: Any other information on this variable
- name: mappings
  type: refback
  refTable: Variable mappings
  refBack: target variable
  description: "Listing of harmonised variables this variable was mapped to, filled out in Variable mappings table"
