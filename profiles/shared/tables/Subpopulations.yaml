table: Subpopulations
description: Subpopulations defined for this resource
profiles: [cohort_core]
columns:
  resource:
    type: ref
    key: 1
    required: true
    refTable: Resources
    semantics: ['dcterms:source']
    profiles: [cohort_core]
    description: Resource this subpopulation is part of
  name:
    key: 1
    required: true
    semantics: ['dcterms:title']
    profiles: [cohort_core]
    description: Subpopulation name, e.g. 'mothers in first trimester','newborns'
  pid:
    semantics: ['dcterms:identifier']
    profiles: [cohort_core]
    description: Persistent identifier for this subpopulation
  description:
    type: text
    semantics: ['dcterms:description']
    profiles: [cohort_core]
    description: Subpopulation description
  keywords:
    type: string_array
    semantics: ['dcat:keyword']
    profiles: [cohort_core]
    description: Keywords to increase findability of this subpopulation. Try to use words that are not
      used in the description. Keywords are not displayed on the subpopulation page
  number of participants:
    type: non_negative_int
    semantics: ['healthdcatap:numberOfUniqueIndividuals']
    profiles: [cohort_core]
    description: Number of participants in this subpopulation
  counts:
    type: refback
    refTable: Subpopulation counts
    refBack: subpopulation
    profiles: [cohort_core]
    description: Total number of unique individuals per age(group), gender and year
  inclusion start:
    type: int
    semantics: ['dcat:startDate']
    profiles: [cohort_core]
    description: Year of first included participant
  inclusion end:
    type: int
    semantics: ['dcat:endDate']
    profiles: [cohort_core]
    description: Year of last included participant. Leave empty if data collection is ongoing
  age groups:
    type: ontology_array
    refTable: Age groups
    profiles: [cohort_core]
    description: Age groups within this subpopulation
  age min:
    type: non_negative_int
    semantics: ['healthdcatap:minimumTypicalAge']
    profiles: [cohort_core]
    description: Minimum age of participants within this subpopulation
  age max:
    type: non_negative_int
    semantics: ['healthdcatap:maximumTypicalAge']
    profiles: [cohort_core]
    description: Maximum age of participants within this subpopulation
  main medical condition:
    type: ontology_array
    refTable: Diseases
    profiles: [cohort_core]
    description: Disease groups within this subpopulation, based on ICD-10 and ORPHA code classifications
  comorbidity:
    type: ontology_array
    refTable: Diseases
    profiles: [cohort_core]
    description: Comorbidity within this subpopulation, based on ICD-10 classification
  countries:
    type: ontology_array
    refTable: Countries
    semantics: ['dcterms:spatial']
    profiles: [cohort_core]
    description: Countries where data from this subpopulation largely originate from
  regions:
    type: ontology_array
    refTable: Regions
    semantics: ['dcterms:coverage']
    profiles: [cohort_core]
    description: Geographical regions where data from this subpopulation largely originate from
  inclusion criteria:
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    profiles: [cohort_core]
    description: Inclusion criteria applied to this subpopulation
  other inclusion criteria:
    type: text
    profiles: [cohort_core]
    description: Other inclusion criteria applied to this subpopulation
  exclusion criteria:
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    profiles: [cohort_core]
    description: Exclusion criteria applied to this subpopulation
  other exclusion criteria:
    type: text
    profiles: [cohort_core]
    description: Other exclusion criteria applied to this subpopulation
  contact point:
    type: ref
    refTable: Contacts
    refLink: resource
    semantics: ['dcat:contactPoint']
    profiles: [catalogue_core]
    description: Contact point for this subpopulation. Value copied from Resources table
  publisher:
    type: ref
    refTable: Organisations
    refLink: resource
    semantics: ['dcterms:publisher']
    profiles: [catalogue_core]
    description: Organisation that published this subpopulation. Value copied from Resources table
  creator:
    type: ref_array
    refTable: Organisations
    refLink: resource
    semantics: ['dcterms:creator']
    profiles: [catalogue_core]
    description: Organisation(s) that created this subpopulation. Value copied from Resources table
  issued:
    type: datetime
    semantics: ['dcterms:issued']
    profiles: [cohort_core]
    description: When the data for this subpopulation was first published
  modified:
    type: datetime
    semantics: ['dcterms:modified']
    profiles: [cohort_core]
    description: When the data for this subpopulation was last modified
  theme:
    type: ontology_array
    defaultValue: '= [{name: ''Health''}]'
    refTable: Themes
    semantics: ['dcat:theme']
    profiles: [cohort_core]
    description: A main category of the subpopulation. A subpopulation can have multiple themes, for health
      data theme must at least take the value 'Health', which is set as a default
  access rights:
    type: ontology
    defaultValue: '= {name: ''Non public''}'
    refTable: Access rights
    semantics: ['dcterms:accessRights']
    profiles: [cohort_core]
    description: Information that indicates whether the resource is publicly accessible, has access restrictions
      or is not public. A default is set for non-public access, because most health datasets contain sensitive
      information and rules and licenses apply to get access
  applicable legislation:
    type: ontology_array
    defaultValue: '= [{name: ''Data Governance Act''}]'
    refTable: Legislations
    semantics: ['dcatap:applicableLegislation']
    profiles: [cohort_core]
    description: The legislation that mandates the creation or management of the subpopulation. For health
      datasets, the value must include the data governance act, which is set as a default. URI's to other
      legislations may be included
  provenance statement:
    type: text
    semantics: ['dct:provenance']
    profiles: [ema]
    description: A statement of any changes in ownership and custody of a resource since its creation
      that are significant for its authenticity, integrity, and interpretation
