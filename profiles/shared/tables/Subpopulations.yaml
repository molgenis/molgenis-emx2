table: Subpopulations
description: Subpopulations defined for this resource
profiles:
- datacatalogueflat
columns:
- name: resource
  type: ref
  key: 1
  required: true
  refTable: Resources
  description: Resource this subpopulation is part of
  semantics:
  - dcterms:source
- name: name
  key: 1
  required: true
  description: "Subpopulation name, e.g. 'mothers in first trimester','newborns'"
  semantics:
  - dcterms:title
- name: pid
  description: Persistent identifier for this subpopulation
  semantics:
  - dcterms:identifier
- name: description
  type: text
  description: Subpopulation description
  semantics:
  - dcterms:description
- name: keywords
  type: string_array
  description: Keywords to increase findability of this subpopulation. Try to use words that are not used in the description. Keywords are not displayed on the subpopulation page
  semantics:
  - dcat:keyword
- name: number of participants
  type: non_negative_int
  description: Number of participants in this subpopulation
  semantics:
  - healthdcatap:numberOfUniqueIndividuals
- name: counts
  type: refback
  refTable: Subpopulation counts
  refBack: subpopulation
  description: "Total number of unique individuals per age(group), gender and year"
- name: inclusion start
  type: int
  description: Year of first included participant
  semantics:
  - dcat:startDate
- name: inclusion end
  type: int
  description: Year of last included participant. Leave empty if data collection is ongoing
  semantics:
  - dcat:endDate
- name: age groups
  type: ontology_array
  refTable: Age groups
  description: Age groups within this subpopulation
- name: age min
  type: non_negative_int
  description: Minimum age of participants within this subpopulation
  semantics:
  - healthdcatap:minimumTypicalAge
- name: age max
  type: non_negative_int
  description: Maximum age of participants within this subpopulation
  semantics:
  - healthdcatap:maximumTypicalAge
- name: main medical condition
  type: ontology_array
  refTable: Diseases
  description: "Disease groups within this subpopulation, based on ICD-10 and ORPHA code classifications"
- name: comorbidity
  type: ontology_array
  refTable: Diseases
  description: "Comorbidity within this subpopulation, based on ICD-10 classification"
- name: countries
  type: ontology_array
  refTable: Countries
  description: Countries where data from this subpopulation largely originate from
  semantics:
  - dcterms:spatial
- name: regions
  type: ontology_array
  refTable: Regions
  description: Geographical regions where data from this subpopulation largely originate from
  semantics:
  - dcterms:coverage
- name: inclusion criteria
  type: ontology_array
  refTable: Inclusion Exclusion Criteria
  description: Inclusion criteria applied to this subpopulation
- name: other inclusion criteria
  type: text
  description: Other inclusion criteria applied to this subpopulation
- name: exclusion criteria
  type: ontology_array
  refTable: Inclusion Exclusion Criteria
  description: Exclusion criteria applied to this subpopulation
- name: other exclusion criteria
  type: text
  description: Other exclusion criteria applied to this subpopulation
- name: contact point
  type: ref
  refTable: Contacts
  refLink: resource
  description: Contact point for this subpopulation. Value copied from Resources table
  semantics:
  - dcat:contactPoint
- name: publisher
  type: ref
  refTable: Organisations
  refLink: resource
  description: Organisation that published this subpopulation. Value copied from Resources table
  semantics:
  - dcterms:publisher
- name: creator
  type: ref_array
  refTable: Organisations
  refLink: resource
  description: Organisation(s) that created this subpopulation. Value copied from Resources table
  semantics:
  - dcterms:creator
- name: issued
  type: datetime
  description: When the data for this subpopulation was first published
  semantics:
  - dcterms:issued
- name: modified
  type: datetime
  description: When the data for this subpopulation was last modified
  semantics:
  - dcterms:modified
- name: theme
  type: ontology_array
  defaultValue: "= [{name: 'Health'}]"
  refTable: Themes
  description: "A main category of the subpopulation. A subpopulation can have multiple themes, for health data theme must at least take the value 'Health', which is set as a default"
  semantics:
  - dcat:theme
- name: access rights
  type: ontology
  defaultValue: "= {name: 'Non public'}"
  refTable: Access rights
  description: "Information that indicates whether the resource is publicly accessible, has access restrictions or is not public. A default is set for non-public access, because most health datasets contain sensitive information and rules and licenses apply to get access"
  semantics:
  - dcterms:accessRights
- name: applicable legislation
  type: ontology_array
  defaultValue: "= [{name: 'Data Governance Act'}]"
  refTable: Legislations
  description: "The legislation that mandates the creation or management of the subpopulation. For health datasets, the value must include the data governance act, which is set as a default. URI's to other legislations may be included"
  semantics:
  - dcatap:applicableLegislation
- name: provenance statement
  type: text
  description: "A statement of any changes in ownership and custody of a resource since its creation that are significant for its authenticity, integrity, and interpretation"
  semantics:
  - dct:provenance
