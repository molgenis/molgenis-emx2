table: Collection events
description: Definition of a collection event for a resource
profiles: [cohort_core, study_staging]
columns:
  resource:
    type: ref
    key: 1
    required: true
    refTable: Resources
    semantics: ['dcterms:source']
    profiles: [cohort_core, study_staging]
    description: Resource this collection event is part of
  name:
    key: 1
    required: true
    semantics: ['dcterms:title']
    profiles: [cohort_core, study_staging]
    description: Name of the collection event
  pid:
    semantics: ['dcterms:identifier']
    profiles: [cohort_core]
    description: Persistent identifier for this collection event
  description:
    type: text
    semantics: ['dcterms:description']
    profiles: [cohort_core, study_staging]
    description: Description of the collection event
  subpopulations:
    type: ref_array
    refTable: Subpopulations
    refLink: resource
    semantics: ['dcterms:source']
    profiles: [cohort_core]
    description: Subpopulations that are targetted by this collection event
  keywords:
    type: string_array
    semantics: ['dcat:keyword']
    profiles: [cohort_core]
    description: Keywords to increase findability of this collection event. Try to use words that are
      not used in the description. Keywords are not displayed on the collection event page
  start date:
    type: date
    semantics: ['dcat:startDate']
    profiles: [cohort_core, study_staging]
    description: Start date of data collection
  end date:
    type: date
    semantics: ['dcat:endDate']
    profiles: [cohort_core, study_staging]
    description: End date of data collection. Leave empty if collection is ongoing
  age groups:
    type: ontology_array
    refTable: Age groups
    profiles: [cohort_core, study_staging]
    description: Age groups included in this data collection event
  number of participants:
    type: int
    profiles: [cohort_core, study_staging]
    description: Number of participants sampled in this data collection event
  areas of information:
    type: ontology_array
    refTable: Areas of information cohorts
    profiles: [cohort_core, study_staging]
    description: Areas of information that were extracted in this data collection event
  data categories:
    type: ontology_array
    refTable: Data categories
    profiles: [cohort_core, study_staging]
    description: Methods of data collection used in this collection event
  sample categories:
    type: ontology_array
    refTable: Sample categories
    profiles: [cohort_core, study_staging]
    description: Samples that were collected in this collection event
  standardized tools:
    type: ontology_array
    refTable: Standardized tools
    profiles: [cohort_core, study_staging]
    description: Standardized tools, e.g. surveys, questionnaires, instruments used to collect data for
      this collection event
  standardized tools other:
    type: text
    profiles: [cohort_core, study_staging]
    description: If 'other', please specify
  core variables:
    type: string_array
    profiles: [cohort_core, study_staging]
    description: Name 10-20 relevant variables that were collected in this collection event
  contact point:
    type: ref
    refTable: Contacts
    refLink: resource
    semantics: ['dcat:contactPoint']
    profiles: [catalogue_core]
    description: Contact point for this collection event. Value copied from Resources table
  publisher:
    type: ref
    refTable: Organisations
    refLink: resource
    semantics: ['dcterms:publisher']
    profiles: [catalogue_core]
    description: Organisation that published this collection event. Value copied from Resources table
  creator:
    type: ref_array
    refTable: Organisations
    refLink: resource
    semantics: ['dcterms:creator']
    profiles: [catalogue_core]
    description: Organisation(s) that created this collection event. Value copied from Resources table
  issued:
    type: datetime
    semantics: ['dcterms:issued']
    profiles: [cohort_core, study_staging]
    description: When the data for this collection event was first published
  modified:
    type: datetime
    semantics: ['dcterms:modified']
    profiles: [cohort_core, study_staging]
    description: When the data for this collection event was last modified
  theme:
    type: ontology_array
    defaultValue: '= [{name: ''Health''}]'
    refTable: Themes
    semantics: ['dcat:theme']
    profiles: [cohort_core]
    description: A main category of the collection event. A collection event can have multiple themes,
      for health data theme must at least take the value 'Health', which is set as a default
  access rights:
    type: ontology
    defaultValue: '= {name: ''Non public''}'
    refTable: Access rights
    semantics: ['dcterms:accessRights']
    profiles: [cohort_core]
    description: Information that indicates whether the resource is publicly accessible, has access restrictions
      or is not public. A default is set for non-public access, because most health datasets contain sensitive
      information and rules and licenses apply to get access
  applicable legislation:
    type: ontology_array
    defaultValue: '= [{name: ''Data Governance Act''}]'
    refTable: Legislations
    semantics: ['dcatap:applicableLegislation']
    profiles: [cohort_core]
    description: The legislation that mandates the creation or management of the collection event. For
      health datasets, the value must include the data governance act, which is set as a default. URI's
      to other legislations may be included
  provenance statement:
    type: text
    semantics: ['dct:provenance']
    profiles: [ema]
    description: A statement of any changes in ownership and custody of a resource since its creation
      that are significant for its authenticity, integrity, and interpretation
