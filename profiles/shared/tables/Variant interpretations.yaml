table: Variant interpretations
description: A genetic variation analysis which assign a formal classification to a detected genetic variant.
profiles: [patient_registry]
semantics: ['http://purl.obolibrary.org/obo/NGBO_6000125']
columns:
  id:
    type: auto_id
    key: 1
    required: true
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25364']
    description: One or more characters used to identify, name, or characterize the nature, properties,
      or contents of a thing
  interpretation analysis:
    type: select
    refTable: Variant interpretation analyses
  Variant Definition:
    type: heading
  status:
    type: ontology
    refTable: Status
    semantics: ['http://semanticscience.org/resource/SIO_000033']
    description: An characterisation of the variant that indicates the state or progress (e.g., confirmed,
      to be verified, etc.)
  variants:
    type: multiselect
    refTable: Genomic variants
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C164813']
    description: A unique identifier that represents this variant (e.g., "20:2447955..2447958c>g")
  transcript:
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C1936']
    description: The initial RNA molecule produced by transcription
  parental origin:
    type: ontology
    refTable: Variant origin
    semantics: ['http://purl.obolibrary.org/obo/GENO_0000877']
    description: A quality inhering in an allele that describes its genetic origin (how it came to be
      part of a cell's genome), i.e. whether it occurred de novo through some spontaneous mutation event,
      or was inherited from a parent (e.g., "maternal")
  inheritance:
    type: ontology_array
    refTable: Inheritance pattern
    semantics: ['http://purl.obolibrary.org/obo/GENO_0000141']
    description: The pattern in which a genetic trait or condition is passed from one generation to the
      next, as determined by genetic interactions between alleles of the causal gene, and interactions
      between these alleles and the environment.
  zygosity:
    type: ontology
    refTable: Zygosity
    semantics: ['http://purl.obolibrary.org/obo/GENO_0000133']
    description: An allelic state that describes the degree of similarity between features in a 'single
      locus complement', within the genome of a cell or organism (i.e., whether the alleles or haplotypes
      that reside at the same location on paired chromosomes are the same or different).
  Consensus Classification:
    type: heading
  disease:
    type: ontology
    refTable: Diseases
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C15607']
    description: The diagnosis assigned for this particular observation (e.g., "Spinocerebellar ataxia
      type 34")
  classification:
    type: ontology
    refTable: Variant classifications
    semantics: ['http://purl.obolibrary.org/obo/NGBO_6000303']
    description: A clinical variant interpretation that represents a sequence variant that is previously
      reported and is a recognized cause of the disorder (e.g., "Pathogenic")
  classification summary:
    type: text
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C86073']
    description: Context or an explanation on how the variant classification was derived
  consensus:
    type: refback
    refTable: Interpretation consensus
    refBack: variant interpretation
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C64197']
    description: Agreement as the result of multiple results or opinions on genomic variants
