table: Variant interpretations
description: A genetic variation analysis which assign a formal classification to a detected genetic variant.
semantics:
- http://purl.obolibrary.org/obo/NGBO_6000125
profiles:
- patient_registry
columns:
- name: id
  type: auto_id
  key: 1
  required: true
  description: "One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing"
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C25364
- name: interpretation analysis
  type: select
  refTable: Variant interpretation analyses
- heading: Variant Definition
  columns:
  - name: status
    type: ontology
    refTable: Status
    description: "An characterisation of the variant that indicates the state or progress (e.g., confirmed, to be verified, etc.)"
    semantics:
    - http://semanticscience.org/resource/SIO_000033
  - name: variants
    type: multiselect
    refTable: Genomic variants
    description: "A unique identifier that represents this variant (e.g., \"20:2447955..2447958c>g\")"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C164813
  - name: transcript
    description: The initial RNA molecule produced by transcription
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C1936
  - name: parental origin
    type: ontology
    refTable: Variant origin
    description: "A quality inhering in an allele that describes its genetic origin (how it came to be part of a cell's genome), i.e. whether it occurred de novo through some spontaneous mutation event, or was inherited from a parent (e.g., \"maternal\")"
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000877
  - name: inheritance
    type: ontology_array
    refTable: Inheritance pattern
    description: "The pattern in which a genetic trait or condition is passed from one generation to the next, as determined by genetic interactions between alleles of the causal gene, and interactions between these alleles and the environment."
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000141
  - name: zygosity
    type: ontology
    refTable: Zygosity
    description: "An allelic state that describes the degree of similarity between features in a 'single locus complement', within the genome of a cell or organism (i.e., whether the alleles or haplotypes that reside at the same location on paired chromosomes are the same or different)."
    semantics:
    - http://purl.obolibrary.org/obo/GENO_0000133
- heading: Consensus Classification
  columns:
  - name: disease
    type: ontology
    refTable: Diseases
    description: "The diagnosis assigned for this particular observation (e.g., \"Spinocerebellar ataxia type 34\")"
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C15607
  - name: classification
    type: ontology
    refTable: Variant classifications
    description: "A clinical variant interpretation that represents a sequence variant that is previously reported and is a recognized cause of the disorder (e.g., \"Pathogenic\")"
    semantics:
    - http://purl.obolibrary.org/obo/NGBO_6000303
  - name: classification summary
    type: text
    description: Context or an explanation on how the variant classification was derived
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C86073
  - name: consensus
    type: refback
    refTable: Interpretation consensus
    refBack: variant interpretation
    description: Agreement as the result of multiple results or opinions on genomic variants
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C64197
