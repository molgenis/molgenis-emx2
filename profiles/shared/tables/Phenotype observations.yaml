table: Phenotype observations
description: Beacon v2 Individuals PhenotypicFeatures
semantics:
- http://purl.obolibrary.org/obo/NCIT_C16977
profiles:
- patient_registry
- fair_genomes
columns:
- name: part of clinical observation
  type: select
  key: 1
  required: true
  refTable: Clinical observations
  description: "A reference to a specific clinical observation (e.g., \"Ind001_Phen001\")"
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C87853
- name: type
  type: ontology
  key: 1
  required: true
  refTable: Phenotypes
  description: A term denoting a phenotypic feature. E.g. "Abnormality of body height"
  semantics:
  - http://semanticscience.org/resource/SIO_010056
- name: excluded
  type: bool
  description: "An indication if the phenotype was observed or not. The default is \"false\", in other words the phenotype was observed. Therefore it is only required in cases to indicate that the phenotype was looked for but found to be absent."
  semantics:
  - http://purl.obolibrary.org/obo/HP_0040285
- name: modifiers
  type: ontology_array
  refTable: Phenotypes
  description: "Additional terms to characterize and specify the phenotypic abnormalities defined in the Phenotypic abnormality subontology, with respect to severity laterality, age of onset, and other aspects. E.g. Exacerbated by tobacco use"
  semantics:
  - http://purl.obolibrary.org/obo/HP_0012823
- name: severity
  type: ontology
  refTable: Severity
  description: "A value that describes the intensity of the phenotype (e.g., \"Profound\")"
  semantics:
  - http://purl.obolibrary.org/obo/HP_0012824
