  Experiments lrGS fields:
    variant: Experiments lrGS
    columns:
      genomic fragment length:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/IAO_0000408']
        description: A scalar measurement datum that is the result of measurement of length of a genomic fragment
      A260 to A280 ratio:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C139280']
        description: An assessment of nucleic acid purity that is measured by determining the ratio of light absorbance of
          the nucleic acid sample at 260nm and 280nm respectively.
      A260 to A230 ratio:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C139281']
        description: An assessment of nucleic acid purity that is measured by determining the ratio of light absorbance of
          the nucleic acid sample at 260nm and 230nm respectively.
      concentration measurement type:
        type: ontology
        refTable: Concentration measurement type
        semantics: ['http://purl.allotrope.org/ontologies/process#AFP_0002800']
        description: An concentration measurement is the determination of the concentration of a compound in solution. [Allotrope]
      DIN QC value:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0100661']
        validation: if(parseFloat(dINQCValue) < 1 || parseFloat(dINQCValue) > 10) "Only values between 1 and 10 are allowed."
        description: A data field which describes quality control information
      N50 read length:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/OBI_0001940']
        description: the weighted median item size or N50 is a weighted median of the lengths of items, equal to the length
          of the longest item i such that the sum of the lengths of items greater than or equal in length to i is greater
          than or equal to half the length of all of the items. With regard to assemblies the items are typically contigs
          or scaffolds. It therefore denotes the ability of the software to create contigs and provides information about
          the resulting sequence assembly
      sequencing chemistry:
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0000075']
        description: A laboratory sequencing datum which describes the method and chemistry used to determine the order of
          nucleotides in a DNA molecule
      base rate:
        type: decimal
        description: rate at which bases are produced or processed by the sequencing instrument
        label: base rate (bp/s)
      base quality:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/NGBO_6000281', 'http://purl.obolibrary.org/obo/GENEPIO_0000089']
        description: The percentage of sequenced bases whose Phred quality score exceeds 25, indicating high-confidence base
          calls
        label: base quality (x% bases > Q25 (%)
      samples per flow cell:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25463']
        description: The number of samples per flow cell
      yield:
        type: decimal
        semantics: ['http://biomodels.net/SBO/SBO_0000668']
        description: Output generated as biomass or product from a set of chemical reactions
        label: yield (Gb)
      movietime:
        type: ontology
        refTable: Movietime
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25330']
        description: The period of time during which a sequencing run took place, i.e., the length of time during which the
          instrument records signal data.
      base kinetics included:
        type: bool
        description: Does the experiment contain kinetic information?
      basecaller version:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C181950']
        description: The version of the software used to call the nucleotide bases in a sequencing assay
