table: Processes
description: An event (e.g., an experiment, a clinical observation) that belongs to an individual
profiles: [patient_core]
semantics: ['http://purl.obolibrary.org/obo/NCIT_C29862']
variants:
  Analyses:
    description: An analysis (examination and interpretation) relating to an individual
    profiles: [patient_core]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25391', 'http://edamontology.org/operation_2945']
  Observations:
    description: Findings and circumstances relating to the examination and treatment of an individual
    profiles: [patient_core]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25398']
  Experiments:
    description: An experiment is an investigation that has the goal of verifying, falsifying, or establishing the validity
      of a hypothesis.
    profiles: [patient_core]
    semantics: ['http://semanticscience.org/resource/SIO_000994']
  Metabolomic material processing:
    description: A metabolomics material processing is a protocol application including material enrollments and biomaterial
      transformations.
    profiles: [fair_genomes_metabolomics]
    semantics: ['http://purl.obolibrary.org/obo/OBI_0000073']
  Metabolomic mass spec assays:
    description: A qualitative or quantitative analysis performed to determine the amount of a particular constituent in a
      sample or the biological or pharmacological properties of a drug.
    profiles: [fair_genomes_metabolomics]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C60819']
  Metabolomic analyses:
    description: Basic information, annotation or documentation concerning a metabolomics analysis workflow (but not the workflow
      itself).
    profiles: [fair_genomes_metabolomics]
    semantics: ['http://edamontology.org/data_0949']
  Variant interpretation analyses:
    description: Analyses relating to specific individuals
    extends: [Analyses]
    profiles: [patient_registry]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25391']
  Clinical observations:
    description: This table extends observations with clinical details compatible with phenopacket
    extends: [Observations]
    profiles: [patient_core]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C87853']
  NGS sequencing:
    description: Technologies that facilitate the rapid determination of the nucleotide sequence of large numbers of strands
      or segments of DNA or RNA
    extends: [Experiments]
    profiles: [patient_core]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C101293']
  Experiments OGM:
    description: An Optical Genome Mapping (OGM) experiment
    extends: [Experiments]
    profiles: [patient_registry]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C116162']
  Experiments RNA:
    description: An RNA sequencing experiment
    extends: [NGS sequencing]
    profiles: [patient_registry]
    semantics: ['http://purl.obolibrary.org/obo/OBI_0001177']
  Experiments lrGS:
    description: A long-read Genome Sequencing (lrGS) experiment
    extends: [NGS sequencing]
    profiles: [patient_registry]
    semantics: ['http://edamontology.org/topic_4056']
  Experiments srDNA:
    description: A short-read DNA sequencing experiment
    extends: [NGS sequencing]
    profiles: [patient_registry]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C153598', 'http://edamontology.org/operation_3198']
columns:
  General Information:
    type: heading
    profiles: [patient_core]
  id:
    type: auto_id
    key: 1
    required: true
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25364']
    profiles: [patient_core]
    computed: ERD-E-${mg_autoid}
    description: One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing
  individuals:
    type: multiselect
    refTable: Individuals
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C164337']
    profiles: [patient_core]
    description: A reference to one or more individuals associated to the process
  alternate ids:
    type: string_array
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C90353']
    profiles: [patient_core]
    description: Additional identifiers that identify a process
  affiliated organisations:
    type: multiselect
    refTable: Organisations
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25412']
    profiles: [patient_core]
    description: One or more associations between the individual and an organisation.
  included in resources:
    type: multiselect
    refTable: Resources
    semantics: ['http://purl.obolibrary.org/obo/HSO_0000370']
    profiles: [patient_registry]
    description: A reference to one or more resources that organises processes in a meaningful way (e.g., data releases, subpopulations,
      cohorts, etc.)
  Additional Process Information:
    type: heading
    profiles: [patient_core]
  data source:
    type: select
    refTable: Resources
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C16493']
    profiles: [patient_registry]
    description: The source or origin of the record. For example, an organisation, database, system, etc.
  date created at source:
    type: date
    semantics: ['dcterms:created', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    profiles: [patient_core]
    description: The date the record was created at the source
  created at source by:
    type: select
    refTable: Contacts
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C51820', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    profiles: [patient_core]
    description: The person who created the record at the source
  date updated at source:
    type: date
    semantics: ['dcterms:modified', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    profiles: [patient_core]
    description: The date the record was updated at the source
  updated at source by:
    type: select
    refTable: Contacts
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C51820', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    profiles: [patient_core]
    description: The person who updated the record at the source
  comments:
    type: text
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25393']
    profiles: [patient_core]
    description: A written explanation, observation or criticism added to textual material
  Analyses fields:
    variant: Analyses
    columns:
      Analyses Information:
        type: heading
      date started:
        type: date
        semantics: ['http://semanticscience.org/resource/SIO_000031']
        description: A start date is a time instant pertaining to the date of the beginning of a analysis.
      date completed:
        type: date
        semantics: ['http://semanticscience.org/resource/SIO_000032']
        description: An end date is a time instant pertaining to date of the end of an analysis
      persons involved:
        type: multiselect
        refTable: Contacts
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25461']
        description: Reference to one or more individuals involved in the analysis
  Observations fields:
    variant: Observations
    columns:
      Observations Information:
        type: heading
      date of observation:
        type: date
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C119798']
        description: The date on which an observation took place
      age at observation:
        type: period
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C192236']
        description: The age of the individual at the time of observation (e.g., "P55Y8M12D")
      type of visit:
        type: ontology
        refTable: Visit type
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C103165']
        description: The kind of visit undertaken by the individual within a study such as inpatient, outpatient, telephone,
          baseline, follow up, etc.
      location of observation:
        type: select
        refTable: Organisations
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C119804']
        description: The site in or on the body at which the observation is made.
  Experiments fields:
    variant: Experiments
    columns:
      Sample:
        type: heading
        profiles: [patient_core]
      sample id:
        type: auto_id
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25364']
        profiles: [patient_core]
        computed: ERD-S-${mg_autoid}
        description: One or more characters used to identify, name, or characterize the nature, properties, or contents of
          a sample
      local sample id:
        type: string_array
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25364']
        profiles: [patient_core]
        description: An identifier associated with a particular source, used by the data provider or owner
      sample type:
        type: ontology
        refTable: Sample type
        semantics: ['http://purl.obolibrary.org/obo/FBcv_0003044']
        profiles: [patient_core]
        description: The type of sample as characterized by its biological source material collected for testing, diagnostic,
          propagation, treatment or research purposes
      sample type other:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C126072']
        profiles: [patient_core]
        description: If the sample type is other, provide a description of the sample.
      tissue type:
        type: ontology
        refTable: Tissue type
        semantics: ['http://purl.uniprot.org/core/Tissue']
        profiles: [patient_core]
        description: The tissue type of origin (e.g., lung or heart) for the sample
      aliquot id:
        type: string_array
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C173074']
        profiles: [patient_core]
        description: A unique identifier assigned to an aliquot containing a portion of a biospecimen
      sample availability:
        type: ontology
        refTable: Sample availability
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C19065']
        profiles: [patient_core]
        description: An indication if the sample is available (i.e., retained, available for use, etc.)
      pathological state:
        type: ontology
        refTable: Pathological state
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C28257']
        profiles: [patient_core]
        description: An examination that is performed to determine the extent of the spread of cancer based on histopathologic
          examination of one or more pathology specimens. Pathologic staging uses evidence acquired during the process of
          clinical staging, supplemented by histopathologic examination of surgical specimens.
      volume:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C74720']
        profiles: [patient_core]
        description: The determination of the volume of a sample.
      volume unit:
        type: ontology
        refTable: Units
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C44279']
        profiles: [patient_core]
        description: An indication of the type of unit of measure being used to express a volume.
      percentage tumor cells:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C127771']
        profiles: [patient_core]
        description: The percentage of tumor cells compared to total cells present in this sample.
      age group of individual at collection:
        type: ontology
        refTable: Age groups
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C20587']
        profiles: [patient_core]
        description: A categorical value that groups this individual by age at the time of collection (e.g., "Adult", "18-24
          years", etc.)
      age of individual at collection in years:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0001775']
        profiles: [patient_core]
        description: The age of the individual (in years) at the time of collection
      anatomical location:
        type: ontology
        refTable: Anatomical location
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C170983']
        profiles: [patient_core]
        description: The specific anatomical or biological region associated with a tissue or organ specimen.
      anatomical location other:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C170983']
        profiles: [patient_core]
        description: Additional description on the anatomical or biological region associated with a tissue or organ specimen
      failed quality control:
        type: bool
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0100564']
        profiles: [patient_core]
        description: An indication confirming that quality control processes were carried out and that the sequence did not
          meet the assessment criteria.
      reason failed quality control:
        type: text
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0100559']
        profiles: [patient_core]
        description: An explanation why quality control failed
      registration timestamp:
        type: datetime
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25646']
        profiles: [patient_core]
        description: Date and time at which this sample was listed or recorded officially, i.e. officially qualified or enrolled.
      input amount:
        type: int
        semantics: ['http://purl.allotrope.org/ontologies/role#AFRL_0000010']
        profiles: [patient_core]
        description: Amount of input material in nanogram (ng).
      collected at organisation:
        type: select
        refTable: Organisations
        semantics: ['http://purl.obolibrary.org/obo/OBIB_0000085']
        profiles: [patient_core]
        description: The geographic location where sample collection took place
      collected by:
        type: multiselect
        refTable: Contacts
        semantics: ['http://purl.obolibrary.org/obo/OBI_0001769']
        profiles: [patient_core]
        description: The person or persons responsible for sample collection
      date of collection:
        type: date
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C82515']
        profiles: [patient_core]
        description: Date on which the sample was collected
      storage conditions:
        type: ontology
        refTable: Storage conditions
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C96145']
        profiles: [patient_core]
        description: The conditions under which this sample was stored.
      storage location:
        type: ontology
        refTable: Storage locations
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0100594']
        profiles: [patient_core]
        description: A place on the Earth where this sample is located, by its name or by its geographical location. This
          definition is intentionally vague to allow reuse locally (e.g. which freezer), for contacting (e.g. which institute),
          broadly for logistical or legal reasons (e.g. city, country or continent).
      date of expiration:
        type: date
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C164516']
        profiles: [patient_core]
        description: The date this sample is no longer regarded as fit for use.
      platform model:
        type: ontology
        refTable: Sequencing instrument models
        semantics: ['http://purl.obolibrary.org/obo/GENEPIO_0001921']
        profiles: [patient_core]
        description: "The name of the product and model number of a manufacturer's genomic (dna) sequencer. In FAIR Genomes:\
          \ SequencingInstrumentModel."
      instrument id:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C178947']
        profiles: [patient_core]
        description: The unique number assigned to an instrument (e.g., a sequencer). This could either be the serial number,
          a unique ID generated by the data provider/owner, or another character string used to identify the instrument
      instrument software:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C178947']
        profiles: [patient_registry]
        description: The instrument (e.g., a sequencer) software
      output files:
        type: refback
        refTable: Files
        refBack: produced by experiment
        semantics: ['http://edamontology.org/topic_3168']
        profiles: [patient_registry]
        description: links to output of files
      reference genome used:
        type: ontology
        refTable: Genome accessions
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C164815']
        profiles: [patient_core]
        description: The source-specific version of the published genome assembly.
      observed insert size:
        type: int
        semantics: ['https://w3id.org/fair-genomes/resource/FG_0000002']
        profiles: [patient_core]
        description: In paired-end sequencing, the DNA between the adapter sequences is the insert. The length of this sequence
          is known as the insert size, not to be confused with the inner distance between reads. So, fragment length equals
          read adapter length (2x) plus insert size, and insert size equals read lenght (2x) plus inner distance.
      other quality metrics:
        type: text
        semantics: ['http://edamontology.org/data_3914']
        profiles: [patient_core]
        description: Other NGS quality control metrics, including but not limited to (i) sequencer metrics such as yield,
          error rate, density (K/mm2), cluster PF (%) and phas/prephas (%), (ii) alignment metrics such as QM insert size,
          GC content, QM duplicated reads (%), QM error rate, uniformity/evenness of coverage and maternal cell contamination,
          and (iii) variant call metrics such as number of SNVs/CNVs/SVs called, number of missense/nonsense variants, common
          variants (%), unique variants (%), gender match and trio inheritance check
      run id:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C117058']
        profiles: [patient_core]
        description: A sequence of characters used to uniquely identify a particular run of a test on a particular batch of
          samples
      number of aliquots:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25414', 'http://purl.obolibrary.org/obo/NCIT_C25463']
        description: The number of aliquots (= pertaining to a portion of the whole; any one of two or more samples of something,
          of the same volume or weight)
      storage buffer:
        type: ontology
        refTable: Storage buffer
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C70815']
        description: An ionic compound that resists changes in its pH. The buffer containing the DNA/RNA.
      mean read length:
        type: decimal
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C153362']
        description: The mean number of nucleotides successfully ordered from each side of a nucleic acid fragment obtained
          after the completion of a sequencing process
        label: mean read length (Kb)
      map rate:
        type: decimal
        description: Map rate (%) is the percentage of sequencing reads that successfully align to a reference genome.
        label: map rate (%)
      secondary analysis centre:
        type: multiselect
        refTable: Organisations
        semantics: ['http://id.nlm.nih.gov/mesh/D000094422']
        description: Analysis or reanalysis of existing data collected by another centre usually for a different purpose
  Metabolomic material processing fields:
    variant: Metabolomic material processing
    columns:
      Metabolomic Material Processing:
        type: heading
      processing type:
        type: ontology
        refTable: Metabolomic processing type
        semantics: ['http://purl.obolibrary.org/obo/OBI_0000094']
        description: A planned process which results in physical changes in a specified input material.
      sample extraction:
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0001577']
        description: The transfer of a solute from a liquid phase to another immiscible or partially-miscible liquid phase
          in contact with it.
      filter used:
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0001640']
        description: The filter used in separating of suspended solids from a liquid or gas, usually by forcing a carrier
          gas or liquid through a porous medium.
      passing rate:
        type: int
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0002751']
        description: The volume of carrier gas passing through a chromatography column in unit time.
      SPE cartridge:
        semantics: ['http://purl.obolibrary.org/obo/OMIT_0025161']
        description: A sample preparation technique using a solid adsorbent contained most commonly in a cartridge device,
          or on a disk to adsorb select species from solution.
      washing protocol:
        type: text
        semantics: ['http://purl.obolibrary.org/obo/OBI_0302888']
        description: Washing is a process by which a material entity acting as contaminant (e.g. excess staining reagent)
          is removed by application of one or more cycles of solution in flow.
  Metabolomic mass spec assays fields:
    variant: Metabolomic mass spec assays
    columns:
      Metabolomic Mass Spec Assays:
        type: heading
      assay type:
        type: ontology
        refTable: Metabolomic assay type
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0000470']
        description: Spectrometry where the sample is converted into gaseous ions which are characterised by their mass-to-charge
          ratio and relative abundance.
      inlet port valve:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C50251']
        description: A valve that controls the flow of fluids in through the wall of a chamber.
      mass spectrometer:
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0000982']
        description: A piece of apparatus that consists of at least an ion source, a mass-to-charge analyser, a detector and
          a vacuum system and is used to measure mass spectra.
      ionization source:
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0000960']
        description: A piece of apparatus that takes an analyte and generates ions which are passed to the rest of a mass
          spectrometer for analysis.
      chromatography column:
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0000997']
        description: A piece of apparatus that has the form of a tube with a diameter between 5 to 50 mm and hosts the stationary
          bed in chromatography.
      phase separation protocol:
        type: text
        semantics: ['http://purl.obolibrary.org/obo/CHMO_0002214']
        description: Any method for the synthesis of polymer membranes that involves the polymer transforming from the liquid
          phase of the cast solution to the solid phase.
      source conditions:
        semantics: ['http://purl.obolibrary.org/obo/ZECO_0000104']
        description: Condition in which variables of the experiment are manipulated to determine the variables effect by comparing
          to a control condition.
  Metabolomic analyses fields:
    variant: Metabolomic analyses
    columns:
      Metabolomic Analyses:
        type: heading
      analysis type:
        type: ontology
        refTable: Metabolomic analysis type
        semantics: ['http://edamontology.org/operation_2945']
        description: Apply analytical methods to existing data of a specific type.
      workflow definition:
        type: text
        semantics: ['http://semanticscience.org/resource/SIO_000127']
        description: File content or location that encapsulates the analysis workflow, i.e. a sequence of operations to achieve
          one or more objectives.
      workflow engine:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C48293']
        description: The engine used to execute the workflow such as Papermill, Jupyter, Galaxy or Nextflow.
      workflow published:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C48471']
        description: A printed or electronic work offered for distribution.
      containerized by:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C43186']
        description: The analysis has been boxed by a container engine such as Singularity or Docker.
      software tools:
        semantics: ['http://purl.obolibrary.org/obo/ERO_0000071']
        description: A general term primarily used for digitally stored data such as computer programs and other kinds of
          information read and written by computers.
      parameters:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C44175']
        description: Any factor that defines a system and determines (or limits) its performance.
      dataformats stored:
        type: ontology_array
        refTable: File formats
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C142494']
        description: Which data file formats (i.e. defined ways or layouts of representing and structuring data in a computer
          file, blob, string, message, or elsewhere) are stored and potentially available.
      standards used:
        semantics: ['http://semanticscience.org/resource/SIO_000618']
        description: Any socially-agreed upon specifications used such as Common Workflow Language, mzML, ISA-TAB, FAIR Genomes,
          etc.
      statistical methods applied:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C19044']
        description: A method of analyzing or representing statistical data or a procedure for calculating a statistic, such
          as principal component analysis, affinity propagation clustering, T-test, etc.
  Variant interpretation analyses fields:
    variant: Variant interpretation analyses
    columns:
      Variant Interpretation Analyses:
        type: heading
      experiment:
        type: multiselect
        refTable: Experiments
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C43376']
        description: Links to experiment
      status:
        type: select
        refTable: Status
        semantics: ['http://semanticscience.org/resource/SIO_000033']
        description: An characterisation of the analysis that indicates the current state or progress (e.g., confirmed, to
          be verified, etc.)
      solved:
        type: bool
        semantics: ['http://purl.obolibrary.org/obo/IAO_0000136']
        description: A reference to the individual whom this analysis is about
      date solved:
        type: date
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25587']
        description: An indication that diagnosis is given and the case is no longer considered unsolved.
      variant interpretation:
        type: refback
        refTable: Variant interpretations
        refBack: interpretation analysis
        semantics: ['http://purl.obolibrary.org/obo/NGBO_6000125']
        description: Links to variant interpretation(s)
  Clinical observations fields:
    variant: Clinical observations
    columns:
      Clinical Observations:
        type: heading
        profiles: [patient_core]
      observation performed by:
        type: select
        refTable: Contacts
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C48206']
        profiles: [patient_core]
        description: The individual that performed the clinical observation (e.g., made the diagnosis, performed the evaluation,
          etc.)
      phenotypes:
        type: refback
        refTable: Phenotype observations
        refBack: part of clinical observation
        refLabel: ${type.name}
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C16977']
        profiles: [patient_core]
        description: The assemblage of traits or outward appearance of an individual. It is the product of interactions between
          genes and between genes and the environment. In medical context,  these are often the symptoms caused by a disease.
      diseases:
        type: refback
        refTable: Disease history
        refBack: part of clinical observation
        refLabel: ${disease.name}
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C15607']
        profiles: [patient_core]
        description: Any abnormal condition of the body or mind that causes discomfort, dysfunction, or distress to the person
          affected or those in contact with the person. The term is often used broadly to include injuries, disabilities,
          syndromes, symptoms, deviant behaviors, and atypical variations of structure and function.
      measurements:
        type: refback
        refTable: Clinical measurements
        refBack: part of clinical observation
