table: File locations
description: File locations refers to the specific places or paths where files are stored on a computer or within a file system
profiles:
- patient_registry
columns:
- name: file
  type: select
  key: 1
  required: true
  refTable: Files
  description: The literal identifier for an electronic file
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C171191
- name: storage location
  type: select
  key: 1
  required: true
  refTable: File storage location
  description: "The location a file is stored (e.g., server, building, filing cabinet, etc.)"
- name: path
  key: 1
  required: true
  description: "A file path is an identifier for a file in a file system or network (e.g., a scp compatible <host>:<path>)"
  semantics:
  - http://purl.allotrope.org/ontologies/result#AFR_0001927
- name: included in resources
  type: multiselect
  refTable: Resources
  description: "A reference to one or more resources that organises records for in a meaningful way (e.g., data releases, subpopulations, cohorts, etc.)"
  semantics:
  - http://purl.obolibrary.org/obo/HSO_0000370
- name: date created at location
  type: date
  description: The date the record was created at the storage location
  semantics:
  - dcterms:created
  - http://purl.obolibrary.org/obo/NCIT_C16493
- name: created at location by
  type: select
  refTable: Contacts
  description: The person who created the record at the storage location
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C51820
  - http://purl.obolibrary.org/obo/NCIT_C16493
- name: comments
  type: text
  description: "A written explanation, observation or criticism added to textual material"
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C25393
