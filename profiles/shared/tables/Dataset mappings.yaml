table: Dataset mappings
description: Mappings from collected or source datasets to harmonised or target datasets
profiles:
- datacatalogueflat
columns:
- name: source
  type: ref
  key: 1
  required: true
  refTable: Resources
  description: Id of the resource being mapped from
- name: source dataset
  type: ref
  key: 1
  required: true
  refTable: Datasets
  refLink: source
  description: Name of the dataset being mapped from
- name: target
  type: ref
  key: 1
  required: true
  refTable: Resources
  description: "Name of the variable being mapped to, or harmonised with"
  profiles:
  - cohortsstaging
- name: target dataset
  type: ref
  key: 1
  required: true
  refTable: Datasets
  refLink: target
  description: "Name of the dataset being mapped to, or harmonised with"
  profiles:
  - cohortsstaging
- name: order
  type: int
  description: Order in which table ETLs should be executed for this source-target combination
- name: description
  type: text
  description: Human readible description of the mapping
- name: syntax
  type: text
  description: "Formal definition of the mapping, ideally in executable code"
