table: Endpoint
description: General information describing an endpoint
semantics:
- schema:Service
profiles:
- beacon_v2
- datacatalogueflat
columns:
- name: id
  key: 1
  required: true
  description: "A unique proper name or character sequence that identifies this particular person. In Beacon v2: id, in FAIR Genomes: PersonalIdentifier. In RD3: subjectID."
  semantics:
  - schema:identifier
  - dcterms:identifier
- name: type
  type: hyperlink_array
  required: true
  description: This row is an instance of one or more of these class(es) other than the Endpoint table.
  semantics:
  - rdf:type
  profiles:
  - datacatalogueflat
- name: name
  type: string_array
  required: true
  description: A name given to the resource.
  semantics:
  - dcterms:title
- name: version
  type: text
  description: An account of the resource version.
  semantics:
  - dcterms:hasVersion
  profiles:
  - datacatalogueflat
- name: description
  type: text
  description: An account of the resource.
  semantics:
  - dcterms:description
- name: publisher
  type: ref_array
  required: true
  refTable: Agents
  description: An entity responsible for making the resource available.
  semantics:
  - dcterms:publisher
- name: language
  type: hyperlink_array
  description: A language of the resource.
  semantics:
  - dcterms:language
  profiles:
  - datacatalogueflat
- name: license
  type: hyperlink
  required: true
  description: A legal document giving official permission to do something with the resource.
  semantics:
  - dcterms:license
  profiles:
  - datacatalogueflat
- name: conformsTo
  type: hyperlink
  required: true
  description: An established standard to which the described resource conforms.
  semantics:
  - dcterms:conformsTo
  profiles:
  - datacatalogueflat
- name: rights
  type: hyperlink_array
  description: Information about rights held in and over the resource.
  semantics:
  - dcterms:rights
  profiles:
  - datacatalogueflat
- name: accessRights
  type: hyperlink_array
  description: Information about who access the resource or an indication of its security status.
  semantics:
  - dcterms:accessRights
  profiles:
  - datacatalogueflat
- name: contact
  type: ref
  refTable: Contacts
  description: Relevant contact information for the cataloged resource
  semantics:
  - dcat:contactPoint
  profiles:
  - datacatalogueflat
- name: keyword
  type: string_array
  description: A keyword or tag describing a resource.
  semantics:
  - dcat:keyword
  profiles:
  - datacatalogueflat
- name: theme
  type: hyperlink_array
  description: A main category of the resource. A resource can have multiple themes.
  semantics:
  - dcat:theme
  profiles:
  - datacatalogueflat
- name: url
  type: hyperlink
  description: "The root location or primary endpoint of the service (a web-resolvable IRI). For Beacon v2 only, in other cases we want to autogenerate this information."
  semantics:
  - dcat:endpointURL
  profiles:
  - beacon_v2
- name: endPointDescription
  type: hyperlink_array
  description: "A description of the service end-point, including its operations, parameters etc."
  semantics:
  - dcat:endpointDescription
  profiles:
  - datacatalogueflat
- name: metadataCatalog
  type: ref_array
  refTable: Catalog
  description: "With the definition of the FDP as a type of metadata service that serves metadata catalogs, the relation between the Metadata Service and dcat:Catalog is represented by this predicate."
  semantics:
  - fdp-o:metadataCatalog
  profiles:
  - fairdatapoint
- name: organisation
  type: ontology
  refTable: Organisations
  description: Name of the organisation. E.g. University Medical Center Groningen
  semantics:
  - obo:NCIT_C25412
  profiles:
  - beacon_v2
- name: alternativeUrl
  description: Alternative endpoint URL.
  semantics:
  - dcterms:alternative
  - schema:url
  profiles:
  - beacon_v2
- name: conformsToFdpSpec
  type: hyperlink
  required: true
  description: The relation should point to an URI that contains the version of the FDP specifications for which this instance of the FDP conforms to
  semantics:
  - fdp-o:conformsToFdpSpec
  profiles:
  - datacatalogueflat
- name: EJP_RD_personalData
  description: "Set to true if the resource onboarded to the EJP-RD Virtual Platform contains personal data, personal data meaning data related to identified or identifiable persons (as per GDPR definition), otherwise false. Must be String as workaround for current FDP reference implementation limitations."
  semantics:
  - ejp:personalData
  profiles:
  - datacatalogueflat
- name: EJP_RD_vpConnection
  type: hyperlink
  description: This property must be attached to every entity that you wish the EJP-RD Virtual Platform to explore.
  semantics:
  - ejp:vpConnection
  profiles:
  - datacatalogueflat
- name: issued
  type: datetime
  semantics:
  - dcterms:issued
  - fdp-o:metadataIssued
  profiles:
  - datacatalogueflat
- name: modified
  type: datetime
  semantics:
  - dcterms:modified
  - fdp-o:metadataModified
  profiles:
  - datacatalogueflat
