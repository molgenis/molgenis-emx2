name: MOLGENIS shared catalogue bundle
description: Shared tables for all catalogue variants, cohorts, patient registries, and related deployments
imports:
- tables/
- ontologies/tables/

demodata: [_demodata/applications/datacatalogue]
settings: [_settings/datacatalogue]
permissions:
  view: anonymous
additionalSchemas:
  CatalogueOntologies:
    model: catalogue-ontologies/molgenis.yaml
    permissions:
      view: anonymous

profiles:
  catalogue_core:
    description: Core catalogue columns visible in all catalogue-family templates
    internal: true
  cohort_core:
    description: Cohort-specific columns shared by CohortsStaging, UMCGCohortsStaging, and UMCUCohorts
    includes: [catalogue_core]
    internal: true
  rwe_core:
    description: RWE columns also visible in EMA template
    includes: [rwe_staging]
    internal: true
  ema:
    description: EMA-specific columns (drug study registry)
    includes: [rwe_core]
    internal: true
  integrate:
    description: INTEGRATE-specific columns
    includes: [catalogue_core]
    internal: true
  patient_core:
    description: Shared patient registry and FAIR Genomes columns
    internal: true
  fair_genomes_metabolomics:
    description: FAIR Genomes metabolomics extension
    includes: [patient_core]
    internal: true
  aggregate_core:
    description: DataCatalogue aggregates columns
    internal: true
  rwe_staging:
    description: Real-world evidence staging workspace
    includes: [catalogue_core]
  study_staging:
    description: Study registry staging workspace
    includes: [catalogue_core]
  networks_staging:
    description: Networks staging workspace
    includes: [catalogue_core]
  data_catalogue:
    description: Standard MOLGENIS data catalogue (flat resource view)
    includes: [catalogue_core]
  cohorts_staging:
    description: Cohort registry staging workspace
    includes: [cohort_core]
    settings: [_settings/datacatalogue_sharedstaging]
  integrate_cohorts:
    description: INTEGRATE cohort staging workspace
    includes: [integrate, cohort_core]
  umcg_cohorts_staging:
    description: UMCG cohorts staging workspace
    includes: [cohort_core]
  umcu_cohorts:
    description: UMCU cohorts workspace
    includes: [cohort_core]
  patient_registry:
    description: Patient registry (includes catalogue resource view)
    includes: [patient_core, catalogue_core]
    settings: [_settings/patient_registry]
  fair_genomes:
    description: FAIR Genomes patient registry
    includes: [patient_core]
  data_catalogue_aggregates:
    description: Data catalogue aggregate dashboard
    includes: [aggregate_core]
  fair_data_point:
    description: FAIR Data Point deployment
    includes: [catalogue_core]
  beacon_v2:
    description: Beacon v2 endpoint deployment
