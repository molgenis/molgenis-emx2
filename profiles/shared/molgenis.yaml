name: MOLGENIS shared catalogue bundle
description: Shared tables for all catalogue variants, cohorts, patient registries, and related deployments
imports:
- tables/
- ontologies/tables/

demodata: [_demodata/applications/datacatalogue]
settings: [_settings/datacatalogue]
permissions:
  view: anonymous
additionalSchemas:
  CatalogueOntologies:
    bundle: catalogue-ontologies/molgenis.yaml
    permissions:
      view: anonymous

profiles:
  - name: datacatalogueflat
    description: Core catalogue columns visible in all catalogue-family templates
    internal: true
  - name: rwestaging
    description: Real-world evidence staging workspace
    includes: [datacatalogueflat]
    internal: true
  - name: ema
    description: EMA-specific columns (drug study registry)
    includes: [rwestaging]
  - name: cohortsstaging
    description: Cohort registry staging workspace
    includes: [datacatalogueflat]
    settings: [_settings/datacatalogue_sharedstaging]
  - name: umcgcohortsstaging
    description: UMCG cohorts staging workspace
    includes: [datacatalogueflat]
  - name: umcucohorts
    description: UMCU cohorts workspace
    includes: [datacatalogueflat]
  - name: networksstaging
    description: Networks staging workspace
    includes: [datacatalogueflat]
  - name: studiesstaging
    description: Study registry staging workspace
    includes: [datacatalogueflat]
  - name: integrate
    description: INTEGRATE-specific columns
    includes: [datacatalogueflat]
  - name: patient_registry
    description: Patient registry (includes catalogue resource view)
    includes: [datacatalogueflat]
    settings: [_settings/patient_registry]
  - name: fair_genomes
    description: FAIR Genomes patient registry
  - name: fair_genomes_metabolomics_add_on
    description: FAIR Genomes metabolomics extension
    includes: [fair_genomes]
  - name: datacatalogueaggregates
    description: Data catalogue aggregate dashboard
  - name: fairdatapoint
    description: FAIR Data Point deployment
    includes: [datacatalogueflat]
  - name: beacon_v2
    description: Beacon v2 endpoint deployment
