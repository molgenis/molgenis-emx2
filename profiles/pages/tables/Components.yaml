table: Components
description: Content to display in the frontend
profiles:
- pages
variants:
- name: Text elements
  description: All text elements
  profiles:
  - pages
- name: Images
  description: <img> elements
  profiles:
  - pages
- name: Ordered lists
  description: <ol> elements
  profiles:
  - pages
- name: Unordered lists
  description: <ul> elements
  profiles:
  - pages
- name: Navigation groups
  description: <nav> elements
  profiles:
  - pages
- name: Navigation cards
  description: ""
  profiles:
  - pages
- name: Headings
  description: <h*> elements
  extends:
  - Text elements
  profiles:
  - pages
- name: Paragraphs
  description: <p> elements
  extends:
  - Text elements
  profiles:
  - pages
columns:
- section: Content
  columns: []
- section: Configuration
  columns:
  - heading: Component connections
    description: Create links between components and blocks
    columns:
    - name: in block
      type: multiselect
      refTable: Blocks
      description: A link to the block where the component is used
  - heading: Metadata
    columns:
    - name: id
      type: auto_id
      key: 1
      required: true
      description: An auto ID used to generate UI elements
- variant: Text elements
  columns:
  - name: text
    type: text
    description: The content to display
- variant: Images
  columns:
  - name: display name
    description: An optional name to display in place of the filename
  - name: image
    type: file
    description: Select an image file
  - name: alt
    description: A description of the image for accessibility compliance
  - name: width
    description: "The width of an image. Use CSS units: 10px, 50%, 5em, etc."
  - name: height
    description: "The height of an image. Use CSS units: 10px, 50%, 5em, etc."
  - name: image is centered
    type: bool
    defaultValue: "false"
    description: "If true, the image will be centered aligned"
- variant: Ordered lists
  columns:
  - name: items
    type: text_array
- variant: Unordered lists
  columns:
  - name: items
    type: text_array
- variant: Navigation groups
  columns:
  - name: links
    type: refback
    refTable: Navigation cards
    refBack: displayed in navigation group
    description: A reference to one or more card that contains a link to another page
- variant: Navigation cards
  columns:
  - name: title
    description: An optional title for the card
  - name: description
    description: An optional description that provides context for the link
  - name: url
    type: hyperlink
    description: A link to an internal or external page
  - name: url label
    description: A label to display instead of the URL
  - name: url is external
    type: bool
    defaultValue: "false"
    description: "If true, the link will be rendered as an external link"
  - name: displayed in navigation group
    type: multiselect
    refTable: Navigation groups
    description: A reference to the navigation list
- variant: Headings
  columns:
  - name: level
    type: int
    description: Enter an HTML Heading element level (1-6). Please note that heading levels corresponds to page hierarchy and it should not be used to style headings; this should be done elsewhere.
    validation: if (level && (level < 1 || level > 6)) "Level must corresponding to an HTML heading element. Use a level from 1 to 6."
  - name: heading is centered
    type: bool
    defaultValue: "false"
    description: "If true, the heading will be center aligned"
  - name: heading is hidden
    type: bool
    defaultValue: "false"
    description: "If true, the heading will be visually hidden"
- variant: Paragraphs
  columns:
  - name: paragraph is centered
    type: bool
    defaultValue: "false"
    description: "If true, the paragraph will be centered aligned"
