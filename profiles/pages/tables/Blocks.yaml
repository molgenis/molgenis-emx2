table: Blocks
description: Subcontainers with in a page used to group components
variants:
  Sections:
    description: Subcontainers for providing context to components
  Headers:
    description: <header> elements
sections:
  Configuration:
    headings:
      UI settings:
        columns:
          enable full screen width:
            type: bool
            defaultValue: 'false'
            description: If true, content will be expanded to the fit the full width of the screen
      Component connections:
        description: Link components and set the order in which they display on page.
        columns:
          in container:
            type: multiselect
            refTable: Configurable pages
            description: A link to the configurable page where the block is displayed
          components:
            type: refback
            refTable: Components
            refBack: in block
            description: The elements that are displayed in a block
          component order:
            type: refback
            refTable: Component orders
            refBack: block
      Metadata:
        columns:
          id:
            type: auto_id
            key: 1
            required: 'true'
            description: An auto ID used to generate UI elements
  Headers:
    variant: Headers
    columns:
      Content:
        type: section
      title:
        description: A title for the page
      subtitle:
        description: An optional secondary title that describes the page
      background image:
        type: select
        refTable: Images
        description: An image to display in the background of the header
      title is centered:
        type: bool
        defaultValue: 'false'
        description: If true, the title and subtitle will be center aligned
