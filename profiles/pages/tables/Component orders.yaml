table: Component orders
description: The order of components with blocks
columns:
  id:
    type: auto_id
    key: 1
  block:
    type: select
    refTable: Blocks
    description: A block page where a component is used
  component:
    type: select
    refTable: Components
    description: The component that you would like to order
  order:
    type: int
    description: The order in which the component appears within the block where 0 is the first item
