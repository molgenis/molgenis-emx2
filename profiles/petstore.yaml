name: Pet store
description: Classic MOLGENIS pet store demo plus type-test tables — example of a single-file bundle form with 11 inline tables.
demodata:
- _demodata/applications/petstore
settings:
- _settings/petstore
permissions:
  view: anonymous
tables:
  Category:
    columns:
    - name: name
      key: 1
      required: true
  Pet:
    description: My pet store example table
    columns:
    - name: name
      key: 1
      required: true
      description: the name
      semantics:
      - http://example.com/petstore#hasName
    - name: category
      type: radio
      required: true
      refTable: Category
    - name: photoUrls
      type: string_array
    - section: details
      description: Details
      columns:
      - name: status
        semantics:
        - http://example.com/petstore#hasStatus
      - name: tags
        type: ontology_array
        refTable: Tag
        semantics:
        - http://example.com/petstore#hasTags
      - name: weight
        type: decimal
        required: true
        semantics:
        - http://example.com/petstore#hasWeight
      - heading: Heading2
        columns:
        - name: orders
          type: refback
          refTable: Order
          refBack: pet
  Order:
    columns:
    - name: orderId
      type: auto_id
      key: 1
      required: true
      computed: "ORDER:${mg_autoid}"
    - name: pet
      type: select
      refTable: Pet
    - name: quantity
      type: long
      validation: if(quantity < 1) 'quantity should be >= 1'
    - name: price
      type: decimal
      validation: price >= 1
    - name: complete
      type: bool
    - name: status
      defaultValue: hallo
  User:
    semantics:
    - foaf:Person
    columns:
    - name: username
      key: 1
      required: true
      semantics:
      - foaf:accountName
    - name: firstName
      semantics:
      - foaf:firstName
    - name: lastName
      semantics:
      - foaf:lastName
    - name: picture
      type: file
      semantics:
      - foaf:img
    - name: email
      type: email
      semantics:
      - foaf:mbox
    - name: password
    - name: phone
      semantics:
      - foaf:phone
    - name: userStatus
      type: int
    - name: pets
      type: multiselect
      refTable: Pet
      semantics:
      - http://example.com/petstore#hasPets
    - section: address
      columns:
      - name: street
        visible: lastName
  Types:
    description: A table containing a column for each column type
    columns:
    - section: String types
      columns:
      - heading: Simple string types
        columns:
        - name: string type
          key: 1
          required: true
        - name: string array type
          type: string_array
        - name: text type
          type: text
        - name: text array type
          type: text_array
      - heading: Extended string types
        columns:
        - name: auto id type
          type: auto_id
          key: 1
          required: true
        - name: json type
          type: json
        - name: email type
          type: email
        - name: email array type
          type: email_array
        - name: hyperlink type
          type: hyperlink
        - name: hyperlink array type
          type: hyperlink_array
    - section: Numeric types
      columns:
      - heading: Simple numeric types
        columns:
        - name: int type
          type: int
        - name: int array type
          type: int_array
        - name: long type
          type: long
        - name: long array type
          type: long_array
        - name: decimal type
          type: decimal
        - name: decimal array type
          type: decimal_array
      - heading: Extended numeric types
        columns:
        - name: non negative int type
          type: non_negative_int
        - name: non negative int array type
          type: non_negative_int_array
    - section: Primitive types
      columns:
      - name: bool type
        type: bool
      - name: bool array type
        type: bool_array
      - name: uuid type
        type: uuid
      - name: uuid array type
        type: uuid_array
      - name: file type
        type: file
      - heading: Date types
        columns:
        - name: date type
          type: date
        - name: date array type
          type: date_array
        - name: datetime type
          type: datetime
        - name: datetime array type
          type: datetime_array
        - name: period type
          type: period
        - name: period array type
          type: period_array
    - section: Relationship types
      columns:
      - name: ref type
        type: ref
        refTable: Options
      - name: select type
        type: select
        refTable: Options
      - name: select type Label
        type: select
        refTable: Options
        refLabel: "${optionValue}"
      - name: radio type
        type: radio
        refTable: Options
      - name: radio type Label
        type: radio
        refTable: Options
        refLabel: "${optionValue}"
      - name: ref array type
        type: ref_array
        refTable: Options
      - name: checkbox type
        type: checkbox
        refTable: Options
      - name: checkbox type Label
        type: checkbox
        refTable: Options
        refLabel: "${optionValue}"
      - name: multiselect type
        type: multiselect
        refTable: Options
      - name: multiselect type Label
        type: multiselect
        refTable: Options
        refLabel: "${optionValue}"
      - name: ref back type
        type: ref
        refTable: Options
      - name: ontology small type
        type: ontology
        refTable: OntologySmall
        refLabel: "${label}"
      - name: ontology large type
        type: ontology
        refTable: OntologyLarge
        refLabel: "${label}"
      - name: ontology small array type
        type: ontology_array
        refTable: OntologySmall
        refLabel: "${label}"
      - name: ontology large array type
        type: ontology_array
        refTable: OntologyLarge
        refLabel: "${label}"
      - name: ontology small tree type
        type: ontology
        refTable: OntologySmallTree
        refLabel: "${label}"
      - name: ontology large tree type
        type: ontology
        refTable: OntologyLargeTree
        refLabel: "${label}"
      - name: ontology small tree array type
        type: ontology_array
        refTable: OntologySmallTree
        refLabel: "${label}"
      - name: ontology large tree array type
        type: ontology_array
        refTable: OntologyLargeTree
        refLabel: "${label}"
    - section: Conditional required
      columns:
      - name: nameKnown
        type: bool
        required: false
      - name: nameRequiredIfNameKnownYes
        required: if(nameKnown) 'Name is required if name is known'
      - name: nameNoConditional
        required: false
    - section: validationsVisible
      columns:
      - name: year
        type: int
        required: false
        validation: var CurrentDate =new Date().getFullYear() + 1; if (parseInt(year)>= CurrentDate || parseInt(year)<=1599) "It appears you have entered a year that is not within the allowed range. Please enter a year between 1600 and the current year."
        label: Year of Birth (validation between 1600 and current year)
      - name: showVisibleExpressionVariable
        type: ontology
        required: false
        refTable: YesNoUnknown
        refLabel: "${label}"
        label: If put to yes the test visible expression variable will be shown
      - name: testVisible
        required: false
        visible: showVisibleExpressionVariable?.name === "yes"
        label: Test visible expression (visible if stringKnown is yes)
      - name: code
        validation: if(code.length<4 || code.length>12)'Code should be 4-12 characters long'
        label: What is the code? (validated min 4 - max 12 characters)
      - name: additionalInfo
        type: ontology
        refTable: YesNoUnknown
        refLabel: "${label}"
        label: "Additional info, if yes a new header will appear."
      - heading: additionalInfoHeader
        columns:
        - name: dateStart
          type: date
          validation: "var today =new Date(); var dateFormat=today.toISOString().split('T')[0]; var minDate = new Date('1900-01-01'); var minDateFormat=minDate.toISOString().split('T')[0]; if (dateStart>dateFormat || dateStart<minDateFormat)\"It appears you have entered a date that is not within the allowed range. Please enter a date that is between 01-01-1900 and today.\""
          visible: additionalInfo?.name === "yes"
          label: Date Start (validation between 01-01-1900 and today)
  Options:
    description: A table with options to test the ref/ref-array/radio/select/multiselect columns
    columns:
    - name: option key
      key: 1
      required: true
    - name: option value
  OntologyLarge:
    description: A table with options to test the large ontology like columns
  OntologyLargeTree:
    description: A table with options and parents to test the large tree ontology like columns
  OntologySmall:
    description: A table with limited options to test the small ontology like columns
  OntologySmallTree:
    description: A table with options and parents to test the small tree ontology like columns
  YesNoUnknown:
    description: "Yes, no, unknown"
