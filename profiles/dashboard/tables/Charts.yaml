table: Charts
description: Visualisations that are displayed on page
semantics:
- http://semanticscience.org/resource/SIO_000904
columns:
- name: chart id
  key: 1
  required: true
  description: "A unique value that identifies a visualisation, the associated settings and data points."
  semantics:
  - http://semanticscience.org/resource/SIO_000115
- name: chart type
  type: ontology
  refTable: Chart types
  description: "The chart type (e.g., pie chart, table, bar, etc.)"
  semantics:
  - http://semanticscience.org/resource/SIO_000904
- name: chart title
  description: A title to be displayed above a chart
  semantics:
  - http://semanticscience.org/resource/SIO_000473
- name: chart subtitle
  description: A subtitle to be displayed below the title. This text provides additional context for the data points displayed in the chart.
  semantics:
  - http://semanticscience.org/resource/SIO_000474
- name: x axis label
  description: Text to be displayed along the x-axis (horizontal axis)
  semantics:
  - "http://semanticscience.org/resource/SIO_000452,http://semanticscience.org/resource/SIO_000179,http://semanticscience.org/resource/SIO_001316"
- name: x axis min value
  type: int
  description: A value that indicates the minimum threshold to display on the x-axis (applies only to continuous variables)
  semantics:
  - "http://semanticscience.org/resource/SIO_000452,http://semanticscience.org/resource/SIO_001113"
- name: x axis max value
  type: int
  description: A value that indicates the minimum threshold to display on the x-axis (applies only to continuous variables)
  semantics:
  - "http://semanticscience.org/resource/SIO_000452,http://semanticscience.org/resource/SIO_001114"
- name: x axis ticks
  type: int_array
  description: An array of numbers that indicate the breakpoints on the x-axis
  semantics:
  - "http://semanticscience.org/resource/SIO_000452,http://semanticscience.org/resource/SIO_000915"
- name: y axis label
  description: Text to be displayed along the y-axis (vertical axis)
  semantics:
  - "http://semanticscience.org/resource/SIO_000453,http://semanticscience.org/resource/SIO_000179"
- name: y axis min value
  type: int
  description: A value that indicates the minimum threshold to display on the y-axis (applies only to continuous variables)
  semantics:
  - "http://semanticscience.org/resource/SIO_000453,http://semanticscience.org/resource/SIO_001113"
- name: y axis max value
  type: int
  description: A value that indicates the minimum threshold to display on the y-axis (applies only to continuous variables)
  semantics:
  - "http://semanticscience.org/resource/SIO_000453,http://semanticscience.org/resource/SIO_001114"
- name: y axis ticks
  type: int_array
  description: An array of numbers that indicate the breakpoints on the y-axis
  semantics:
  - "http://semanticscience.org/resource/SIO_000453,http://semanticscience.org/resource/SIO_000915,http://semanticscience.org/resource/SIO_001316"
- name: color palette
  type: refback
  refTable: Chart palette
  refBack: included in chart
  description: Color palette for distinct groups in a dataset
  semantics:
  - http://purl.obolibrary.org/obo/PATO_0000014
- name: top margin
  type: int
  defaultValue: 15
  description: A number that indicates the amount of white space to add to the top of the chart
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C69210
  validation: |-
    (function () {
      if (topMargin !== null && topMargin < 0) {
      return "The top margin cannot be less than 0"
      }
      if (topMargin !== null && topMargin > 250) {
      return "The top margin cannot be more than 250"
      }
    })();
- name: right margin
  type: int
  defaultValue: 15
  description: A number that indicates the amount of white space to add to the right of the chart
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C69201
  validation: |-
    (function () {
      if (rightMargin !== null && rightMargin < 0) {
      return "The right margin cannot be less than 0"
      }
      if (rightMargin !== null && rightMargin > 250) {
      return "The right margin cannot be more than 250"
      }
    })();
- name: bottom margin
  type: int
  defaultValue: 60
  description: A number that indicates the amount of white space to add to the bottom of the chart
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C69210
  validation: |-
    (function () {
      if (bottomMargin !== null && bottomMargin < 0) {
      return "The bottom margin cannot be less than 0"
      }
      if (bottomMargin !== null && bottomMargin > 250) {
      return "The bottom margin cannot be more than 250"
      }
    })();
- name: left margin
  type: int
  defaultValue: 80
  description: A number that indicates the amount of white space to add to the left of the chart
  semantics:
  - http://purl.obolibrary.org/obo/NCIT_C69201
  validation: |-
    (function () {
      if (leftMargin !== null && leftMargin < 0) {
      return "The left margin cannot be less than 0"
      }
      if (leftMargin !== null && leftMargin > 250) {
      return "The left margin cannot be more than 250"
      }
    })();
- name: legend position
  type: ontology
  defaultValue: top
  refTable: Legend positions
  description: The position of the legend around the chart.
  semantics:
  - "http://semanticscience.org/resource/SIO_000468,http://semanticscience.org/resource/SIO_000056"
- name: data points
  type: refback
  refTable: Chart data
  refBack: included in chart
  description: Data that is prepared to be used in a chart
  semantics:
  - http://semanticscience.org/resource/SIO_000546
- name: dashboard page
  type: ref
  refTable: Dashboard pages
  semantics:
  - http://semanticscience.org/resource/SIO_000302
