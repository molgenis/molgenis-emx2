---
table: "Types"
description: "A table containing a column for each column type"
sections:
- columns:
  - name: "String types"
    type: "section"
  - name: "Simple string types"
    type: "heading"
  - name: "string type"
    key: 1
    required: "true"
  - name: "string array type"
    type: "string_array"
  - name: "text type"
    type: "text"
  - name: "text array type"
    type: "text_array"
  - name: "Extended string types"
    type: "heading"
  - name: "auto id type"
    type: "auto_id"
    key: 1
    required: "true"
  - name: "json type"
    type: "json"
  - name: "email type"
    type: "email"
  - name: "email array type"
    type: "email_array"
  - name: "hyperlink type"
    type: "hyperlink"
  - name: "hyperlink array type"
    type: "hyperlink_array"
  - name: "Numeric types"
    type: "section"
  - name: "Simple numeric types"
    type: "heading"
  - name: "int type"
    type: "int"
  - name: "int array type"
    type: "int_array"
  - name: "long type"
    type: "long"
  - name: "long array type"
    type: "long_array"
  - name: "decimal type"
    type: "decimal"
  - name: "decimal array type"
    type: "decimal_array"
  - name: "Extended numeric types"
    type: "heading"
  - name: "non negative int type"
    type: "non_negative_int"
  - name: "non negative int array type"
    type: "non_negative_int_array"
  - name: "Primitive types"
    type: "section"
  - name: "bool type"
    type: "bool"
  - name: "bool array type"
    type: "bool_array"
  - name: "uuid type"
    type: "uuid"
  - name: "uuid array type"
    type: "uuid_array"
  - name: "file type"
    type: "file"
  - name: "Date types"
    type: "heading"
  - name: "date type"
    type: "date"
  - name: "date array type"
    type: "date_array"
  - name: "datetime type"
    type: "datetime"
  - name: "datetime array type"
    type: "datetime_array"
  - name: "period type"
    type: "period"
  - name: "period array type"
    type: "period_array"
  - name: "Relationship types"
    type: "section"
  - name: "ref type"
    type: "ref"
    refTable: "Options"
  - name: "select type"
    type: "select"
    refTable: "Options"
  - name: "select type Label"
    type: "select"
    refTable: "Options"
    refLabel: "${optionValue}"
  - name: "radio type"
    type: "radio"
    refTable: "Options"
  - name: "radio type Label"
    type: "radio"
    refTable: "Options"
    refLabel: "${optionValue}"
  - name: "ref array type"
    type: "ref_array"
    refTable: "Options"
  - name: "checkbox type"
    type: "checkbox"
    refTable: "Options"
  - name: "checkbox type Label"
    type: "checkbox"
    refTable: "Options"
    refLabel: "${optionValue}"
  - name: "multiselect type"
    type: "multiselect"
    refTable: "Options"
  - name: "multiselect type Label"
    type: "multiselect"
    refTable: "Options"
    refLabel: "${optionValue}"
  - name: "ref back type"
    type: "ref"
    refTable: "Options"
  - name: "ontology small type"
    type: "ontology"
    refTable: "OntologySmall"
    refLabel: "${label}"
  - name: "ontology large type"
    type: "ontology"
    refTable: "OntologyLarge"
    refLabel: "${label}"
  - name: "ontology small array type"
    type: "ontology_array"
    refTable: "OntologySmall"
    refLabel: "${label}"
  - name: "ontology large array type"
    type: "ontology_array"
    refTable: "OntologyLarge"
    refLabel: "${label}"
  - name: "ontology small tree type"
    type: "ontology"
    refTable: "OntologySmallTree"
    refLabel: "${label}"
  - name: "ontology large tree type"
    type: "ontology"
    refTable: "OntologyLargeTree"
    refLabel: "${label}"
  - name: "ontology small tree array type"
    type: "ontology_array"
    refTable: "OntologySmallTree"
    refLabel: "${label}"
  - name: "ontology large tree array type"
    type: "ontology_array"
    refTable: "OntologyLargeTree"
    refLabel: "${label}"
  - name: "Conditional required"
    type: "section"
  - name: "nameKnown"
    type: "bool"
    required: "false"
  - name: "nameRequiredIfNameKnownYes"
    required: "if(nameKnown) 'Name is required if name is known'"
  - name: "nameNoConditional"
    required: "false"
  - name: "validationsVisible"
    type: "section"
    required: "false"
    label: "Validation & visible expressions"
  - name: "year"
    type: "int"
    required: "false"
    validation: "var CurrentDate =new Date().getFullYear() + 1; if (parseInt(year)>=\
      \ CurrentDate || parseInt(year)<=1599) \"It appears you have entered a year\
      \ that is not within the allowed range. Please enter a year between 1600 and\
      \ the current year.\""
    label: "Year of Birth (validation between 1600 and current year)"
  - name: "showVisibleExpressionVariable"
    type: "ontology"
    required: "false"
    refTable: "YesNoUnknown"
    refLabel: "${label}"
    label: "If put to yes the test visible expression variable will be shown"
  - name: "testVisible"
    required: "false"
    visible: "showVisibleExpressionVariable?.name === \"yes\""
    label: "Test visible expression (visible if stringKnown is yes)"
  - name: "code"
    validation: "if(code.length<4 || code.length>12)'Code should be 4-12 characters\
      \ long'"
    label: "What is the code? (validated min 4 - max 12 characters)"
  - name: "additionalInfo"
    type: "ontology"
    refTable: "YesNoUnknown"
    refLabel: "${label}"
    label: "Additional info, if yes a new header will appear."
  - name: "additionalInfoHeader"
    type: "heading"
    visible: "additionalInfo?.name === \"yes\""
    label: "Additional Information (header visible if additional info known is yes)"
  - name: "dateStart"
    type: "date"
    validation: "var today =new Date(); var dateFormat=today.toISOString().split('T')[0];\
      \ var minDate = new Date('1900-01-01'); var minDateFormat=minDate.toISOString().split('T')[0];\
      \ if (dateStart>dateFormat || dateStart<minDateFormat)\"It appears you have\
      \ entered a date that is not within the allowed range. Please enter a date that\
      \ is between 01-01-1900 and today.\""
    visible: "additionalInfo?.name === \"yes\""
    label: "Date Start (validation between 01-01-1900 and today)"
