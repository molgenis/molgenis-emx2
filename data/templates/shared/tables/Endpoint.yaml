table: Endpoint
description: General information describing an endpoint
subsets: [fair_data_point, beacon_v2]
semantics: ['schema:Service']
columns:
  id:
    key: 1
    required: true
    semantics: ['schema:identifier', 'dcterms:identifier']
    subsets: [fair_data_point]
    description: 'A unique proper name or character sequence that identifies this particular person. In
      Beacon v2: id, in FAIR Genomes: PersonalIdentifier. In RD3: subjectID.'
  type:
    type: hyperlink_array
    required: true
    semantics: ['rdf:type']
    subsets: [fair_data_point]
    description: This row is an instance of one or more of these class(es) other than the Endpoint table.
  name:
    type: string_array
    required: true
    semantics: ['dcterms:title']
    subsets: [fair_data_point]
    description: A name given to the resource.
  version:
    type: text
    semantics: ['dcterms:hasVersion']
    subsets: [catalogue_core]
    description: An account of the resource version.
  description:
    type: text
    semantics: ['dcterms:description']
    subsets: [fair_data_point]
    description: An account of the resource.
  publisher:
    type: ref_array
    required: true
    refTable: Agents
    semantics: ['dcterms:publisher']
    subsets: [fair_data_point]
    description: An entity responsible for making the resource available.
  language:
    type: hyperlink_array
    semantics: ['dcterms:language']
    subsets: [fair_data_point]
    description: A language of the resource.
  license:
    type: hyperlink
    required: true
    semantics: ['dcterms:license']
    subsets: [fair_data_point]
    description: A legal document giving official permission to do something with the resource.
  conformsTo:
    type: hyperlink
    required: true
    semantics: ['dcterms:conformsTo']
    subsets: [fair_data_point]
    description: An established standard to which the described resource conforms.
  rights:
    type: hyperlink_array
    semantics: ['dcterms:rights']
    subsets: [fair_data_point]
    description: Information about rights held in and over the resource.
  accessRights:
    type: hyperlink_array
    semantics: ['dcterms:accessRights']
    subsets: [fair_data_point]
    description: Information about who access the resource or an indication of its security status.
  contact:
    type: ref
    refTable: Contacts
    semantics: ['dcat:contactPoint']
    subsets: [catalogue_core]
    description: Relevant contact information for the cataloged resource
  keyword:
    type: string_array
    semantics: ['dcat:keyword']
    subsets: [fair_data_point]
    description: A keyword or tag describing a resource.
  theme:
    type: hyperlink_array
    semantics: ['dcat:theme']
    subsets: [fair_data_point]
    description: A main category of the resource. A resource can have multiple themes.
  url:
    type: hyperlink
    semantics: ['dcat:endpointURL']
    subsets: [beacon_v2]
    description: The root location or primary endpoint of the service (a web-resolvable IRI). For Beacon
      v2 only, in other cases we want to autogenerate this information.
  endPointDescription:
    type: hyperlink_array
    semantics: ['dcat:endpointDescription']
    subsets: [fair_data_point]
    description: A description of the service end-point, including its operations, parameters etc.
  metadataCatalog:
    type: ref_array
    refTable: Catalog
    semantics: ['fdp-o:metadataCatalog']
    subsets: [fair_data_point]
    description: With the definition of the FDP as a type of metadata service that serves metadata catalogs,
      the relation between the Metadata Service and dcat:Catalog is represented by this predicate.
  organisation:
    type: ontology
    refTable: Organisations
    semantics: ['obo:NCIT_C25412']
    subsets: [beacon_v2]
    description: Name of the organisation. E.g. University Medical Center Groningen
  alternativeUrl:
    semantics: ['dcterms:alternative', 'schema:url']
    subsets: [beacon_v2]
    description: Alternative endpoint URL.
  conformsToFdpSpec:
    type: hyperlink
    required: true
    semantics: ['fdp-o:conformsToFdpSpec']
    subsets: [catalogue_core]
    description: The relation should point to an URI that contains the version of the FDP specifications
      for which this instance of the FDP conforms to
  EJP_RD_personalData:
    semantics: ['ejp:personalData']
    subsets: [fair_data_point]
    description: Set to true if the resource onboarded to the EJP-RD Virtual Platform contains personal
      data, personal data meaning data related to identified or identifiable persons (as per GDPR definition),
      otherwise false. Must be String as workaround for current FDP reference implementation limitations.
  EJP_RD_vpConnection:
    type: hyperlink
    semantics: ['ejp:vpConnection']
    subsets: [fair_data_point]
    description: This property must be attached to every entity that you wish the EJP-RD Virtual Platform
      to explore.
  issued:
    type: datetime
    semantics: ['dcterms:issued', 'fdp-o:metadataIssued']
    subsets: [catalogue_core]
  modified:
    type: datetime
    semantics: ['dcterms:modified', 'fdp-o:metadataModified']
    subsets: [catalogue_core]
