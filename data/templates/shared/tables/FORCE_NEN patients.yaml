table: FORCE_NEN patients
description: Resource counts for e.g. samples, clinical data
subsets: [aggregate_core]
columns:
  collection:
    type: ref
    key: 1
    required: true
    refTable: Collections
    description: Network collection id taken from catalogue Collections table
  research center:
    type: ref
    key: 1
    required: true
    refTable: Collections
    description: Research center name to be displayed in aggregate dashboard
  primary tumor site:
    type: ontology
    key: 1
    required: true
    refTable: ICDO topologies
  metastasis:
    type: ontology
    key: 1
    required: true
    refTable: NoYesUnknown
    description: Distant metastasis at diagnosis
  year of diagnosis:
    type: ontology
    key: 1
    required: true
    refTable: Time periods
  sex:
    type: ontology
    key: 1
    required: true
    refTable: Sex
  n:
    type: int
    required: true
    description: count
