table: Subpopulation counts
description: Number of participants per cohort age group, optionally divided per sex
subsets: [cohort_core]
columns:
  resource:
    type: ref
    key: 1
    required: true
    refTable: Resources
    description: Resource id
  subpopulation:
    type: ref
    key: 1
    required: true
    refTable: Subpopulations
    refLink: resource
    description: Subpopulations for these counts
  age group:
    type: ontology
    key: 1
    required: true
    refTable: Age groups
    description: Select the age group for these counts
  N total:
    type: int
    description: Total number
  N female:
    type: int
    description: Number of females
  N male:
    type: int
    description: Number of males
