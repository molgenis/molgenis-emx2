table: Subpopulations
description: Subpopulations defined for this resource
subsets: [cohort_core]
sections:
- columns:
  - name: resource
    type: ref
    key: 1
    required: true
    refTable: Resources
    semantics:
    - dcterms:source
    subsets: [cohort_core]
    description: Resource this subpopulation is part of
  - name: name
    key: 1
    required: true
    semantics:
    - dcterms:title
    subsets: [cohort_core]
    description: "Subpopulation name, e.g. 'mothers in first trimester','newborns'"
  - name: pid
    semantics:
    - dcterms:identifier
    subsets: [cohort_core]
    description: Persistent identifier for this subpopulation
  - name: description
    type: text
    semantics:
    - dcterms:description
    subsets: [cohort_core]
    description: Subpopulation description
  - name: keywords
    type: string_array
    semantics:
    - dcat:keyword
    subsets: [cohort_core]
    description: Keywords to increase findability of this subpopulation. Try to use words that are not used in the description.
      Keywords are not displayed on the subpopulation page
  - name: number of participants
    type: non_negative_int
    semantics:
    - healthdcatap:numberOfUniqueIndividuals
    subsets: [cohort_core]
    description: Number of participants in this subpopulation
  - name: counts
    type: refback
    refTable: Subpopulation counts
    refBack: subpopulation
    subsets: [cohort_core]
    description: Total number of unique individuals per age(group), gender and year
  - name: inclusion start
    type: int
    semantics:
    - dcat:startDate
    subsets: [cohort_core]
    description: Year of first included participant
  - name: inclusion end
    type: int
    semantics:
    - dcat:endDate
    subsets: [cohort_core]
    description: Year of last included participant. Leave empty if data collection is ongoing
  - name: age groups
    type: ontology_array
    refTable: Age groups
    subsets: [cohort_core]
    description: Age groups within this subpopulation
  - name: age min
    type: non_negative_int
    semantics:
    - healthdcatap:minimumTypicalAge
    subsets: [cohort_core]
    description: Minimum age of participants within this subpopulation
  - name: age max
    type: non_negative_int
    semantics:
    - healthdcatap:maximumTypicalAge
    subsets: [cohort_core]
    description: Maximum age of participants within this subpopulation
  - name: main medical condition
    type: ontology_array
    refTable: Diseases
    subsets: [cohort_core]
    description: Disease groups within this subpopulation, based on ICD-10 and ORPHA code classifications
  - name: comorbidity
    type: ontology_array
    refTable: Diseases
    subsets: [cohort_core]
    description: Comorbidity within this subpopulation, based on ICD-10 classification
  - name: countries
    type: ontology_array
    refTable: Countries
    semantics:
    - dcterms:spatial
    subsets: [cohort_core]
    description: Countries where data from this subpopulation largely originate from
  - name: regions
    type: ontology_array
    refTable: Regions
    semantics:
    - dcterms:coverage
    subsets: [cohort_core]
    description: Geographical regions where data from this subpopulation largely originate from
  - name: inclusion criteria
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    subsets: [cohort_core]
    description: Inclusion criteria applied to this subpopulation
  - name: other inclusion criteria
    type: text
    subsets: [cohort_core]
    description: Other inclusion criteria applied to this subpopulation
  - name: exclusion criteria
    type: ontology_array
    refTable: Inclusion Exclusion Criteria
    subsets: [cohort_core]
    description: Exclusion criteria applied to this subpopulation
  - name: other exclusion criteria
    type: text
    subsets: [cohort_core]
    description: Other exclusion criteria applied to this subpopulation
  - name: contact point
    type: ref
    refTable: Contacts
    refLink: resource
    semantics:
    - dcat:contactPoint
    subsets: [catalogue_core]
    description: Contact point for this subpopulation. Value copied from Resources table
  - name: publisher
    type: ref
    refTable: Organisations
    refLink: resource
    semantics:
    - dcterms:publisher
    subsets: [catalogue_core]
    description: Organisation that published this subpopulation. Value copied from Resources table
  - name: creator
    type: ref_array
    refTable: Organisations
    refLink: resource
    semantics:
    - dcterms:creator
    subsets: [catalogue_core]
    description: Organisation(s) that created this subpopulation. Value copied from Resources table
  - name: issued
    type: datetime
    semantics:
    - dcterms:issued
    subsets: [cohort_core]
    description: When the data for this subpopulation was first published
  - name: modified
    type: datetime
    semantics:
    - dcterms:modified
    subsets: [cohort_core]
    description: When the data for this subpopulation was last modified
  - name: theme
    type: ontology_array
    defaultValue: "= [{name: 'Health'}]"
    refTable: Themes
    semantics:
    - dcat:theme
    subsets: [cohort_core]
    description: "A main category of the subpopulation. A subpopulation can have multiple themes, for health data theme must\
      \ at least take the value 'Health', which is set as a default"
  - name: access rights
    type: ontology
    defaultValue: "= {name: 'Non public'}"
    refTable: Access rights
    semantics:
    - dcterms:accessRights
    subsets: [cohort_core]
    description: Information that indicates whether the resource is publicly accessible, has access restrictions or is not
      public. A default is set for non-public access, because most health datasets contain sensitive information and rules
      and licenses apply to get access
  - name: applicable legislation
    type: ontology_array
    defaultValue: "= [{name: 'Data Governance Act'}]"
    refTable: Legislations
    semantics:
    - dcatap:applicableLegislation
    subsets: [cohort_core]
    description: "The legislation that mandates the creation or management of the subpopulation. For health datasets, the\
      \ value must include the data governance act, which is set as a default. URI's to other legislations may be included"
  - name: provenance statement
    type: text
    semantics:
    - dct:provenance
    subsets: [ema]
    description: A statement of any changes in ownership and custody of a resource since its creation that are significant
      for its authenticity, integrity, and interpretation
