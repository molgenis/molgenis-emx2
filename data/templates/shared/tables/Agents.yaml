table: Agents
description: An organisation, department or individual
subsets: [catalogue_core]
semantics: ['foaf:Agent', 'org:Organization']
subtypes:
  Organisations:
    description: Research organisations, departments and research groups
    subsets: [catalogue_core]
    semantics: ['foaf:Agent', 'org:Organization']
columns:
  resource:
    type: ref
    key: 1
    required: true
    refTable: Resources
    subsets: [catalogue_core]
    description: Resource this Agent is associated with
  id:
    key: 1
    required: true
    subsets: [catalogue_core]
    description: Internal identifier. Ideally fill out acronym for an organisation (e.g. UMCG) and full name for a person
      (e.g. Ada Lovelace)"
  type:
    type: ontology
    required: true
    defaultValue: "=mg_tableclass.includes('Organisations')? {name: 'Organisation'} : undefined"
    refTable: Agent types
    subsets: [catalogue_core]
    description: 'Type of agent: person or organisation'
  name:
    subsets: [catalogue_core]
    visible: "type?.name === 'Individual'"
    description: Name of the individual
  organisation:
    type: ref
    refTable: Organisations
    subsets: [catalogue_core, patient_core]
    visible: "type?.name === 'Organisation'"
    description: Organisation name from Research Organization Registry (ROR).
  other organisation:
    type: text
    subsets: [catalogue_core, patient_core]
    visible: "type?.name === 'Organisation'"
    description: 'If your organisation is not listed, please look up in ROR: https://ror.org/ and preferably provide ROR id,
      otherwise fill out your organisation name.'
  department:
    subsets: [catalogue_core]
    visible: "type?.name === 'Organisation'"
    description: Name of department within the organisation
  website:
    type: hyperlink
    semantics: ['foaf:homepage']
    subsets: [catalogue_core]
    visible: "type?.name === 'Individual'"
    description: A website representing this Agent
  email:
    type: email
    required: "if(resource?.hricore === true) 'This field is mandatory for HRICore compatibility'"
    semantics: ['foaf:mbox']
    subsets: [catalogue_core]
    description: E-mail address to contact this organisation or individual
  logo:
    type: file
    semantics: ['foaf:logo']
    subsets: [catalogue_core, patient_core]
    visible: "type?.name === 'Organisation'"
    description: Logo of the organisation
  role:
    type: ontology_array
    refTable: Organisation roles
    subsets: [catalogue_core, patient_core]
    visible: "type?.name === 'Organisation'"
    description: Type(s) of contribution or role in the resource
  organisation name:
    semantics: ['foaf:name']
    subsets: [ema]
    description: Organisation name, copied value from ROR ontology for DCAT conform RDF generation
  organisation pid:
    semantics: ['dcterms:identifier']
    subsets: [ema]
    description: ROR id, copied value from ROR ontology for DCAT conform RDF generation
  organisation website:
    type: hyperlink
    semantics: ['foaf:homepage']
    subsets: [ema]
    description: Organisation website, copied value from ROR ontology for DCAT conform RDF generation
  Organisations fields:
    subtype: Organisations
    columns:
      is lead organisation:
        type: bool
        visible: "type?.name === 'Organisation'"
        description: Whether the organisation is the lead organisation of this resource
