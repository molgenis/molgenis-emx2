table: Resource counts
description: Quantitative information on the resource
subsets: [catalogue_core]
columns:
  resource:
    type: ref
    key: 1
    refTable: Resources
    subsets: [rwe_staging, study_staging, integrate]
    description: Resource id
  age group:
    type: ontology
    key: 1
    refTable: Age groups
    subsets: [rwe_staging, study_staging, integrate]
    description: Select the relevant age group for this quantitative information
  population size:
    type: int
    subsets: [rwe_staging, study_staging, integrate]
    description: Total number of unique individuals with records captured in the data source (most recent
      count). In the catalogue, this will accommodate counts per year
  active size:
    type: int
    subsets: [rwe_staging, study_staging]
    description: Number of unique, active, or currently registered individuals with records captured in
      the data source (most recent count). In the catalogue, this will accommodate counts per year
  no individuals with samples:
    type: int
    subsets: [cohorts_staging, rwe_staging, networks_staging, study_staging]
    description: Number of unique individuals with records of biological samples (e.g., blood, urine)
      (most recent count). In the catalogue, this will accommodate counts per year
  mean observation years:
    type: int
    subsets: [rwe_staging, study_staging]
    description: Median years for which unique individuals with records captured in the data source are
      observable (most recent count)
  mean years active:
    type: int
    subsets: [rwe_staging, study_staging]
    description: Median time for which unique individuals with records captured in the data source are
      observable (most recent count)
  median age:
    type: int
    subsets: [catalogue_core]
    description: Median age of individuals within data source
  proportion female:
    type: int
    subsets: [catalogue_core]
    description: Proportion of females in the data source
