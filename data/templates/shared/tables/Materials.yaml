table: Materials
description: Materials (files, consent, etc.) relating to individual(s)
subsets: [patient_core]
semantics: ['http://semanticscience.org/resource/SIO_000015']
subtypes:
  Individual consent:
    description: Consent given by a patient to a surgical or medical procedure or participation in a study, examination or
      analysis after achieving an understanding of the relevant medical facts and the risks involved.
    subsets: [patient_core]
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C16735']
  Files:
    description: An electronic file is an information content entity which conforms to a specification or format and which
      is meant to hold data and information in digital form, accessible to software agents.
    subsets: [patient_registry]
    semantics: ['http://purl.obolibrary.org/obo/STATO_0000002', 'http://purl.obolibrary.org/obo/NCIT_C42883']
columns:
  General Information:
    type: heading
    subsets: [patient_core]
  id:
    type: auto_id
    key: 1
    required: true
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25364']
    subsets: [patient_core]
    description: One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing
  produced by process:
    type: multiselect
    refTable: Processes
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C29862']
    subsets: [patient_core]
    description: An event (an experiment, an observation, etc.) which produces a material
  individuals:
    type: multiselect
    refTable: Individuals
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C164337']
    subsets: [patient_core]
    description: A reference to one or more individuals associated to the material
  alternate ids:
    type: string_array
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C90353']
    subsets: [patient_core]
    description: Additional identifiers that identify a material
  affiliated organisations:
    type: multiselect
    refTable: Organisations
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25412']
    subsets: [patient_core]
    description: One or more associations between the record and an organisation.
  Additional Information:
    type: heading
    subsets: [patient_core]
  included in resources:
    type: multiselect
    refTable: Resources
    semantics: ['http://purl.obolibrary.org/obo/HSO_0000370']
    subsets: [patient_registry]
    description: A reference to one or more resources that organises materials for in a meaningful way (e.g., data releases,
      subpopulations, cohorts, etc.)
  data source:
    type: select
    refTable: Resources
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C16493']
    subsets: [patient_registry]
    description: The source or origin of the record. For example, an organisation, database, system, etc.
  date created at source:
    type: date
    semantics: ['dcterms:created', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    subsets: [patient_core]
    description: The date the record was created at the source
  created at source by:
    type: select
    refTable: Contacts
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C51820', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    subsets: [patient_core]
    description: The person who created the record at the source
  date updated at source:
    type: date
    semantics: ['dcterms:modified', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    subsets: [patient_core]
    description: The date the record was updated at the source
  updated at source by:
    type: select
    refTable: Contacts
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C51820', 'http://purl.obolibrary.org/obo/NCIT_C16493']
    subsets: [patient_core]
    description: The person who updated the record at the source
  comments:
    type: text
    semantics: ['http://purl.obolibrary.org/obo/NCIT_C25393']
    subsets: [patient_core]
    description: A written explanation, observation or criticism added to textual material
  Individual consent fields:
    subtype: Individual consent
    columns:
      Individual Consent:
        type: heading
      consent form used:
        type: select
        refTable: Consent documents
        semantics: ['http://purl.obolibrary.org/obo/IAO_0000136']
        description: Reference to the informed consent form that was signed. Points to a particular instance of leaflet and
          consent form that usually exists as a record (i.e. a row) within the same database as this individual consent.
      collected by:
        type: select
        refTable: Organisations
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C45262']
        description: Indicates the institute who performed the collection act.
      signing date:
        type: date
        semantics: ['http://purl.obolibrary.org/obo/ICO_0000036']
        description: A date specification that designates when this individual consent form was signed.
      valid from:
        type: date
        semantics: ['http://purl.org/dc/terms/valid']
        description: Starting date of the validity of this individual consent.
      valid until:
        type: date
        semantics: ['http://purl.org/dc/terms/valid']
        description: End date of the validity of this individual consent.
      represented by:
        type: ontology
        refTable: Consent representative
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C142600']
        description: An individual who is authorized under applicable State or local law to consent on behalf of a child or
          incapable person to general medical care including participation in clinical research.
      data use permissions:
        type: ontology
        refTable: Data use permissions
        semantics: ['http://purl.obolibrary.org/obo/DUO_0000001']
        description: A data item that is used to indicate consent permissions for datasets and/or materials, and relates to
          the purposes for which datasets and/or material might be used.
      data use modifiers:
        type: ontology_array
        refTable: Data use modifiers
        semantics: ['http://purl.obolibrary.org/obo/DUO_0000017']
        description: Data use modifiers indicate additional conditions for use. For instance, a dataset is restricted to investigations
          into specific diseases or performed at specific geographical locations.
      data use specification:
        type: text
        semantics: ['http://semanticscience.org/resource/SIO_000090']
        description: Further specification of applied data use permissions and modifiers. For example, a list of countries
          in case of geographic restrictions or a list of diseases when restricted to disease-specific research.
      allow recontacting:
        type: ontology_array
        refTable: Allow recontacting
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C25737']
        description: The procedure of recontacting the patient for specified reasons. This means the patient agrees to be
          re-identifiable under those circumstances.
  Files fields:
    subtype: Files
    columns:
      produced by experiment:
        type: select
        refTable: Experiments
        semantics: ['http://edamontology.org/topic_3168']
        description: 'The determination of complete (typically nucleotide) sequences, including those of genomes (full genome
          sequencing, de novo sequencing and resequencing), amplicons and transcriptomes. In FAIR Genomes: Sequencing. Ideally:
          SequencingRuns.'
      file locations:
        type: refback
        refTable: File locations
        refBack: file
        refLabel: ${storageLocation.name}:${path}
      checksum:
        semantics: ['http://purl.obolibrary.org/obo/NCIT_C43522']
        description: A fixed-size datum calculated (by using a hash function) for a file
      checksum type:
        type: ontology
        refTable: Checksum type
        semantics: ['http://purl.obolibrary.org/obo/MS_1000561']
        description: The type of checksum (e.g., MD5, SHA256)
      format:
        type: ontology
        required: true
        refTable: File formats
        semantics: ['http://purl.org/dc/terms/FileFormat', 'http://purl.obolibrary.org/obo/NCIT_C171252']
        description: A digital resource format (e.g. BAM, FastQ, gVCF, phenopacket, BED)
