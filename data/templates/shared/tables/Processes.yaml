- name: NGS sequencing
  extension: NGS sequencing
  columns:
  - name: extraction kit
    semantics:
    - http://purl.obolibrary.org/obo/OBI_0000407
    - http://purl.obolibrary.org/obo/NGBO_6000238
    subsets: [patient_core]
    description: An assay kit used for the technique of extracting nucleic acids from a biological sample
  - name: extraction date
    type: date
    semantics:
    - http://purl.obolibrary.org/obo/OBI_0003081
    subsets: [patient_core]
    description: A time measurement datum that specifies when some material was extracted from an input material
  - name: Library Preparation
    type: heading
    subsets: [patient_core]
  - name: library source
    type: ontology
    refTable: Library source
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0001965
    subsets: [patient_core]
    description: E.g. genomic source
  - name: library selection
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0001940
    subsets: [patient_core]
    description: E.g. RANDOM method
  - name: library strategy
    type: ontology
    refTable: Sequencing methods
    semantics:
    - http://purl.obolibrary.org/obo/FIX_0000704
    subsets: [patient_core]
    description: 'Method used to determine the order of bases in a nucleic acid sequence. In FAIR Genomes: SequencingMethod.'
  - name: library layout
    type: ontology
    refTable: Library layout
    semantics:
    - http://purl.obolibrary.org/obo/FBcv_0003208
    subsets: [patient_core]
    description: Either PAIRED or SINGLE
  - name: sequencer barcode
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C43361
    subsets: [patient_core]
    description: A machine-readable representation of an instrument (e.g., a sequencer) in a visual format on a surface
  - name: library preparation kit
    type: ontology
    refTable: Sequencing enrichment kits
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0000085
    subsets: [patient_core]
    description: Pre-filled, ready-to-use reagent cartridges intented to improve chemistry, cluster density and read length
      as well as improve quality (Q) scores for this sample. Reagent components are encoded to interact with the sequencing
      system to validate compatibility with user-defined applications.
  - name: PCR free
    type: bool
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C17003
    subsets: [patient_core]
    description: Indicates whether a polymerase chain reaction (PCR) was used to prepare this sample. PCR is a method for
      amplifying a DNA base sequence using multiple rounds of heat denaturation of the DNA and annealing of oligonucleotide
      primers complementary to flanking regions in the presence of a heat-stable polymerase.
  - name: target enrichment kit
    type: ontology
    refTable: Sequencing enrichment kits
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C154307
    subsets: [patient_core]
    description: Indicates which target enrichment kit was used to prepare this sample. Target enrichment is a pre-sequencing
      DNA preparation step where DNA sequences are either directly amplified (amplicon or multiplex PCR-based) or captured
      (hybrid capture-based) in order to only focus on specific regions of a genome or DNA sample.
  - name: UMIs present
    type: bool
    semantics:
    - http://www.ebi.ac.uk/efo/EFO_0010199
    subsets: [patient_core]
    description: Indicates whether any unique molecular identifiers (UMIs) are present. An UMI barcode is a short nucleotide
      sequence that is used to identify reads originating from an individual mRNA molecule.
  - name: intended insert size
    type: int
    semantics:
    - https://w3id.org/fair-genomes/resource/FG_0000001
    subsets: [patient_core]
    description: In paired-end sequencing, the DNA between the adapter sequences is the insert. The length of this sequence
      is known as the insert size, not to be confused with the inner distance between reads. So, fragment length equals read
      adapter length (2x) plus insert size, and insert size equals read lenght (2x) plus inner distance.
  - name: intended read length
    type: int
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C153362
    subsets: [patient_core]
    description: The number of nucleotides intended to be ordered from each side of a nucleic acid fragment obtained after
      the completion of a sequencing process.
  - name: barcode
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C43361
    subsets: [patient_core]
    description: A machine-readable representation of information in a visual format on a surface.
  - name: Sequencing
    type: heading
    subsets: [patient_core]
  - name: date of sequencing
    type: datetime
    subsets: [patient_core]
    description: When the sequencing run took place
  - name: mean read depth
    type: decimal
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C155320
    subsets: [patient_core]
    description: The mean number of times a particular locus (site, nucleotide, amplicon, region) was sequenced.
  - name: median read depth
    type: decimal
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C155320
    subsets: [patient_core]
    description: The median number of times a particular locus (site, nucleotide, amplicon, region) was sequenced.
  - name: observed read length
    type: int
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C153362
    subsets: [patient_core]
    description: The number of nucleotides successfully ordered from each side of a nucleic acid fragment obtained after the
      completion of a sequencing process.
  - name: sequencing centre
    type: select
    refTable: Organisations
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0001202
    subsets: [patient_registry]
    description: A data field which describes the name of the third party company or laboratory that provided services.
  - name: platform
    type: ontology
    refTable: Sequencing platforms
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0000071
    subsets: [patient_core]
    description: 'The name of the sequencing platform (i.e. brand, name of a company that produces sequencer equipment). In
      FAIR Genomes: SequencingPlatform.'
  - name: percentage Q30
    type: decimal
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0000089
    subsets: [patient_core]
    description: Percentage of reads with a Phred quality score over 30, which indicates less than a 1/1000 chance that the
      base was called incorrectly.
  - name: percentage Tr20
    type: decimal
    semantics:
    - https://w3id.org/fair-genomes/resource/FG_0000003
    subsets: [patient_core]
    description: Percentage of the target sequence on which 20 or more unique reads were successfully mapped.
  - name: flow cell ID
    semantics:
    - http://purl.allotrope.org/ontologies/result#AFR_0003078
    subsets: [patient_core]
    description: A flow cell identifier is an identifier that identifies some flow cell (aparatus in the fluidic subsystem
      where the sheath and sample meet)
  - name: sequencing lane identifier
    semantics:
    - http://purl.obolibrary.org/obo/NCIT_C182081
    subsets: [patient_core]
    description: The numerical identifier for the lane or machine unit where a sample was located during nucleotide sequencing.
  - name: secondary analysis pipeline version
    semantics:
    - http://purl.obolibrary.org/obo/GENEPIO_0000152
    subsets: [patient_registry]
    description: A datum which describes the version of the bioinformatics pipeline used.
