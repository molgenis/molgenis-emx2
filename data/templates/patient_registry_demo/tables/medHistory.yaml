    type: "text"
  - name: "startDate"
    type: "date"
  - name: "stopDate"
    type: "date"
  - name: "ongoingBool"
    type: "bool"
  - name: "relatedXP"
    type: "bool"
  - name: "medicationBool"
    type: "bool"
  - name: "id"
    type: "auto_id"
    key: 1
    required: "true"
    computed: "${mg_autoid}"
    label: "Auto-identifier"
