---
table: "subject"
sections:
- columns:
  - name: "skinGroup"
    type: "section"
    required: "false"
    label: "ERN-SKIN group"
  - name: "diseaseGroup"
    type: "ontology"
    required: "false"
    refTable: "diseaseGroup"
    refLabel: "${label}"
    description: "Belonging to which type of SKIN disease groups"
    label: "Type of disease group"
  - name: "subgroups01"
    type: "ontology"
    required: "true"
    refTable: "subgroupsDNA"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"dna\""
    label: "Subgroups of DNA"
  - name: "subgroups02"
    type: "ontology"
    required: "false"
    refTable: "subgroupGenodermatosis"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"other\""
    label: "Subgroups of other genodermatosis"
  - name: "EU1"
    type: "heading"
    required: "false"
    label: "1. Pseudonym"
  - name: "ID_SPIDER"
    key: 1
    required: "true"
    description: "Patient's European patient identifier, using SPIDER technology."
    label: "1.1 SPIDER ID (Individual ID)"
  - name: "ID_Patient"
    required: "false"
    description: "Local patient pseudonym"
    label: "1.2 Alternative ID"
  - name: "EU2"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "2. Personal information"
  - name: "dateBirth"
    type: "date"
    required: "true"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "2.1 Date of Birth"
  - name: "foetus"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "2.1.1 Is Foetus?"
  - name: "expecteddob"
    type: "date"
    required: "false"
    visible: "foetus?.name===\"yes\""
    label: "2.1.2 Expected date of birth"
  - name: "biologicalSex"
    type: "ontology"
    required: "true"
    refTable: "genderAtBirth"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"dna\""
    description: "Patient's sex at birth"
    label: "2.2 Sex at birth"
  - name: "gender"
    type: "ontology"
    required: "false"
    refTable: "genderIdentity"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    description: "For adolescents/adults who identify themselves as different compared\
      \ to their biological sex."
    label: "2.2.1 Gender identity"
  - name: "country"
    type: "ontology"
    required: "false"
    refTable: "countries"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "2.3 Country of Birth"
  - name: "residence"
    type: "ontology"
    required: "false"
    refTable: "countryEU"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "2.4 Country of residence"
  - name: "EU3"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "3. Patient Status"
  - name: "patientStatus"
    type: "ontology"
    required: "true"
    refTable: "InclusionStatus"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "3.1 Patient Status"
  - name: "ageAtDeath"
    type: "date"
    required: "true"
    validation: "if(!(ageAtDeath>=dateBirth))'Date at death cannot be less than birth\
      \ date'"
    visible: "patientStatus?.name===\"dead\""
    label: "3.2 Date of death"
  - name: "EU4"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "4. Care pathway"
  - name: "dateFirstContact"
    type: "date"
    required: "true"
    visible: "diseaseGroup?.name!==\"dna\""
    description: "Date first contact with specialised center/Date of data entry"
    label: "4.1 First contact with specialised center"
  - name: "centre"
    type: "ref"
    required: "true"
    refTable: "dataproviders"
    refLabel: "${organisation.name}"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "4.2 Healthcare Provider"
  - name: "centreContact"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "4.3 Physician?s name"
  - name: "EU5"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "5. Disease history"
  - name: "ageOfOnset"
    type: "ontology"
    required: "true"
    refTable: "onsetType"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "5.1 Age at onset"
  - name: "onsetDate"
    type: "date"
    required: "false"
    validation: "if(!(onsetDate>=dateBirth))'Date at onset cannot be less than birth\
      \ date'"
    visible: "ageOfOnset?.name===\"date\""
    label: "Date of onset"
  - name: "diagnoseDate"
    type: "date"
    required: "false"
    validation: "if(!(diagnoseDate>=dateBirth))'Date of diagnosis cannot be less than\
      \ birth date'"
    visible: "ageOfDiagnose?.name===\"date\""
    label: "Date of diagnosis"
  - name: "diseaseComments"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "5.3 Comments"
  - name: "EU6"
    type: "section"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "6. Diagnosis"
  - name: "diagnose"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.1 Diagnosed Case"
  - name: "typeDiagnosis"
    type: "ontology"
    required: "false"
    refTable: "biologicalDiagnosis"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.1.1 Type of Diagnosis"
  - name: "rare"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.2 Diagnosis of the rare disease"
  - name: "codesystemType_1"
    type: "ontology"
    required: "true"
    refTable: "codesystemType"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    description: "Please select either ICD-10 or Orpha-codes. Overnight, your selection\
      \ will automatically be mapped to the other coding system, if a mapping is available."
    label: "6.2.1 Which coding system do you use for disease classification?"
  - name: "ordo1"
    type: "ontology_array"
    required: "true"
    refTable: "ordo"
    refLabel: "${label}"
    visible: "codesystemType_1?.name===\"ordo\" && diseaseGroup?.name===\"mendel\""
    label: "6.2.1 Rare disease classification (ORPHA)"
  - name: "icd10_1"
    type: "ontology_array"
    required: "true"
    refTable: "Icd10"
    refLabel: "${label}"
    visible: "codesystemType_1?.name===\"icd10\" && diseaseGroup?.name===\"mendel\""
    label: "6.2.2 Rare disease classification (ICD10)"
  - name: "mappedCodeBool_1"
    type: "bool"
    required: "true"
    defaultValue: "FALSE"
    visible: "diseaseGroup?.name===\"mendel\""
    description: "This field will be automatically updated by a nightly script. No\
      \ need to fill in."
    label: "Disease Classification Mapping"
  - name: "mappedCodeOrdo_1"
    type: "ontology_array"
    required: "false"
    refTable: "ordo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\" && codesystemType_1?.name===\"icd10\"\
      \ && mappedCodeBool_1===true"
    description: "This field contains the ORPHA code for the rare disease, mapped\
      \ using the Orphacode tool. No manual input is required."
    label: "Mapped: Rare Disease Classification (ORPHA)"
  - name: "mappedCodeIcd10_1"
    type: "ontology_array"
    required: "false"
    refTable: "Icd10"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\" && codesystemType_1?.name===\"ordo\"\
      \ && mappedCodeBool_1===true"
    description: "This field contains the ICD10 code for the rare disease, mapped\
      \ using the Orphacode tool. No manual input is required."
    label: "Mapped : Rare Disease Classification (ICD10)"
  - name: "undiagnosed"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.3 Undiagnosed Case"
  - name: "undiagnosedBool2"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.3.1 Undiagnosed Case?"
  - name: "clinical"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.4 Immunohistology Diagnostic"
  - name: "hpo1"
    type: "ontology_array"
    required: "false"
    refTable: "hpo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.4.1 Clinical symptoms and physical findings in patient(HPO)"
  - name: "NotHpo1"
    type: "ontology_array"
    required: "false"
    refTable: "hpo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.4.2 Negative phenotype annotations"
  - name: "genetic"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.5 Genetic diagnosis"
  - name: "geneticTest1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.5.1 Genetic tests performed?"
  - name: "chromsomalTest1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.5.2 Chromosome Analysis Test performed?"
  - name: "chromDeviation"
    type: "text"
    required: "false"
    visible: "chromsomalTest1?.name===\"yes\""
    label: "6.5.2.1  chromosomal deviation"
  - name: "DNAanalysis1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.5.3 DNA sequencing performed?"
  - name: "hgnc1"
    type: "ontology_array"
    required: "true"
    refTable: "gene"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    description: "HGNC (genes), OMIM"
    label: "6.5.4 Gene"
  - name: "variant"
    type: "refback"
    required: "false"
    refTable: "variant"
    refBack: "belongsToSubject"
    visible: "diseaseGroup?.name===\"mendel\""
    description: "https://www.lovd.nl/"
    label: "6.5.5 Causal Variant(s)"
  - name: "DNAtechniques1"
    type: "ontology"
    required: "false"
    refTable: "SequencingMethods"
    refLabel: "${label}"
    visible: "dNAanalysis1?.name===\"yes\""
    label: "6.5.6.a DNA techniques"
  - name: "additionalTechniques1"
    type: "text"
    required: "false"
    visible: "dNAtechniques1?.name===\"other\""
    label: "6.5.6.b Additional techniques"
  - name: "histologic"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.6 Histologic Diagnostic"
  - name: "standardHistology1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.6.1 Standard histology"
  - name: "antigen1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.6.2 Antigen mapping"
  - name: "resultAntigen1"
    type: "text"
    required: "false"
    visible: "antigen1?.name===\"yes\""
    label: "6.6.2.a Result Antigen mapping"
  - name: "electrochemicalMicroscopy1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.6.3 Electron microscopy"
  - name: "immunology"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.7 Immunology Diagnostic"
  - name: "antibodyResult1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.7.1 Antibody results"
  - name: "bloodAnalysisbool1"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.7.1.a Blood analysis performed?"
  - name: "antibodyDetails1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.7.2 Name Ab + name company"
  - name: "targetProtein1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.7.3 Target Protein"
  - name: "etiology1"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.8 Etiology"
  - name: "drugs1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.8.1 Drug etiology: which drug?"
  - name: "infection1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.8.2 Infectious etiology: which infection?"
  - name: "other1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.8.3 other?"
  - name: "unknown1"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name===\"mendel\""
    label: "6.8.4 Unknown Etiology?"
  - name: "rareDisease"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.1 Diagnosis of the rare disease"
  - name: "codesystemType"
    type: "ontology"
    required: "true"
    refTable: "codesystemType"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    description: "Please select either ICD-10 or Orpha-codes. Overnight, your selection\
      \ will automatically be mapped to the other coding system, if a mapping is available."
    label: "Which coding system do you use for disease classification?"
  - name: "ordo"
    type: "ontology_array"
    required: "true"
    refTable: "ordo"
    refLabel: "${label}"
    visible: "codesystemType?.name===\"ordo\""
    label: "Rare disease classification (ORPHA)"
  - name: "icd10"
    type: "ontology_array"
    required: "true"
    refTable: "Icd10"
    refLabel: "${label}"
    visible: "codesystemType?.name===\"icd10\""
    label: "Rare disease classification (ICD10)"
  - name: "mappedCodeBool"
    type: "bool"
    required: "true"
    defaultValue: "FALSE"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    description: "This field will be automatically updated by a nightly script. No\
      \ need to fill in."
    label: "Disease Classification Mapping"
  - name: "mappedCodeOrdo"
    type: "ontology_array"
    required: "false"
    refTable: "ordo"
    refLabel: "${label}"
    visible: "codesystemType?.name===\"icd10\" && mappedCodeBool===true"
    description: "This field contains the ORPHA code for the rare disease, mapped\
      \ using the Orphacode tool. No manual input is required."
    label: "Mapped: Rare Disease Classification (ORPHA)"
  - name: "mappedCodeIcd10"
    type: "ontology_array"
    required: "false"
    refTable: "Icd10"
    refLabel: "${label}"
    visible: "codesystemType?.name===\"ordo\" && mappedCodeBool===true"
    description: "This field contains the ICD10 code for the rare disease, mapped\
      \ using the Orphacode tool. No manual input is required."
    label: "Mapped : Rare Disease Classification (ICD10)"
  - name: "clinicalDiagnosis"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.2 Clinical Diagnostic"
  - name: "hpo"
    type: "ontology_array"
    required: "true"
    refTable: "hpo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.2.1 Clinical symptoms and physical findings in patient(HPO)"
  - name: "geneticDiagnosis"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.3 Genetic diagnosis"
  - name: "hgnc"
    type: "ontology_array"
    required: "true"
    refTable: "gene"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    description: "HGNC (genes), OMIM"
    label: "6.3.1 Gene"
  - name: "chromsomalTest"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.3.2 Chromosome Analysis Test performed?"
  - name: "geneticTest"
    type: "ontology"
    required: "false"
    refTable: "yesNoUnknown"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.3.3 Genetic tests performed?"
  - name: "mutation"
    required: "false"
    visible: "geneticTest?.name===\"yes\""
    label: "Mutated Gene and mutation:"
  - name: "DNAanalysis"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.3.4 DNA analysis performed?"
  - name: "DNAtechniques"
    type: "ontology"
    required: "false"
    refTable: "SequencingMethods"
    refLabel: "${label}"
    visible: "dNAanalysis?.name===\"yes\""
    label: "6.3.4.a DNA techniques"
  - name: "additionalTechniques"
    type: "text"
    required: "false"
    visible: "dNAtechniques?.name===\"other\""
    label: "6.3.4.b Additional techniques"
  - name: "histologicDiagnosis"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.4 Histologic Diagnostic"
  - name: "standardHistology"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.4.1 Standard histology"
  - name: "antigen"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.4.2 Antigen mapping"
  - name: "resultAntigen"
    type: "text"
    required: "false"
    visible: "antigen?.name===\"yes\""
    label: "6.4.2.a Result Antigen mapping"
  - name: "electrochemicalMicroscopy"
    type: "ontology"
    required: "false"
    refTable: "yesNo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.4.3 Electron microscopy"
  - name: "immunologyDiagnosis"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.5 Immunology Diagnostic"
  - name: "antibodyResult"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.5.1 Antibody results"
  - name: "antibodyDetails"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.5.2 Name Ab + name company"
  - name: "targetProtein"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.5.3 Target Protein"
  - name: "undiagnosedCase"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.6  Undiagnosed case"
  - name: "undiagnosedHpo"
    type: "ontology_array"
    required: "false"
    refTable: "hpo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.6.1 Clinical symptoms and physical findings in patient (HPO: Human Phenotype\
      \ Ontology)"
  - name: "NotHpo3"
    type: "ontology_array"
    required: "false"
    refTable: "hpo"
    refLabel: "${label}"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.6.2 Negative phenotype annotations (HPO: Human Phenotype Ontology)"
  - name: "etiology"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.7 Etiology"
  - name: "drugs"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.7.1 Drug etiology: which drug?"
  - name: "infection"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.7.2 Infectious etiology: which infection?"
  - name: "other"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.7.3 other?"
  - name: "unknown"
    type: "text"
    required: "false"
    visible: "diseaseGroup?.name!==\"mendel\" && diseaseGroup?.name!==\"dna\""
    label: "6.7.4 Unknown Etiology?"
  - name: "EU7"
    type: "heading"
    required: "false"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "7. Research/consent"
  - name: "consentRegistry"
    type: "ontology"
    required: "true"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "7.1 Agreement to be contacted for research purposes or clinical trials"
  - name: "consentReuse"
    type: "ontology"
    required: "true"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "7.2 Consent to the reuse of data"
  - name: "sampleBool"
    type: "ontology"
    required: "true"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "7.3 Patient's biological sample available for research"
  - name: "biobankBool"
    type: "ontology"
    required: "true"
    refTable: "yesNo"
    visible: "diseaseGroup?.name!==\"dna\""
    label: "7.4 Biological sample stored in a biobank"
  - name: "biobank"
    type: "text"
