table: Dependencies
description: External dependencies used in the developer pages
subtypes:
  Dependencies CSS:
    description: External CSS dependencies used in custom pages
  Dependencies JS:
    description: External JavaScript dependencies used in custom pages
columns:
  name:
    key: 1
    required: 'true'
    description: A name is a label used to identify a dependency
  url:
    type: hyperlink
    description: URL to the dependency
  fetch priority:
    type: ontology
    refTable: Web fetch priorities
    description: If defined, a setting higher priority level will indicate that a dependency should be retrieved ahead of
      other dependency
  Dependencies JS:
    subtype: Dependencies JS
    columns:
      async:
        type: bool
        defaultValue: 'false'
        description: If true, the dependency will be loaded in parallel and executed as soon as it is loaded. This setting
          will override any "defer" setting
      defer:
        type: bool
        defaultValue: 'false'
        description: If true, the dependency will be loaded after content is parsed. This setting will be ignored if async
          is defined
