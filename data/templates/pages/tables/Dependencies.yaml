---
table: "Dependencies"
description: "External dependencies used in the developer pages"
extensions:
- name: "Dependencies CSS"
  description: "External CSS dependencies used in custom pages"
- name: "Dependencies JS"
  description: "External JavaScript dependencies used in custom pages"
sections:
- columns:
  - name: "name"
    key: 1
    required: "true"
    description: "A name is a label used to identify a dependency"
  - name: "url"
    type: "hyperlink"
    description: "URL to the dependency"
  - name: "fetch priority"
    type: "ontology"
    refTable: "Web fetch priorities"
    description: "If defined, a setting higher priority level will indicate that a\
      \ dependency should be retrieved ahead of other dependency"
- name: "Dependencies JS"
  extension: "Dependencies JS"
  columns:
  - name: "async"
    type: "bool"
    defaultValue: "false"
    description: "If true, the dependency will be loaded in parallel and executed\
      \ as soon as it is loaded. This setting will override any \"defer\" setting"
  - name: "defer"
    type: "bool"
    defaultValue: "false"
    description: "If true, the dependency will be loaded after content is parsed.\
      \ This setting will be ignored if async is defined"
