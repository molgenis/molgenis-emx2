  - name: decimal type
    type: decimal
    profiles:
    - TypeTest
  - name: decimal array type
    type: decimal_array
    profiles:
    - TypeTest
  - heading: Extended numeric types
    profiles:
    - TypeTest
  - name: non negative int type
    type: non_negative_int
    profiles:
    - TypeTest
  - name: non negative int array type
    type: non_negative_int_array
    profiles:
    - TypeTest
  - section: Primitive types
    profiles:
    - TypeTest
  - name: bool type
    type: bool
    profiles:
    - TypeTest
  - name: bool array type
    type: bool_array
    profiles:
