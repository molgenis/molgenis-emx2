    profiles:
    - TypeTest
  - heading: Date types
    profiles:
    - TypeTest
  - name: date type
    type: date
    profiles:
    - TypeTest
  - name: date array type
    type: date_array
    profiles:
    - TypeTest
  - name: datetime type
    type: datetime
    profiles:
    - TypeTest
  - name: datetime array type
    type: datetime_array
    profiles:
    - TypeTest
  - name: period type
    type: period
    profiles:
    - TypeTest
  - name: period array type
    type: period_array
    profiles:
    - TypeTest
  - section: Relationship types
    profiles:
    - TypeTest
  - name: ref type
    type: ref
    refTable: Options
    profiles:
    - TypeTest
  - name: select type
    type: select
    refTable: Options
    profiles:
    - TypeTest
