formatVersion: 1
version: 1.0.0
tables:
- name: Options
  description: A table with options to test the ref/ref-array/radio/select/multiselect columns
  profiles:
  - TypeTest
  columns:
  - name: option key
    key: 1
    required: true
    profiles:
    - TypeTest
  - name: option value
    profiles:
    - TypeTest
- name: Types
  description: A table containing a column for each column type
  profiles:
  - TypeTest
  columns:
  - section: String types
    profiles:
    - TypeTest
  - heading: Simple string types
    profiles:
    - TypeTest
  - name: string type
    key: 1
    required: true
    profiles:
    - TypeTest
  - name: string array type
    type: string_array
    profiles:
    - TypeTest
  - name: text type
    type: text
    profiles:
    - TypeTest
  - name: text array type
    type: text_array
    profiles:
    - TypeTest
  - heading: Extended string types
    profiles:
    - TypeTest
  - name: auto id type
    type: auto_id
    key: 1
    required: true
    profiles:
    - TypeTest
  - name: json type
    type: json
    profiles:
    - TypeTest
  - name: email type
    type: email
    profiles:
    - TypeTest
  - name: email array type
    type: email_array
    profiles:
    - TypeTest
  - name: hyperlink type
    type: hyperlink
    profiles:
