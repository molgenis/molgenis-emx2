formatVersion: 1
version: 1.0.0
tables:
- name: Containers
  description: All page types (configurable, developer, etc.)
  profiles:
  - pages
  subclasses:
  - name: Configurable pages
    description: Pages built with the drag-and-drop interface
    profiles:
    - pages
  - name: Developer pages
    description: Pages built with the html, css, and javascript.
    profiles:
    - pages
  columns:
  - name: name
    key: 1
    required: true
    description: A unique name for the container. Only letters or hypens are allowed. e.g., "MyNewPage", "my-new-page", etc.
    validation: if (!/^[a-zA-Z\-]+$/g.exec(name)) "Name may only contain letters or hypens."
    profiles:
    - pages
  - name: description
    type: text
    profiles:
    - pages
  - section: Code
    subclass: Developer pages
    profiles:
    - pages
  - name: html
    subclass: Developer pages
    type: text
    profiles:
    - pages
  - name: css
    subclass: Developer pages
    type: text
    profiles:
    - pages
  - name: javascript
    subclass: Developer pages
    type: text
    profiles:
    - pages
  - section: Settings
    subclass: Developer pages
    profiles:
    - pages
  - name: dependencies
    subclass: Developer pages
    type: ref_array
    refTable: Dependencies
    description: The external dependencies used in the page
    profiles:
    - pages
  - name: enable base styles
    subclass: Developer pages
    type: bool
    defaultValue: 'TRUE'
    description: If true (default), minimal styles are added to the page to align with the rest of the MOLGENIS frontend.
    profiles:
    - pages
  - name: enable button styles
    subclass: Developer pages
    type: bool
    defaultValue: 'TRUE'
    description: If true (default) and base styles are enabled, then buttons used in the custom page will be styled using the MOLGENIS styles. Use "type='submit'" to use primary styles.
    profiles:
    - pages
  - name: enable full screen
    subclass: Developer pages
    type: bool
    defaultValue: 'FALSE'
    description: 'If true, custom pages will fit the width of the screen. (Default: false)'
    profiles:
    - pages
  - name: blocks
    subclass: Configurable pages
    type: refback
    refTable: Blocks
    refBack: in container
    profiles:
    - pages
  - name: block order
    subclass: Configurable pages
    type: refback
    refTable: Block orders
    refBack: configurable page
    profiles:
    - pages
- name: Dependencies
  description: External dependencies used in the developer pages
  profiles:
  - pages
  subclasses:
  - name: Dependencies CSS
    description: External CSS dependencies used in custom pages
    profiles:
    - pages
  - name: Dependencies JS
    description: External JavaScript dependencies used in custom pages
    profiles:
    - pages
  columns:
  - name: name
    key: 1
    required: true
    description: A name is a label used to identify a dependency
    profiles:
    - pages
  - name: url
    type: hyperlink
    description: URL to the dependency
    profiles:
    - pages
  - name: fetch priority
    type: ontology
    refTable: Web fetch priorities
    description: If defined, a setting higher priority level will indicate that a dependency should be retrieved ahead of other dependency
    profiles:
    - pages
  - name: async
    subclass: Dependencies JS
    type: bool
    defaultValue: 'FALSE'
    description: If true, the dependency will be loaded in parallel and executed as soon as it is loaded. This setting will override any "defer" setting
    profiles:
    - pages
  - name: defer
    subclass: Dependencies JS
    type: bool
    defaultValue: 'FALSE'
    description: If true, the dependency will be loaded after content is parsed. This setting will be ignored if async is defined
    profiles:
    - pages
- name: Blocks
  description: Subcontainers with in a page used to group components
  profiles:
  - pages
  subclasses:
  - name: Headers
    description: <header> elements
    profiles:
    - pages
  - name: Sections
    description: Subcontainers for providing context to components
    profiles:
    - pages
  columns:
  - section: Content
    subclass: Headers
    profiles:
    - pages
  - name: title
    subclass: Headers
    description: A title for the page
    profiles:
    - pages
  - name: subtitle
    subclass: Headers
    description: An optional secondary title that describes the page
    profiles:
    - pages
  - name: background image
    subclass: Headers
    type: select
    refTable: Images
    description: An image to display in the background of the header
    profiles:
    - pages
  - name: title is centered
    subclass: Headers
    type: bool
    defaultValue: 'FALSE'
    description: If true, the title and subtitle will be center aligned
    profiles:
    - pages
  - section: Configuration
    profiles:
    - pages
  - heading: UI settings
    profiles:
    - pages
  - name: enable full screen width
    type: bool
    defaultValue: 'FALSE'
    description: If true, content will be expanded to the fit the full width of the screen
    profiles:
    - pages
  - heading: Component connections
    description: Link components and set the order in which they display on page.
    visible: 'mg_tableclass && mg_tableclass.endsWith(".Headers") ? false : true'
    profiles:
    - pages
  - name: in container
    type: multiselect
    refTable: Configurable pages
    description: A link to the configurable page where the block is displayed
    visible: 'mg_tableclass && mg_tableclass.endsWith(".Headers") ? false : true'
    profiles:
    - pages
  - name: components
    type: refback
    refTable: Components
    refBack: in block
    description: The elements that are displayed in a block
    visible: 'mg_tableclass && mg_tableclass.endsWith(".Headers") ? false : true'
    profiles:
    - pages
  - name: component order
    type: refback
    refTable: Component orders
    refBack: block
    visible: 'mg_tableclass && mg_tableclass.endsWith(".Headers") ? false : true'
    profiles:
    - pages
  - heading: Metadata
    profiles:
    - pages
  - name: id
    type: auto_id
    key: 1
    required: true
    description: An auto ID used to generate UI elements
    profiles:
    - pages
- name: Components
  description: Content to display in the frontend
  profiles:
  - pages
  subclasses:
  - name: Headings
    extends:
    - Text elements
    description: <h*> elements
    profiles:
    - pages
  - name: Images
    description: <img> elements
    profiles:
    - pages
  - name: Navigation cards
    description: ''
    profiles:
    - pages
  - name: Navigation groups
    description: <nav> elements
    profiles:
    - pages
  - name: Ordered lists
    description: <ol> elements
    profiles:
    - pages
  - name: Paragraphs
    extends:
    - Text elements
    description: <p> elements
    profiles:
    - pages
  - name: Text elements
    description: All text elements
    profiles:
    - pages
  - name: Unordered lists
    description: <ul> elements
    profiles:
    - pages
  columns:
  - section: Content
    profiles:
    - pages
  - name: text
    subclass: Text elements
    type: text
    description: The content to display. URLs can be generated using markdown format "[label](url)". This also works for emails if "mailto" is defined "[user@website.com](mailto:user@website.com)".
    profiles:
    - pages
  - name: level
    subclass: Headings
    type: int
    description: Enter an HTML Heading element level (1-6). Please note that heading levels corresponds to page hierarchy and it should not be used to style headings; this should be done elsewhere.
    validation: if (level && (level < 1 || level > 6)) "Level must corresponding to an HTML heading element. Use a level from 1 to 6."
    profiles:
    - pages
  - name: heading is centered
    subclass: Headings
    type: bool
    defaultValue: 'FALSE'
    description: If true, the heading will be center aligned
    profiles:
    - pages
  - name: heading is hidden
    subclass: Headings
    type: bool
    defaultValue: 'FALSE'
    description: If true, the heading will be visually hidden
    profiles:
    - pages
  - name: paragraph is centered
    subclass: Paragraphs
    type: bool
    defaultValue: 'FALSE'
    description: If true, the paragraph will be centered aligned
    profiles:
    - pages
  - name: display name
    subclass: Images
    description: An optional name to display in place of the filename
    profiles:
    - pages
  - name: image
    subclass: Images
    type: file
    description: Select an image file
    profiles:
    - pages
  - name: alt
    subclass: Images
    description: A description of the image for accessibility compliance
    profiles:
    - pages
  - name: width
    subclass: Images
    description: 'The width of an image. Use CSS units: 10px, 50%, 5em, etc.'
    profiles:
    - pages
  - name: height
    subclass: Images
    description: 'The height of an image. Use CSS units: 10px, 50%, 5em, etc.'
    profiles:
    - pages
  - name: image is centered
    subclass: Images
    type: bool
    defaultValue: 'FALSE'
    description: If true, the image will be centered aligned
    profiles:
    - pages
  - name: items
    subclass: Ordered lists
    type: text_array
    profiles:
    - pages
  - name: items
    subclass: Unordered lists
    type: text_array
    profiles:
    - pages
  - name: links
    subclass: Navigation groups
    type: refback
    refTable: Navigation cards
    refBack: displayed in navigation group
    description: A reference to one or more card that contains a link to another page
    profiles:
    - pages
  - name: title
    subclass: Navigation cards
    description: An optional title for the card
    profiles:
    - pages
  - name: description
    subclass: Navigation cards
    description: An optional description that provides context for the link
    profiles:
    - pages
  - name: url
    subclass: Navigation cards
    type: hyperlink
    required: true
    description: A link to an internal or external page
    profiles:
    - pages
  - name: url label
    subclass: Navigation cards
    description: A label to display instead of the URL
    profiles:
    - pages
  - name: url is external
    subclass: Navigation cards
    type: bool
    defaultValue: 'FALSE'
    description: If true, the link will be rendered as an external link
    profiles:
    - pages
  - name: displayed in navigation group
    subclass: Navigation cards
    type: multiselect
    refTable: Navigation groups
    description: A reference to the navigation list
    profiles:
    - pages
  - name: order
    subclass: Navigation cards
    type: int
    required: true
    defaultValue: '0'
    description: Order the card should appear in when used in a navigation group
    profiles:
    - pages
  - section: Configuration
    profiles:
    - pages
  - heading: Component connections
    description: Create links between components and blocks
    visible: 'false'
    profiles:
    - pages
  - name: in block
    type: multiselect
    refTable: Blocks
    description: A link to the block where the component is used
    visible: 'false'
    profiles:
    - pages
  - heading: Metadata
    profiles:
    - pages
  - name: id
    type: auto_id
    key: 1
    required: true
    description: An auto ID used to generate UI elements
    profiles:
    - pages
- name: Block orders
  description: The order blocks (headers, sections, etc.) appear on a page
  profiles:
  - pages
  columns:
  - name: id
    type: auto_id
    key: 1
    profiles:
    - pages
  - name: configurable page
    type: select
    refTable: Configurable pages
    description: A configurable page where a block is used
    profiles:
    - pages
  - name: block
    type: select
    refTable: Blocks
    description: The specific block you would like to order
    profiles:
    - pages
  - name: order
    type: int
    description: The order in which it appears on the page where 0 is the first item
    profiles:
    - pages
- name: Component orders
  description: The order of components with blocks
  profiles:
  - pages
  columns:
  - name: id
    type: auto_id
    key: 1
    profiles:
    - pages
  - name: block
    type: select
    refTable: Blocks
    description: A block page where a component is used
    profiles:
    - pages
  - name: component
    type: select
    refTable: Components
    description: The component that you would like to order
    profiles:
    - pages
  - name: order
    type: int
    description: The order in which the component appears within the block where 0 is the first item
    profiles:
    - pages
