formatVersion: 1
version: 1.0.0
tables:
- name: Consent documents
  description: A document explaining all the relevant information to assist an individual in understanding the expectations and risks in making a decision about a procedure. This document is presented to and signed by the individual or guardian.
  semantics:
  - sio:SIO_000295
  profiles:
  - Patient registry
  - FAIR Genomes
  columns:
  - name: id
    key: 1
    description: A unique proper name or character sequence that identifies this document
    semantics:
    - sio:SIO_000148
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: type of document
    type: ontology
    refTable: CatalogueOntologies.Consent document types
    description: A classification of the document (e.g., leaflet, consent for clinical study, consent for intervention, etc.)
    semantics:
    - obo:ICO_0000001
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: title
    description: A title or name given to the document
    semantics:
    - sio:SIO_000175
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: version
    description: The version, edition, or adaptation of this document
    semantics:
    - sio:SIO_000186
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: date of approval
    type: date
    description: The date on which this document was approved (e.g., ethnical approval, regulatory approval, etc.)
    semantics:
    - sio:SIO_000031
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: date valid from
    type: date
    description: The date on which this document is valid
    semantics:
    - sio:SIO_000031
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: date valid until
    type: date
    description: The last date on which this document is valid
    semantics:
    - sio:SIO_000032
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: authors
    type: multiselect
    refTable: Contacts
    description: The persons involved in creating or maintaining this document
    semantics:
    - sio:SIO_001315
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: related to documents
    type: multiselect
    refTable: Consent documents
    description: Reference to one or more relevant documents
    semantics:
    - sio:SIO_000295
    profiles:
    - Patient registry
    - FAIR Genomes
