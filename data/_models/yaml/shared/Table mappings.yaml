formatVersion: 1
version: 1.0.0
tables:
- name: Table mappings
  description: Mappings from collected or source tables to harmonised or target tables
  profiles:
  - DataCatalogueFlat
  - CohortsStaging
  - RWEStaging
  - StudiesStaging
  columns:
  - name: source
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Id of the resource being mapped from
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - StudiesStaging
  - name: source table
    type: ref
    refTable: Tables
    refLink: source
    key: 1
    required: true
    description: Name of the table being mapped from
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - StudiesStaging
  - name: target
    type: ref
    refTable: catalogue.Resources
    key: 1
    required: true
    description: Name of the variable being mapped to, or harmonised with
    profiles:
    - CohortsStaging
  - name: target table
    type: ref
    refTable: catalogue.Tables
    refLink: target
    key: 1
    required: true
    description: Name of the table being mapped to, or harmonised with
    profiles:
    - CohortsStaging
  - name: order
    type: int
    description: Order in which table ETLs should be executed for this source-target combination
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - StudiesStaging
  - name: description
    type: text
    description: Human readible description of the mapping
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - StudiesStaging
  - name: syntax
    type: text
    description: Formal definition of the mapping, ideally in executable code
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - StudiesStaging
