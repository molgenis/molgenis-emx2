formatVersion: 1
version: 1.0.0
tables:
- name: Individuals
  description: Data, facts or figures about an individual; the set of relevant items would depend on the use case
  semantics:
  - obo:NCIT_C90492
  profiles:
  - Patient registry
  - FAIR Genomes
  columns:
  - name: id
    key: 1
    required: true
    description: A unique proper name or character sequence that identifies this individual
    semantics:
    - obo:NCIT_C164337
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: alternate ids
    type: string_array
    description: Additional identifiers that identify an individual
    semantics:
    - obo:NCIT_C90353
    profiles:
    - Patient registry
  - name: age group
    type: ontology
    refTable: CatalogueOntologies.Age groups
    description: A categorical value that groups this individual by age (e.g., "Adult", "18-24 years", etc.)
    semantics:
    - obo:NCIT_C20587
    profiles:
    - Patient registry
  - name: year of birth
    type: int
    description: The year on which this individual was born
    semantics:
    - obo:NCIT_C83164
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: month of birth
    type: ontology
    refTable: CatalogueOntologies.Month of the year
    description: The month on which this individual was born
    semantics:
    - obo:NCIT_C83090
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: date of birth
    type: date
    description: The calendar date on which this individual was born
    semantics:
    - obo:NCIT_C68615
    profiles:
    - Patient registry
  - name: gender at birth
    type: ontology
    refTable: CatalogueOntologies.Gender at birth
    description: Assigned gender is this individual's gender which was assigned at birth, typically by a medical and/or legal organization, and then later registered with other organizations. Such a designation is typically based off of the superficial appearance of external genitalia present at birth.
    semantics:
    - obo:GSSO_009418
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: gender identity
    type: ontology
    refTable: CatalogueOntologies.Gender identity
    description: This individual's concept of self as being male and masculine or female and feminine, or ambivalent, based in part on physical characteristics, parental responses, and psychological and social pressures. It is the internal experience of gender role. For practical reasons the lookups are limited to first and second-level entries, but can be expanded when needed. Note that 'Gender at birth', 'Genotypic sex' and any (gender-related) hormone therapies in 'Medication' are usually medically more relevant than this term.
    semantics:
    - mesh:D005783
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: administrative gender
    type: ontology
    refTable: CatalogueOntologies.Gender identity
    description: The gender of this individual used for administrative purposes
    semantics:
    - obo:GSSO_009316
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: genotypic sex
    type: ontology
    refTable: CatalogueOntologies.Genotypic sex
    description: A biological sex quality inhering in an individual based upon genotypic composition of sex chromosomes
    semantics:
    - obo:PATO_0020000
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: country of birth
    type: ontology
    refTable: CatalogueOntologies.Countries
    description: The country that this individual was born in
    semantics:
    - obo:GENEPIO_0001094
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: country of residence
    type: ontology
    refTable: CatalogueOntologies.Countries
    description: The country that this individual reported as residing in at the time of enrollment
    semantics:
    - obo:NCIT_C177579
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: ancestry
    type: ontology_array
    refTable: CatalogueOntologies.Ancestry
    description: An individual's descent or lineage, from another individual or from a population using ancestry informative markers (AIMs) based on genetic/genomic data
    semantics:
    - obo:NCIT_C176763
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: age at enrolment
    type: period
    description: The age of the individual at the time they enroll in the study (e.g., "P32Y6M1D")
    semantics:
    - http://snomed.info/id/709491003
    - obo:NCIT_C25150
    profiles:
    - Patient registry
  - name: date at enrolment
    type: date
    description: The date of the enrolment of the individual in the study
    semantics:
    - http://snomed.info/id/709491003
    - obo:NCIT_C25164
    profiles:
    - Patient registry
  - name: processes
    type: refback
    refTable: Processes
    refBack: individuals
    refLabel: ${mg_tableclass?.split('.')[1]}.${id}
    description: A reference to an event (an experiment, an observation, etc.) relating to this individual
    semantics:
    - obo:NCIT_C29862
    profiles:
    - Patient registry
  - name: materials
    type: refback
    refTable: Materials
    refBack: individuals
    refLabel: ${mg_tableclass?.split('.')[1]}.${id}
    description: A reference to materials (files, consent, etc) relating to this individual
    semantics:
    - sio:SIO_000015
    profiles:
    - Patient registry
  - name: consents
    type: refback
    refTable: Individual consent
    refBack: individuals
    refLabel: Individual consent.${id}
    description: Consent given by a patient to a surgical or medical procedure or participation in a study, examination or analysis after achieving an understanding of the relevant medical facts and the risks involved.
    semantics:
    - obo:NCIT_C16735
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: individual status
    type: ontology
    refTable: CatalogueOntologies.Individual status
    description: The status of an individual in relationship to participation in a given activty
    semantics:
    - obo:NCIT_C71470
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: age at death
    type: period
    description: The age at which death occurred
    semantics:
    - obo:NCIT_C135383
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: affiliated organisations
    type: multiselect
    refTable: CatalogueOntologies.Organisations
    description: One or more associations between the individual and an organisation.
    semantics:
    - obo:NCIT_C25412
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: providers of additional resources
    type: multiselect
    refTable: CatalogueOntologies.Organisations
    description: Information related to this individual that is not captured by this system, but is available or provided by one or more organisations.
    semantics:
    - obo:NCIT_C19012
    profiles:
    - Patient registry
  - name: analyses
    type: refback
    refTable: Analyses
    refBack: individuals
    description: Reference to one or more results that were produced from detailed examination of data derived from this individual
    semantics:
    - obo:FBcv_0003108
    profiles:
    - Patient registry
  - name: pedigree
    type: multiselect
    refTable: Pedigree
    description: A record of descent or ancestry, particularly of a specific condition or trait, indicating individual family members, their relationships, and their status with respect to the trait or condition.
    semantics:
    - obo:NCIT_C27957
    profiles:
    - Patient registry
    - FAIR Genomes
  - name: included in resources
    type: multiselect
    refTable: Resources
    description: A reference to one or more resources that organises records in a meaningful way (e.g., data releases, subpopulations, cohorts, etc.)
    semantics:
    - obo:HSO_0000370
    profiles:
    - Patient registry
  - name: data source
    type: select
    refTable: Resources
    description: The source or origin of the record. For example, an organisation, database, system, etc.
    semantics:
    - obo:NCIT_C16493
    profiles:
    - Patient registry
  - name: date created at source
    type: date
    description: The date the record was created at the source
    semantics:
    - dcterms:created
    - obo:NCIT_C16493
    profiles:
    - Patient registry
  - name: created at source by
    type: select
    refTable: Contacts
    description: The person who created the record at the source
    semantics:
    - obo:NCIT_C51820
    - obo:NCIT_C16493
    profiles:
    - Patient registry
  - name: date updated at source
    type: date
    description: The date the record was updated at the source
    semantics:
    - dcterms:modified
    - obo:NCIT_C16493
    profiles:
    - Patient registry
  - name: updated at source by
    type: select
    refTable: Contacts
    description: The person who updated the record at the source
    semantics:
    - obo:NCIT_C51820
    - obo:NCIT_C16493
    profiles:
    - Patient registry
  - name: comments
    type: text
    description: A written explanation, observation or criticism added to textual material.
    semantics:
    - obo:NCIT_C25393
    profiles:
    - Patient registry
