formatVersion: 1
version: 1.0.0
tables:
- name: Collection events
  description: Definition of a collection event for a resource
  profiles:
  - DataCatalogueFlat
  - CohortsStaging
  - UMCGCohortsStaging
  - StudiesStaging
  - UMCUCohorts
  - INTEGRATE
  columns:
  - name: resource
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Resource this collection event is part of
    semantics:
    - dcterms:source
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: name
    key: 1
    required: true
    description: Name of the collection event
    semantics:
    - dcterms:title
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: pid
    description: Persistent identifier for this collection event
    semantics:
    - dcterms:identifier
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: description
    type: text
    description: Description of the collection event
    semantics:
    - dcterms:description
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: subpopulations
    type: ref_array
    refTable: Subpopulations
    refLink: resource
    description: Subpopulations that are targetted by this collection event
    semantics:
    - dcterms:source
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: keywords
    type: string_array
    description: Keywords to increase findability of this collection event. Try to use words that are not used in the description. Keywords are not displayed on the collection event page
    semantics:
    - dcat:keyword
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: start date
    type: date
    description: Start date of data collection
    semantics:
    - dcat:startDate
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: end date
    type: date
    description: End date of data collection. Leave empty if collection is ongoing
    semantics:
    - dcat:endDate
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: age groups
    type: ontology_array
    refTable: CatalogueOntologies.Age groups
    description: Age groups included in this data collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: number of participants
    type: int
    description: Number of participants sampled in this data collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: areas of information
    type: ontology_array
    refTable: CatalogueOntologies.Areas of information cohorts
    description: Areas of information that were extracted in this data collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: data categories
    type: ontology_array
    refTable: CatalogueOntologies.Data categories
    description: Methods of data collection used in this collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: sample categories
    type: ontology_array
    refTable: CatalogueOntologies.Sample categories
    description: Samples that were collected in this collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: standardized tools
    type: ontology_array
    refTable: CatalogueOntologies.Standardized tools
    description: Standardized tools, e.g. surveys, questionnaires, instruments used to collect data for this collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: standardized tools other
    type: text
    description: If 'other', please specify
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: core variables
    type: string_array
    description: Name 10-20 relevant variables that were collected in this collection event
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: contact point
    type: ref
    refTable: Contacts
    refLink: resource
    description: Contact point for this collection event. Value copied from Resources table
    semantics:
    - dcat:contactPoint
    profiles:
    - DataCatalogueFlat
  - name: publisher
    type: ref
    refTable: Organisations
    refLink: resource
    description: Organisation that published this collection event. Value copied from Resources table
    semantics:
    - dcterms:publisher
    profiles:
    - DataCatalogueFlat
  - name: creator
    type: ref_array
    refTable: Organisations
    refLink: resource
    description: Organisation(s) that created this collection event. Value copied from Resources table
    semantics:
    - dcterms:creator
    profiles:
    - DataCatalogueFlat
  - name: issued
    type: datetime
    description: When the data for this collection event was first published
    semantics:
    - dcterms:issued
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: modified
    type: datetime
    description: When the data for this collection event was last modified
    semantics:
    - dcterms:modified
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - StudiesStaging
    - UMCUCohorts
    - INTEGRATE
  - name: theme
    type: ontology_array
    refTable: CatalogueOntologies.Themes
    defaultValue: '= [{name: ''Health''}]'
    description: A main category of the collection event. A collection event can have multiple themes, for health data theme must at least take the value 'Health', which is set as a default
    semantics:
    - dcat:theme
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: access rights
    type: ontology
    refTable: CatalogueOntologies.Access rights
    defaultValue: '= {name: ''Non public''}'
    description: Information that indicates whether the resource is publicly accessible, has access restrictions or is not public. A default is set for non-public access, because most health datasets contain sensitive information and rules and licenses apply to get access
    semantics:
    - dcterms:accessRights
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: applicable legislation
    type: ontology_array
    refTable: CatalogueOntologies.Legislations
    defaultValue: '= [{name: ''Data Governance Act''}]'
    description: The legislation that mandates the creation or management of the collection event. For health datasets, the value must include the data governance act, which is set as a default. URI's to other legislations may be included
    semantics:
    - dcatap:applicableLegislation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: provenance statement
    type: text
    description: A statement of any changes in ownership and custody of a resource since its creation that are significant for its authenticity, integrity, and interpretation
    semantics:
    - dcterms:provenance
    profiles:
    - DataCatalogueFlat
    - EMA
