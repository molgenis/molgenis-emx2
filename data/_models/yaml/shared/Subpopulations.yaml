formatVersion: 1
version: 1.0.0
tables:
- name: Subpopulations
  description: Subpopulations defined for this resource
  profiles:
  - DataCatalogueFlat
  - CohortsStaging
  - UMCGCohortsStaging
  - UMCUCohorts
  - INTEGRATE
  columns:
  - name: resource
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Resource this subpopulation is part of
    semantics:
    - dcterms:source
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: name
    key: 1
    required: true
    description: Subpopulation name, e.g. 'mothers in first trimester','newborns'
    semantics:
    - dcterms:title
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: pid
    description: Persistent identifier for this subpopulation
    semantics:
    - dcterms:identifier
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: description
    type: text
    description: Subpopulation description
    semantics:
    - dcterms:description
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: keywords
    type: string_array
    description: Keywords to increase findability of this subpopulation. Try to use words that are not used in the description. Keywords are not displayed on the subpopulation page
    semantics:
    - dcat:keyword
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: number of participants
    type: non_negative_int
    description: Number of participants in this subpopulation
    semantics:
    - healthdcatap:numberOfUniqueIndividuals
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: counts
    type: refback
    refTable: Subpopulation counts
    refBack: subpopulation
    description: Total number of unique individuals per age(group), gender and year
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
  - name: inclusion start
    type: int
    description: Year of first included participant
    semantics:
    - dcat:startDate
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: inclusion end
    type: int
    description: Year of last included participant. Leave empty if data collection is ongoing
    semantics:
    - dcat:endDate
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: age groups
    type: ontology_array
    refTable: CatalogueOntologies.Age groups
    description: Age groups within this subpopulation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: age min
    type: non_negative_int
    description: Minimum age of participants within this subpopulation
    semantics:
    - healthdcatap:minimumTypicalAge
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: age max
    type: non_negative_int
    description: Maximum age of participants within this subpopulation
    semantics:
    - healthdcatap:maximumTypicalAge
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: main medical condition
    type: ontology_array
    refTable: CatalogueOntologies.Diseases
    description: Disease groups within this subpopulation, based on ICD-10 and ORPHA code classifications
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: comorbidity
    type: ontology_array
    refTable: CatalogueOntologies.Diseases
    description: Comorbidity within this subpopulation, based on ICD-10 classification
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: countries
    type: ontology_array
    refTable: CatalogueOntologies.Countries
    description: Countries where data from this subpopulation largely originate from
    semantics:
    - dcterms:spatial
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: regions
    type: ontology_array
    refTable: CatalogueOntologies.Regions
    description: Geographical regions where data from this subpopulation largely originate from
    semantics:
    - dcterms:coverage
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: inclusion criteria
    type: ontology_array
    refTable: CatalogueOntologies.Inclusion Exclusion Criteria
    description: Inclusion criteria applied to this subpopulation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: other inclusion criteria
    type: text
    description: Other inclusion criteria applied to this subpopulation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: exclusion criteria
    type: ontology_array
    refTable: CatalogueOntologies.Inclusion Exclusion Criteria
    description: Exclusion criteria applied to this subpopulation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: other exclusion criteria
    type: text
    description: Other exclusion criteria applied to this subpopulation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: contact point
    type: ref
    refTable: Contacts
    refLink: resource
    description: Contact point for this subpopulation. Value copied from Resources table
    semantics:
    - dcat:contactPoint
    profiles:
    - DataCatalogueFlat
  - name: publisher
    type: ref
    refTable: Organisations
    refLink: resource
    description: Organisation that published this subpopulation. Value copied from Resources table
    semantics:
    - dcterms:publisher
    profiles:
    - DataCatalogueFlat
  - name: creator
    type: ref_array
    refTable: Organisations
    refLink: resource
    description: Organisation(s) that created this subpopulation. Value copied from Resources table
    semantics:
    - dcterms:creator
    profiles:
    - DataCatalogueFlat
  - name: issued
    type: datetime
    description: When the data for this subpopulation was first published
    semantics:
    - dcterms:issued
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: modified
    type: datetime
    description: When the data for this subpopulation was last modified
    semantics:
    - dcterms:modified
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: theme
    type: ontology_array
    refTable: CatalogueOntologies.Themes
    defaultValue: '= [{name: ''Health''}]'
    description: A main category of the subpopulation. A subpopulation can have multiple themes, for health data theme must at least take the value 'Health', which is set as a default
    semantics:
    - dcat:theme
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: access rights
    type: ontology
    refTable: CatalogueOntologies.Access rights
    defaultValue: '= {name: ''Non public''}'
    description: Information that indicates whether the resource is publicly accessible, has access restrictions or is not public. A default is set for non-public access, because most health datasets contain sensitive information and rules and licenses apply to get access
    semantics:
    - dcterms:accessRights
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: applicable legislation
    type: ontology_array
    refTable: CatalogueOntologies.Legislations
    defaultValue: '= [{name: ''Data Governance Act''}]'
    description: The legislation that mandates the creation or management of the subpopulation. For health datasets, the value must include the data governance act, which is set as a default. URI's to other legislations may be included
    semantics:
    - dcatap:applicableLegislation
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: provenance statement
    type: text
    description: A statement of any changes in ownership and custody of a resource since its creation that are significant for its authenticity, integrity, and interpretation
    semantics:
    - dcterms:provenance
    profiles:
    - DataCatalogueFlat
    - EMA
