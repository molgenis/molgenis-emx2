formatVersion: 1
version: 1.0.0
tables:
- name: Agents
  description: An organisation, department or individual
  semantics:
  - foaf:Agent
  - org:Organization
  profiles:
  - DataCatalogueFlat
  - EMA
  - CohortsStaging
  - RWEStaging
  - NetworksStaging
  - StudiesStaging
  - UMCGCohortsStaging
  - UMCUCohorts
  - INTEGRATE
  columns:
  - name: resource
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Resource this Agent is associated with
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: id
    key: 1
    required: true
    description: Internal identifier. Ideally fill out acronym for an organisation (e.g. UMCG) and full name for a person (e.g. Ada Lovelace)"
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: type
    type: ontology
    refTable: CatalogueOntologies.Agent types
    required: true
    defaultValue: '=mg_tableclass.includes(''Organisations'')? {name: ''Organisation''} : undefined'
    description: 'Type of agent: person or organisation'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: name
    description: Name of the individual
    visible: type?.name === 'Individual'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: organisation
    type: ref
    refTable: CatalogueOntologies.Organisations
    description: Organisation name from Research Organization Registry (ROR).
    visible: type?.name === 'Organisation'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
    - FAIR Genomes
  - name: other organisation
    type: text
    description: 'If your organisation is not listed, please look up in ROR: https://ror.org/ and preferably provide ROR id, otherwise fill out your organisation name.'
    visible: type?.name === 'Organisation'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
    - FAIR Genomes
  - name: department
    description: Name of department within the organisation
    visible: type?.name === 'Organisation'
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: website
    type: hyperlink
    description: A website representing this Agent
    semantics:
    - foaf:homepage
    visible: type?.name === 'Individual'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: email
    type: email
    required: if(resource?.hricore === true) 'This field is mandatory for HRICore compatibility'
    description: E-mail address to contact this organisation or individual
    semantics:
    - foaf:mbox
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
  - name: logo
    type: file
    description: Logo of the organisation
    semantics:
    - foaf:logo
    visible: type?.name === 'Organisation'
    profiles:
    - DataCatalogueFlat
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - INTEGRATE
    - FAIR Genomes
  - name: role
    type: ontology_array
    refTable: CatalogueOntologies.Organisation roles
    description: Type(s) of contribution or role in the resource
    visible: type?.name === 'Organisation'
    profiles:
    - DataCatalogueFlat
    - EMA
    - CohortsStaging
    - RWEStaging
    - NetworksStaging
    - StudiesStaging
    - UMCGCohortsStaging
    - UMCUCohorts
    - INTEGRATE
    - FAIR Genomes
  - name: organisation name
    description: Organisation name, copied value from ROR ontology for DCAT conform RDF generation
    semantics:
    - foaf:name
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: organisation pid
    description: ROR id, copied value from ROR ontology for DCAT conform RDF generation
    semantics:
    - dcterms:identifier
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: organisation website
    type: hyperlink
    description: Organisation website, copied value from ROR ontology for DCAT conform RDF generation
    semantics:
    - foaf:homepage
    profiles:
    - DataCatalogueFlat
    - EMA
