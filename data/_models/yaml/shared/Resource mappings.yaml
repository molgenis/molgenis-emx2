formatVersion: 1
version: 1.0.0
tables:
- name: Resource mappings
  description: Mapping from collected resources to standard/harmonised resources, optionally including ETL syntaxes
  profiles:
  - DataCatalogueFlat
  - EMA
  columns:
  - name: source
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Data resource that is being mapped to a (common) data model
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: source version
    description: Version of the resource that is being mapped
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: target
    type: ref
    refTable: Resources
    key: 1
    required: true
    description: Model being mapped to
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: target version
    description: Version of the model being mapped to
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: cdms other
    description: If cdm is not under targets, which cdm was mapped to? (default = not applicable)
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: mapping status
    type: ontology
    refTable: CatalogueOntologies.Mapping status
    description: Mapping status
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: ETL frequency
    type: int
    description: The frequency of the ETL process, in months
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: ETL specification url
    type: hyperlink
    description: Link to ETL specification documentation
    profiles:
    - DataCatalogueFlat
    - EMA
  - name: ETL specification document
    type: file
    description: Documentation concerning ETL details
    profiles:
    - DataCatalogueFlat
    - EMA
