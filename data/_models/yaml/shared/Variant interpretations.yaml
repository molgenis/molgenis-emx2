formatVersion: 1
version: 1.0.0
tables:
- name: Variant interpretations
  description: A genetic variation analysis which assign a formal classification to a detected genetic variant.
  semantics:
  - obo:NGBO_6000125
  profiles:
  - Patient registry
  columns:
  - name: id
    type: auto_id
    key: 1
    required: true
    description: One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing
    semantics:
    - obo:NCIT_C25364
    profiles:
    - Patient registry
  - name: interpretation analysis
    type: select
    refTable: Variant interpretation analyses
    profiles:
    - Patient registry
  - heading: Variant Definition
    profiles:
    - Patient registry
  - name: status
    type: ontology
    refTable: CatalogueOntologies.Status
    description: An characterisation of the variant that indicates the state or progress (e.g., confirmed, to be verified, etc.)
    semantics:
    - sio:SIO_000033
    profiles:
    - Patient registry
  - name: variants
    type: multiselect
    refTable: Genomic variants
    description: A unique identifier that represents this variant (e.g., "20:2447955..2447958c>g")
    semantics:
    - obo:NCIT_C164813
    profiles:
    - Patient registry
  - name: transcript
    description: The initial RNA molecule produced by transcription
    semantics:
    - obo:NCIT_C1936
    profiles:
    - Patient registry
  - name: parental origin
    type: ontology
    refTable: CatalogueOntologies.Variant origin
    description: A quality inhering in an allele that describes its genetic origin (how it came to be part of a cell's genome), i.e. whether it occurred de novo through some spontaneous mutation event, or was inherited from a parent (e.g., "maternal")
    semantics:
    - obo:GENO_0000877
    profiles:
    - Patient registry
  - name: inheritance
    type: ontology_array
    refTable: CatalogueOntologies.Inheritance pattern
    description: The pattern in which a genetic trait or condition is passed from one generation to the next, as determined by genetic interactions between alleles of the causal gene, and interactions between these alleles and the environment.
    semantics:
    - obo:GENO_0000141
    profiles:
    - Patient registry
  - name: zygosity
    type: ontology
    refTable: CatalogueOntologies.Zygosity
    description: An allelic state that describes the degree of similarity between features in a 'single locus complement', within the genome of a cell or organism (i.e., whether the alleles or haplotypes that reside at the same location on paired chromosomes are the same or different).
    semantics:
    - obo:GENO_0000133
    profiles:
    - Patient registry
  - heading: Consensus Classification
    profiles:
    - Patient registry
  - name: disease
    type: ontology
    refTable: CatalogueOntologies.Diseases
    description: The diagnosis assigned for this particular observation (e.g., "Spinocerebellar ataxia type 34")
    semantics:
    - obo:NCIT_C15607
    profiles:
    - Patient registry
  - name: classification
    type: ontology
    refTable: CatalogueOntologies.Variant classifications
    description: A clinical variant interpretation that represents a sequence variant that is previously reported and is a recognized cause of the disorder (e.g., "Pathogenic")
    semantics:
    - obo:NGBO_6000303
    profiles:
    - Patient registry
  - name: classification summary
    type: text
    description: Context or an explanation on how the variant classification was derived
    semantics:
    - obo:NCIT_C86073
    profiles:
    - Patient registry
  - name: consensus
    type: refback
    refTable: Interpretation consensus
    refBack: variant interpretation
    description: Agreement as the result of multiple results or opinions on genomic variants
    semantics:
    - obo:NCIT_C64197
    profiles:
    - Patient registry
- name: Interpretation consensus
  description: Agreement as the result of multiple results or opinions on genomic variants
  semantics:
  - obo:NCIT_C64197
  profiles:
  - Patient registry
  columns:
  - name: id
    type: auto_id
    key: 1
    required: true
    description: One or more characters used to identify, name, or characterize the nature, properties, or contents of a thing
    semantics:
    - obo:NCIT_C25364
    profiles:
    - Patient registry
  - name: variant interpretation
    type: select
    refTable: Variant interpretations
    description: If applicable, a reference to one or more variants involved in the consensus process
    semantics:
    - obo:NGBO_6000125
    profiles:
    - Patient registry
  - name: name of commenter
    type: select
    refTable: Contacts
    refLabel: ${displayName}
    description: The name of the person making the comment
    semantics:
    - obo:NCIT_C25461
    profiles:
    - Patient registry
  - name: classification
    type: ontology
    refTable: CatalogueOntologies.Variant classifications
    description: Classification of the clinical relevance of the variant (e.g., "Pathogenic")
    semantics:
    - edam:operation_3225
    profiles:
    - Patient registry
  - name: summary
    type: text
    description: Context or an explanation on how the variant classification was derived
    semantics:
    - obo:NCIT_C86073
    profiles:
    - Patient registry
  - name: timestamp
    type: datetime
    defaultValue: 'timestamp === null ? new Date().toISOString() : timestamp'
    description: The date and time a comment was made
    semantics:
    - obo:NCIT_C54086
    profiles:
    - Patient registry
